const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── STORAGE KEYS ─────────────────────────────────────────────────────────────
const KEYS = {
  SESSIONS:        'oido_sessions',
  PROFILE:         'oido_profile',
  PLAN:            'oido_plan',
  WORDLIST:        'oido_wordlist',
  API_KEY:         'oido_api_key',
  CONTENT_HISTORY: 'oido_content_history',
  DEFAULT_LEVEL:   'oido_default_level',
  MANUAL_LEVELS:   'oido_manual_levels',
};

// ── Vocabulary frequency instruction (Fix 4) ──────────────────────────────────
function vocabInstruction(level) {
  const limits = { A1: 300, A2: 600, B1: 1200, B2: 2500, C1: 5000 };
  const n = limits[level] || 1200;
  return `Only use vocabulary from the top ${n} most frequent Spanish words, appropriate for ${level} CEFR level.`;
}

// ── Content history: last 50 items across all modules (Fix 7) ─────────────────
// Returns { recentItems: string[], addItems: (items: string[]) => void }
function useContentHistory() {
  const addItems = useCallback((items) => {
    try {
      const prev = loadJSON(KEYS.CONTENT_HISTORY, []);
      const next = [...prev, ...items].slice(-50);
      saveJSON(KEYS.CONTENT_HISTORY, next);
    } catch(_) {}
  }, []);
  const getRecent = useCallback(() => {
    try { return loadJSON(KEYS.CONTENT_HISTORY, []); } catch(_) { return []; }
  }, []);
  return { addItems, getRecent };
}

// ── Build "avoid repetition" prompt fragment from recent history (Fix 7) ──────
function avoidRepeatInstruction(recentItems) {
  if (!recentItems || recentItems.length === 0) return '';
  const sample = recentItems.slice(-20); // last 20 to keep token count low
  return `\n\nAVOID REPETITION — do NOT repeat or closely resemble any of these recently used items:\n${sample.map((s, i) => `${i + 1}. ${s}`).join('\n')}`;
}

// ─── STORAGE HELPERS ──────────────────────────────────────────────────────────
function loadJSON(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function useSessions() {
  const [sessions, setSessions] = useState(() => loadJSON(KEYS.SESSIONS, []));
  const addSession = useCallback((session) => {
    setSessions(prev => {
      const next = [{ ...session, id: crypto.randomUUID(), date: new Date().toISOString() }, ...prev];
      saveJSON(KEYS.SESSIONS, next);
      return next;
    });
  }, []);
  return { sessions, addSession };
}

function useProfile() {
  const [profile, setProfile] = useState(() => loadJSON(KEYS.PROFILE, { level: 'A2', wordList: [] }));
  const updateProfile = useCallback((updates) => {
    setProfile(prev => { const next = { ...prev, ...updates }; saveJSON(KEYS.PROFILE, next); return next; });
  }, []);
  return { profile, updateProfile };
}

function usePlan() {
  const [plan, setPlan] = useState(() => loadJSON(KEYS.PLAN, null));
  const savePlan = useCallback((p) => { setPlan(p); saveJSON(KEYS.PLAN, p); }, []);
  return { plan, savePlan };
}

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
// Fields: rank, contextDiv, freqPerMillion, word, coverage
function parseWordlistCSV(text) {
  const lines = text.trim().split('\n');
  const words = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',');
    if (parts.length < 4) continue;
    const rank = parseInt(parts[0], 10);
    const word = parts[3]?.trim();
    const freq  = parseFloat(parts[2]) || 0;
    if (rank > 0 && word) words.push({ rank, word, freq });
  }
  return words;
}

async function loadWordList() {
  const cached = loadJSON(KEYS.WORDLIST, null);
  if (cached && Array.isArray(cached) && cached.length > 100) return cached;
  const res = await fetch('/wordlist.csv');
  if (!res.ok) throw new Error('Could not load wordlist.csv');
  const text = await res.text();
  const words = parseWordlistCSV(text);
  saveJSON(KEYS.WORDLIST, words);
  return words;
}

// ─── LEVEL RANGES ─────────────────────────────────────────────────────────────
function getLevelRange(level) {
  return { A1:[1,200], A2:[1,500], B1:[301,1200], B2:[800,2000], C1:[1600,5000] }[level] || [1,500];
}

// ─── ANTHROPIC API ────────────────────────────────────────────────────────────
// All calls go through the local proxy (proxy.py on port 3457).
// The proxy reads the API key from .env — no key is stored in the browser.
async function callClaude(_apiKey, system, user, maxTokens = 4096) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system,
      messages: [{ role: 'user', content: user }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ── withTimeout: races a promise against a timer ─────────────────────────────
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`${label} timed out after ${ms / 1000}s`)), ms)
    ),
  ]);
}

// ── cleanChoice: sanitize a raw distractor/target value from Claude ───────────
// Handles: objects, "Category A: word" prefixes, trailing parens, spurious caps
function cleanChoice(raw) {
  if (raw === null || raw === undefined) return '';
  // If Claude returned an object instead of a string, extract common field names
  if (typeof raw === 'object') {
    raw = raw.word ?? raw.text ?? raw.value ?? raw.phrase ?? raw.choice ?? '';
  }
  let s = String(raw).trim();
  // Strip category prefix labels: "A: ", "B — ", "Category A: ", "Cat. B - ", etc.
  s = s.replace(/^(?:category\s+)?[A-Ca-c]\s*[:\-–—]\s*/i, '');
  // Strip trailing parentheticals: " (minimal pair)", " [Cat A]", etc.
  s = s.replace(/\s*[\(\[][^\)\]]*[\)\]]\s*$/g, '').trim();
  // Keep only letters (incl. Spanish accented), spaces, hyphens, apostrophes
  s = s.replace(/[^a-záéíóúüñA-ZÁÉÍÓÚÜÑ\s'\-]/g, '').trim();
  // Lowercase (word choices; not sentence-initial caps)
  return s.toLowerCase();
}

// ─── TTS HOOK (ElevenLabs via proxy) ─────────────────────────────────────────
function useTTS() {
  const currentAudioRef = useRef(null); // currently playing Audio object
  const genRef          = useRef(0);    // incremented on every new speakSequence call

  async function fetchAudio(text, speed = 1.0) {
    const ssml = `<speak><lang xml:lang="es-MX">${text}</lang></speak>`;
    const body = JSON.stringify({ text: ssml, speed });
    console.log('[TTS] request body:', body.slice(0, 200));
    const res = await fetch('/api/tts', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    });
    console.log('[TTS] response:', res.status, res.headers.get('content-type'));
    if (!res.ok) {
      const errText = await res.text();
      console.error('[TTS] error body:', errText);
      throw new Error(`TTS error ${res.status}: ${errText}`);
    }
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  }

  function playAudio(url, myGen) {
    return new Promise((resolve, reject) => {
      if (genRef.current !== myGen) { resolve(); return; }
      const audio = new Audio();
      // blob: URLs are same-origin — setting crossOrigin breaks them on Safari
      if (!url.startsWith('blob:')) audio.crossOrigin = 'anonymous';
      audio.preload = 'auto';
      currentAudioRef.current = audio;
      console.log('[TTS] playing audio, gen', myGen, 'url', url.slice(-20));
      audio.addEventListener('ended', () => { console.log('[TTS] audio ended, gen', myGen); resolve(); });
      audio.addEventListener('error', (e) => { console.log('[TTS] audio error', e); resolve(); }); // resolve not reject — let sequence continue
      const startPlay = () => {
        audio.play().then(() => {
          console.log('[TTS] play() started, gen', myGen);
        }).catch(err => {
          console.warn('[TTS] play() rejected (Safari autoplay policy?)', err);
          resolve(); // gracefully continue rather than break the sequence
        });
      };
      // Safari needs canplaythrough before play() is reliable
      if (audio.readyState >= 3 /* HAVE_FUTURE_DATA */) {
        startPlay();
      } else {
        audio.addEventListener('canplaythrough', startPlay, { once: true });
      }
      audio.src = url; // set src AFTER attaching listeners so no events are missed
    });
  }

  // items: [{ text, rate?, pause? }, …]
  const speakSequence = useCallback(async (items, onDone) => {
    // Claim this generation — any older sequence will see its gen doesn't match and stop
    const myGen = ++genRef.current;
    console.log('[TTS] speakSequence gen', myGen, 'items:', items.map(i => i.text.slice(0,30)));

    if (currentAudioRef.current) {
      currentAudioRef.current.pause();
      currentAudioRef.current = null;
    }

    let urls;
    try {
      urls = await Promise.all(items.map(item => fetchAudio(item.text, item.rate ?? 0.82)));
    } catch (err) {
      console.log('[TTS] prefetch error', err);
      return;
    }

    // Bail if superseded while fetching
    if (genRef.current !== myGen) {
      urls.forEach(u => URL.revokeObjectURL(u));
      return;
    }

    for (let i = 0; i < urls.length; i++) {
      if (genRef.current !== myGen) break;
      try {
        await playAudio(urls[i], myGen);
        URL.revokeObjectURL(urls[i]);
      } catch {
        URL.revokeObjectURL(urls[i]);
        break;
      }
      if (genRef.current !== myGen) break;
      if (items[i].pause) await new Promise(r => setTimeout(r, items[i].pause));
    }

    if (genRef.current === myGen) onDone?.();
  }, []);

  // Fetch audio as a blob URL (same as fetchAudio but exposed for pre-fetching).
  async function fetchAudioStreaming(text, speed = 1.0) {
    const ssml = `<speak><lang xml:lang="es-MX">${text}</lang></speak>`;
    const res = await fetch('/api/tts', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text: ssml, speed }),
    });
    if (!res.ok) throw new Error(`TTS error ${res.status}`);
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  }

  // Play a pre-fetched URL directly, respecting the generation counter.
  const playUrlDirect = useCallback((url, onDone) => {
    const myGen = ++genRef.current;
    if (currentAudioRef.current) { currentAudioRef.current.pause(); currentAudioRef.current = null; }
    playAudio(url, myGen)
      .then(() => { if (genRef.current === myGen) onDone?.(); })
      .catch(() => { if (genRef.current === myGen) onDone?.(); });
  }, []);

  const cancel = useCallback(() => {
    genRef.current++; // invalidate any running sequence
    if (currentAudioRef.current) {
      currentAudioRef.current.pause();
      currentAudioRef.current = null;
    }
  }, []);

  const pauseAudio = useCallback(() => {
    if (currentAudioRef.current) currentAudioRef.current.pause();
  }, []);

  const resumeAudio = useCallback(() => {
    if (currentAudioRef.current) currentAudioRef.current.play().catch(() => {});
  }, []);

  // Play a single Spanish word using ElevenLabs previous_text for language context.
  // previous_text "La palabra es" is sent as silent context — ElevenLabs uses it
  // to set prosody and detect Spanish, but does NOT speak it. Only the word plays.
  const speakWordOnly = useCallback(async (word, speed, onDone) => {
    const myGen = ++genRef.current;
    if (currentAudioRef.current) { currentAudioRef.current.pause(); currentAudioRef.current = null; }
    try {
      const ssml = `<speak><lang xml:lang="es-MX">${word}.</lang></speak>`;
      const res = await fetch('/api/tts', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text:          ssml,
          speed,
          previous_text: `En español, la palabra es`,
        }),
      });
      if (!res.ok) throw new Error(`TTS ${res.status}`);
      const blob = await res.blob();
      if (genRef.current !== myGen) return;
      const url = URL.createObjectURL(blob);
      await playAudio(url, myGen);
      URL.revokeObjectURL(url);
      if (genRef.current === myGen) onDone?.();
    } catch(e) {
      console.warn('[TTS] speakWordOnly error:', e);
      if (genRef.current === myGen) onDone?.();
    }
  }, []);

  return {
    voiceReady: true,
    voiceLang:  'ElevenLabs',
    voiceLabel: 'multilingual v2',
    speakSequence,
    cancel,
    pauseAudio,
    resumeAudio,
    fetchAudioStreaming,
    playUrlDirect,
    speakWordOnly,
  };
}

// ─── SCORE RING ───────────────────────────────────────────────────────────────
function ScoreRing({ score, size = 40, fontSize = 9 }) {
  const r = 15, circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  const color = score >= 80 ? '#22c55e' : score >= 60 ? '#f59e0b' : '#ef4444';
  return (
    <svg width={size} height={size} viewBox="0 0 36 36">
      <circle cx="18" cy="18" r={r} fill="none" stroke="#1e293b" strokeWidth="3"/>
      <circle cx="18" cy="18" r={r} fill="none" stroke={color} strokeWidth="3"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform="rotate(-90 18 18)" style={{transition:'stroke-dashoffset 0.6s ease'}}/>
      <text x="18" y={20} textAnchor="middle" fontSize={fontSize} fill={color} fontWeight="600">{score}</text>
    </svg>
  );
}

// ─── VOCABULARY MODULE ────────────────────────────────────────────────────────
// ─── PLACEMENT MODULE ─────────────────────────────────────────────────────────
const PLACEMENT_TOTAL = 20;
const LEVEL_WEIGHTS   = { A1:1, A2:2, B1:3, B2:4, C1:5 };
const LEVEL_DESCRIPTIONS = {
  A1: 'Beginner — you recognize the most common everyday Spanish words.',
  A2: 'Elementary — you understand basic everyday topics and common expressions.',
  B1: 'Intermediate — you follow conversations on familiar topics and catch the gist of native speech.',
  B2: 'Upper-Intermediate — you understand complex speech and can follow authentic media with effort.',
  C1: 'Advanced — you handle fast, native-speed speech with complex vocabulary and idiomatic expressions.',
};

function getPlacementRange(level) {
  return { A1:[1,150], A2:[151,500], B1:[501,1200], B2:[1201,2500], C1:[2501,5000] }[level] || [151,500];
}

function PlacementModule({ wordList, apiKey, onBack, updateProfile }) {
  const LEVELS = ['A1','A2','B1','B2','C1'];

  const [phase, setPhase]                 = useState('intro');
  const [currentLevelIdx, setCurrentLevelIdx] = useState(1); // start A2
  const [currentQ, setCurrentQ]           = useState(null);
  const [history, setHistory]             = useState([]);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [isCorrect, setIsCorrect]         = useState(null);
  const [isPlaying, setIsPlaying]         = useState(false);
  const [resultLevel, setResultLevel]     = useState(null);
  const [errorMsg, setErrorMsg]           = useState('');

  const consecCorrect  = useRef(0);
  const consecWrong    = useRef(0);
  const nextQRef       = useRef(null);
  const generatingRef  = useRef(false);
  const usedWordsRef   = useRef(new Set());
  const pendingAdvance = useRef(null);

  const { speakSequence, cancel, speakWordOnly } = useTTS();

  // ── Generate one question at a given level ──
  const generateQ = useCallback(async (lvl, _attempt = 0) => {
    const [minRank, maxRank] = getPlacementRange(lvl);
    const pool = wordList.filter(w => w.rank >= minRank && w.rank <= maxRank && !usedWordsRef.current.has(w.word));
    if (!pool.length) {
      const fallback = wordList.filter(w => w.rank >= minRank && w.rank <= maxRank);
      if (!fallback.length) throw new Error('No words available for this level');
      pool.push(...fallback.slice(0, 20));
    }
    const w = pool[Math.floor(Math.random() * pool.length)];
    usedWordsRef.current.add(w.word);

    const system = `You are a Spanish vocabulary expert. Return ONLY valid JSON, no markdown, no explanation.`;
    const prompt = `Create a vocabulary question for the Spanish word "${w.word}" at CEFR ${lvl} level.

STEP 1 — List ALL valid English translations of "${w.word}" (e.g. esperar = to wait, to hope, to expect).
STEP 2 — Pick ONE as the correct answer: the single most common everyday meaning.
STEP 3 — Generate 3 distractors that are NOT valid translations of "${w.word}" in any context.

DISTRACTOR RULES (critical):
- Do NOT use any other valid meaning of "${w.word}" as a distractor
- For words like "esperar" (to wait / to hope), you may only use ONE as correct — the others are off-limits as distractors
- Distractors must be plausible but clearly wrong: similar semantic field OR similar-sounding English words
- Never use a distractor that a fluent speaker would accept as correct for "${w.word}"
- All options must be the same part of speech (1–4 words each)

Return ONLY this JSON — no other text:
{"correct": "most common everyday meaning", "distractors": ["wrong 1", "wrong 2", "wrong 3"]}`;

    try {
      const raw = await callClaude(apiKey, system, prompt, 250);
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON');
      const p = JSON.parse(m[0]);
      if (!p.correct) throw new Error('Missing correct field');

      // Tolerate Claude returning 2 distractors — pad with a generic fallback
      const distractors = Array.isArray(p.distractors) ? p.distractors.filter(Boolean) : [];
      while (distractors.length < 3) distractors.push(['mistaken', 'unrelated', 'different'][distractors.length]);

      const all = [p.correct, ...distractors.slice(0, 3)];
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      return { word: w.word, rank: w.rank, level: lvl, choices: all, correct: all.indexOf(p.correct) };
    } catch (e) {
      if (_attempt < 2) return generateQ(lvl, _attempt + 1);
      throw e;
    }
  }, [apiKey, wordList]);

  // ── Background pre-generation ──
  const pregen = useCallback(async (lvl) => {
    if (generatingRef.current) return;
    generatingRef.current = true;
    try {
      nextQRef.current = await generateQ(lvl);
    } catch (_) {
      nextQRef.current = null;
    } finally {
      generatingRef.current = false;
    }
  }, [generateQ]);

  // ── Play word audio ──
  // Sends "La palabra es" as silent previous_text context to ElevenLabs,
  // then plays only the word itself — no carrier phrase audible.
  const playWord = useCallback((word) => {
    cancel();
    setIsPlaying(true);
    speakWordOnly(word, 0.75, () => setIsPlaying(false));
  }, [cancel, speakWordOnly]);

  // ── Show a question ──
  const showQuestion = useCallback((q) => {
    setCurrentQ(q);
    setSelectedAnswer(null);
    setIsCorrect(null);
    setPhase('question');
    playWord(q.word);
  }, [playWord]);

  // ── Start the test ──
  const startPlacement = useCallback(async () => {
    clearTimeout(pendingAdvance.current);
    setPhase('loading');
    setHistory([]);
    setCurrentLevelIdx(1);
    consecCorrect.current = 0;
    consecWrong.current   = 0;
    usedWordsRef.current  = new Set();
    nextQRef.current      = null;
    try {
      const q = await generateQ('A2');
      showQuestion(q);
      pregen('A2');
    } catch (e) {
      setErrorMsg(e.message);
      setPhase('error');
    }
  }, [generateQ, showQuestion, pregen]);

  // ── Handle answer tap ──
  const handleAnswer = useCallback(async (choiceIdx) => {
    if (phase !== 'question' || !currentQ) return;
    cancel();
    clearTimeout(pendingAdvance.current);

    const correct = choiceIdx === currentQ.correct;
    setSelectedAnswer(choiceIdx);
    setIsCorrect(correct);
    setPhase('feedback');

    if (correct) { consecCorrect.current++; consecWrong.current = 0; }
    else         { consecWrong.current++;   consecCorrect.current = 0; }

    const newHistory = [...history, { level: currentQ.level, correct }];
    setHistory(newHistory);

    // Compute next level
    let nextIdx = currentLevelIdx;
    const prevIdx = currentLevelIdx;
    if (consecCorrect.current >= 5 && nextIdx < 4) { nextIdx++; consecCorrect.current = 0; }
    if (consecWrong.current   >= 2 && nextIdx > 0) { nextIdx--; consecWrong.current = 0;   }
    const nextLvl = LEVELS[nextIdx];

    const levelChanged = nextIdx !== prevIdx;
    console.log(
      `[Vocabulario] Q${newHistory.length}: level=${LEVELS[prevIdx]} correct=${correct}` +
      ` | consecCorrect=${consecCorrect.current} consecWrong=${consecWrong.current}` +
      (levelChanged ? ` | LEVEL CHANGE: ${LEVELS[prevIdx]} → ${LEVELS[nextIdx]}` : '')
    );

    pendingAdvance.current = setTimeout(async () => {
      if (newHistory.length >= PLACEMENT_TOTAL) {
        // ── Calculate result ──
        // Build per-level accuracy stats from the full history
        const byLevel = {};
        LEVELS.forEach(l => { byLevel[l] = { correct: 0, total: 0 }; });
        newHistory.forEach(h => {
          byLevel[h.level].total++;
          if (h.correct) byLevel[h.level].correct++;
        });

        // Final level = highest level where the user scored ≥80%
        // Falls back to the level they were on when Q20 was answered
        let lvl = LEVELS[prevIdx];
        for (let i = LEVELS.length - 1; i >= 0; i--) {
          const s = byLevel[LEVELS[i]];
          if (s.total > 0 && s.correct / s.total >= 0.80) {
            lvl = LEVELS[i];
            break;
          }
        }

        console.log('[Vocabulario] RESULT:', lvl, '| by-level:', JSON.stringify(
          Object.fromEntries(LEVELS.map(l => [l, byLevel[l].total > 0
            ? `${byLevel[l].correct}/${byLevel[l].total} (${Math.round(byLevel[l].correct/byLevel[l].total*100)}%)`
            : 'not asked']))
        ));

        setResultLevel(lvl);
        updateProfile({ level: lvl });
        saveJSON(KEYS.DEFAULT_LEVEL, lvl);
        setPhase('results');
      } else {
        setCurrentLevelIdx(nextIdx);
        const pre = nextQRef.current;
        nextQRef.current = null;
        if (pre && pre.level === nextLvl) {
          showQuestion(pre);
          pregen(nextLvl);
        } else {
          setPhase('loading');
          try {
            const q = await generateQ(nextLvl);
            showQuestion(q);
            pregen(nextLvl);
          } catch (e) {
            setErrorMsg(e.message);
            setPhase('error');
          }
        }
      }
    }, 1200);
  }, [phase, currentQ, history, currentLevelIdx, cancel, generateQ, showQuestion, pregen, updateProfile]);

  // ── Cleanup on unmount ──
  useEffect(() => () => clearTimeout(pendingAdvance.current), []);

  // ── PHASE: intro ──
  if (phase === 'intro') return (
    <div className="fade-in flex flex-col gap-6 py-4">
      <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">
        <div className="w-4 h-4"><Icons.ArrowLeft /></div> Back
      </button>
      <div className="text-center py-4">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-500 to-emerald-600 p-4 mx-auto mb-4 flex items-center justify-center">
          <Icons.Headphones />
        </div>
        <h1 className="text-2xl font-bold text-white mb-1">Vocabulario</h1>
        <p className="text-slate-400 text-sm">20 questions · Adapts to your level</p>
      </div>
      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-5 space-y-3">
        <p className="text-slate-200 text-sm leading-relaxed">
          You'll hear a Spanish word. Choose the correct English meaning from 4 options.
        </p>
        <p className="text-slate-400 text-xs leading-relaxed">
          Questions get harder as you answer correctly and easier when you miss. After 20 questions, we'll save your level as the default for all other modules.
        </p>
        <p className="text-slate-500 text-xs">No need to guess — if you don't know a word, that's useful information too.</p>
      </div>
      <button onClick={startPlacement}
        className="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
        Start Vocabulario →
      </button>
    </div>
  );

  // ── PHASE: loading ──
  if (phase === 'loading') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-teal-500/30 border-t-teal-500 spin" />
      <div>
        <p className="text-white font-semibold">Loading question…</p>
        <p className="text-slate-400 text-sm mt-1">{history.length + 1} of {PLACEMENT_TOTAL}</p>
      </div>
    </div>
  );

  // ── PHASE: error ──
  if (phase === 'error') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <div>
        <p className="text-white font-semibold mb-1">Something went wrong</p>
        <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded-lg px-3 py-2 mt-2 break-all">{errorMsg}</p>
      </div>
      <div className="flex gap-3">
        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>
        <button onClick={startPlacement} className="bg-teal-600 hover:bg-teal-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Try Again</button>
      </div>
    </div>
  );

  // ── PHASE: question / feedback ──
  if ((phase === 'question' || phase === 'feedback') && currentQ) {
    const qNum = history.length + (phase === 'feedback' ? 0 : 0);
    const progressPct = (history.length / PLACEMENT_TOTAL) * 100;
    const lvlColors = { A1:'text-sky-400', A2:'text-blue-400', B1:'text-violet-400', B2:'text-pink-400', C1:'text-red-400' };

    return (
      <div className="fade-in flex flex-col gap-5 py-4">
        {/* Progress */}
        <div>
          <div className="flex items-center justify-between text-xs text-slate-500 mb-1.5">
            <span>Question {history.length + 1} of {PLACEMENT_TOTAL}</span>
            <span className={`font-semibold ${lvlColors[LEVELS[currentLevelIdx]] || 'text-slate-400'}`}>
              {LEVELS[currentLevelIdx]}
            </span>
          </div>
          <div className="h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-teal-500 rounded-full transition-all duration-300"
              style={{ width: `${progressPct}%` }} />
          </div>
        </div>

        {/* Word display */}
        <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-6 text-center">
          <p className="text-slate-500 text-xs uppercase tracking-widest mb-3">Spanish word</p>
          <p className="text-3xl font-bold text-white mb-4">{currentQ.word}</p>
          <button
            onClick={() => playWord(currentQ.word)}
            disabled={phase === 'feedback'}
            className={`flex items-center gap-2 mx-auto text-sm px-4 py-2 rounded-xl border transition-colors ${
              isPlaying
                ? 'bg-teal-500/20 border-teal-500/40 text-teal-300'
                : 'bg-slate-700/60 border-slate-600/40 text-slate-300 hover:text-white hover:border-slate-500'
            }`}
          >
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-3.5 h-3.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            {isPlaying ? 'Playing…' : 'Replay'}
          </button>
        </div>

        {/* Choices */}
        <div className="space-y-2.5">
          {currentQ.choices.map((choice, i) => {
            let cls = 'w-full text-left px-4 py-3.5 rounded-xl border text-sm font-medium transition-all ';
            if (phase === 'feedback') {
              if (i === currentQ.correct)        cls += 'bg-green-500/15 border-green-500/50 text-green-300';
              else if (i === selectedAnswer)     cls += 'bg-red-500/15 border-red-500/50 text-red-300';
              else                               cls += 'bg-slate-800/30 border-slate-700/30 text-slate-600';
            } else {
              cls += 'bg-slate-800/60 border-slate-700/40 text-slate-200 hover:bg-slate-700/60 hover:border-slate-600 active:scale-[0.98]';
            }
            return (
              <button key={i} className={cls}
                onClick={() => handleAnswer(i)}
                disabled={phase === 'feedback'}>
                <span className="text-slate-500 font-normal mr-2">{CHOICE_LABELS[i]}.</span>
                {choice}
                {phase === 'feedback' && i === currentQ.correct && (
                  <span className="ml-2 text-green-400">✓</span>
                )}
                {phase === 'feedback' && i === selectedAnswer && i !== currentQ.correct && (
                  <span className="ml-2 text-red-400">✗</span>
                )}
              </button>
            );
          })}
        </div>

        {phase === 'feedback' && (
          <p className={`text-center text-sm font-semibold ${isCorrect ? 'text-green-400' : 'text-red-400'}`}>
            {isCorrect ? '✓ Correct' : `✗  "${currentQ.choices[currentQ.correct]}"`}
          </p>
        )}
      </div>
    );
  }

  // ── PHASE: results ──
  if (phase === 'results' && resultLevel) {
    const levelIdx = LEVELS.indexOf(resultLevel);
    const byLevel = {};
    history.forEach(h => {
      if (!byLevel[h.level]) byLevel[h.level] = { correct:0, total:0 };
      byLevel[h.level].total++;
      if (h.correct) byLevel[h.level].correct++;
    });

    return (
      <div className="fade-in flex flex-col gap-6 py-4">
        <div className="text-center py-2">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-teal-500 to-emerald-600 mb-4">
            <span className="text-3xl font-black text-white">{resultLevel}</span>
          </div>
          <h1 className="text-2xl font-bold text-white mb-2">Your level is {resultLevel}</h1>
          <p className="text-slate-300 text-sm leading-relaxed max-w-xs mx-auto">
            {LEVEL_DESCRIPTIONS[resultLevel]}
          </p>
        </div>

        {/* Per-level breakdown */}
        <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-4 space-y-2.5">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Breakdown by level</p>
          {LEVELS.map(lvl => {
            const s = byLevel[lvl];
            if (!s) return null;
            const pct = Math.round((s.correct / s.total) * 100);
            const isResult = lvl === resultLevel;
            return (
              <div key={lvl} className={`flex items-center gap-3 ${isResult ? 'opacity-100' : 'opacity-60'}`}>
                <span className={`text-xs font-bold w-7 ${isResult ? 'text-teal-300' : 'text-slate-400'}`}>{lvl}</span>
                <div className="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${isResult ? 'bg-teal-400' : 'bg-slate-500'}`}
                    style={{ width: `${pct}%` }} />
                </div>
                <span className="text-xs text-slate-400 w-14 text-right">{s.correct}/{s.total} ({pct}%)</span>
              </div>
            );
          })}
        </div>

        <div className="bg-teal-500/8 border border-teal-500/20 rounded-xl p-3.5 flex gap-2 items-start">
          <span className="text-sm flex-shrink-0">💾</span>
          <p className="text-teal-200/80 text-xs leading-relaxed">
            All training modules have been set to <strong className="text-teal-300">{resultLevel}</strong>. You can change any module's level individually from the home screen.
          </p>
        </div>

        <button onClick={onBack}
          className="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
          Start Training at {resultLevel} →
        </button>
      </div>
    );
  }

  return null;
}

// ─── (LEGACY VOCABULARY MODULE — replaced by PlacementModule above) ───────────
function VocabularyModule({ level, wordList, apiKey, onBack, addSession, onNeedApiKey }) {
  // phases: init → generating → question → revealed → loading_next → scoring → results | error
  const [phase, setPhase]           = useState('init');
  const [showHowItWorks, setShowHowItWorks] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const answersRef    = useRef([]);
  const [answersVersion, setAnswersVersion] = useState(0);
  const [sessionResult, setSessionResult] = useState(null);
  const [errorMsg, setErrorMsg]     = useState('');
  const [isPlaying, setIsPlaying]   = useState(false);
  const [showTranscript, setShowTranscript] = useState(false);
  const playTimerRef  = useRef(null);
  const { speakSequence, cancel } = useTTS();

  // Per-question prefetch buffer (grows as questions are generated)
  const bufRef       = useRef([]);   // ready Question objects
  const [bufVersion, setBufVersion] = useState(0); // triggers re-render when buf grows
  const genIdxRef    = useRef(0);    // next sampleWords index to generate
  const generatingRef = useRef(false);

  const [minRank, maxRank] = getLevelRange(level);
  const eligible = useMemo(
    () => wordList.filter(w => w.rank >= minRank && w.rank <= maxRank),
    [wordList, minRank, maxRank]
  );

  // Sample 10 words once per module open (use ref)
  const sampleWordsRef = useRef(null);
  if (!sampleWordsRef.current) {
    const shuffled = [...eligible].sort(() => Math.random() - 0.5);
    sampleWordsRef.current = shuffled.slice(0, 10);
  }
  const sampleWords = sampleWordsRef.current;

  // ── Generate a single question for sampleWords[wordIdx] — single Claude call ──
  const generateOneQuestion = useCallback(async (wordIdx, _attempt = 0) => {
    const w = sampleWords[wordIdx];
    const carrierLimit = { A1:'5–6 words max, present tense only', A2:'7–8 words max, present or simple past', B1:'9–10 words max, common tenses', B2:'11–12 words max, natural', C1:'up to 15 words, natural complexity' }[level] || '10 words max';

    const sys = `You are an expert Latin American Spanish vocabulary quiz generator. Output ONLY valid JSON, no markdown or code fences.`;
    const prompt = `Create a listening vocabulary question for the Spanish word "${w.word}" at CEFR ${level}.

Return ONLY this JSON (all fields required):
{
  "correct_answer": "The most common English meaning matching the EXACT grammatical form (infinitive→'to verb', noun→'noun', adj→no pronoun, conjugated verb→'I/he/she/we verb'). Never 'to verb' unless it IS an infinitive.",
  "distractors": ["plausible wrong meaning 1", "plausible wrong meaning 2", "plausible wrong meaning 3"],
  "carrier": "A natural Latin American Spanish sentence (${carrierLimit}) using '${w.word}' unambiguously. If '${w.word}' looks like English (hay, me, no, si, he, la, de, a), open with 'En México,' or 'Claro que' so TTS reads it as Spanish.",
  "explanation": "2 sentences: (a) confirm the meaning and form, (b) a usage note or common Latin American collocation.",
  "category": "ONE of: core verbs|nouns — people|nouns — places|nouns — objects|adjectives of character|verbs of movement|verbs of emotion|false cognates|time expressions|discourse markers|filler words|prepositions|conjunctions|pronouns|numbers & quantity|academic vocabulary|colloquial expressions|negation|question words|modal expressions"
}`;

    try {
      const raw = await callClaude(apiKey, sys, prompt, 512);
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON');
      const p = JSON.parse(m[0]);
      if (!p.correct_answer || !p.carrier) throw new Error('Missing fields');

      // Pad distractors if short
      const distractors = Array.isArray(p.distractors) ? p.distractors.filter(Boolean) : [];
      while (distractors.length < 3) distractors.push(['mistaken', 'different', 'unrelated'][distractors.length] || 'other');

      const allChoices = [p.correct_answer, ...distractors.slice(0, 3)];
      for (let i = allChoices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allChoices[i], allChoices[j]] = [allChoices[j], allChoices[i]];
      }
      return { word: w.word, rank: w.rank, carrier: p.carrier, choices: allChoices, correct: allChoices.indexOf(p.correct_answer), explanation: p.explanation || '', category: p.category || 'core verbs' };
    } catch(e) {
      if (_attempt < 2) return generateOneQuestion(wordIdx, _attempt + 1);
      throw e;
    }
  }, [apiKey, sampleWords, level]);

  // ── Prefetch: per-slot tracking avoids dropped requests ──
  const pendingSlots = useRef(new Set());

  const prefetchSlot = useCallback(async (idx) => {
    if (idx >= sampleWords.length) return;
    if (pendingSlots.current.has(idx)) return;      // already in-flight
    if (bufRef.current[idx] !== undefined) return;   // already done
    pendingSlots.current.add(idx);
    try {
      const q = await generateOneQuestion(idx);
      bufRef.current[idx] = q;
      setBufVersion(v => v + 1);
    } catch(e) {
      console.warn('[WR] slot', idx, 'failed:', e.message);
    } finally {
      pendingSlots.current.delete(idx);
    }
  }, [generateOneQuestion, sampleWords.length]);

  const prefetchUpTo = useCallback((targetIdx) => {
    const end = Math.min(targetIdx, sampleWords.length);
    for (let i = genIdxRef.current; i < end; i++) {
      prefetchSlot(i);
    }
    if (end > genIdxRef.current) genIdxRef.current = end;
  }, [prefetchSlot, sampleWords.length]);

  // ── Start session: generate Q0 immediately, then prefetch Q1-Q2 ──
  const generateQuestions = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    setPhase('generating');
    setErrorMsg('');
    answersRef.current = [];
    setAnswersVersion(0);
    bufRef.current = [];
    genIdxRef.current = 0;
    generatingRef.current = false;
    setBufVersion(0);

    try {
      const q0 = await generateOneQuestion(0);
      genIdxRef.current = 1;
      bufRef.current = [q0];
      setBufVersion(1);
      setCurrentIdx(0);
      setPhase('question');
      // Background: prefetch Q1 and Q2
      prefetchUpTo(3);
    } catch(e) {
      setErrorMsg(e.message);
      setPhase('error');
    }
  }, [apiKey, generateOneQuestion, prefetchUpTo, onNeedApiKey]);

  // ── Auto-play when question appears ──
  const playCurrentQuestion = useCallback((idx, qs) => {
    const q = qs[idx];
    if (!q) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    const w = q.word.trim();
    const wordPhrase = `En español, la palabra es ${w}. ${w}.`;
    speakSequence(
      [{ text: wordPhrase, rate: 0.75 }],
      () => setIsPlaying(false)
    );
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 8000);
  }, [speakSequence]);

  useEffect(() => {
    if (phase === 'question' && bufRef.current[currentIdx]) {
      playCurrentQuestion(currentIdx, bufRef.current);
    }
    return () => clearTimeout(playTimerRef.current);
  }, [phase, currentIdx, bufVersion]); // eslint-disable-line

  const handleReplay = () => {
    const cur = bufRef.current[currentIdx];
    if (!cur) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    speakSequence([{ text: cur.carrier, rate: 0.85 }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 8000);
  };

  const handleReplayWordOnly = () => {
    const cur = bufRef.current[currentIdx];
    if (!cur) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    const w = cur.word.trim();
    const wordPhrase = `En español, la palabra es ${w}. ${w}.`;
    speakSequence([{ text: wordPhrase, rate: 0.75 }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 4000);
  };

  const handleReplaySentenceOnly = () => {
    const cur = bufRef.current[currentIdx];
    if (!cur) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    speakSequence([{ text: cur.carrier, rate: 0.85 }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 8000);
  };

  // ── Answer selection ──
  const handleAnswer = (choiceIdx) => {
    if (phase !== 'question') return;
    cancel();
    clearTimeout(playTimerRef.current);
    setIsPlaying(false);
    setSelectedAnswer(choiceIdx);
    const q = bufRef.current[currentIdx];
    answersRef.current = [
      ...answersRef.current,
      { questionIdx: currentIdx, selected: choiceIdx, correct: choiceIdx === q.correct, category: q.category },
    ];
    setAnswersVersion(v => v + 1);
    setPhase('answering'); // show color flash first
    prefetchUpTo(currentIdx + 3);
  };

  // ── After 500 ms color flash, advance to revealed ──
  useEffect(() => {
    if (phase !== 'answering') return;
    const t = setTimeout(() => setPhase('revealed'), 500);
    return () => clearTimeout(t);
  }, [phase]);

  // ── Next question / finish ──
  const handleNext = () => {
    setShowTranscript(false);
    const nextIdx = currentIdx + 1;
    if (nextIdx >= sampleWords.length) {
      scoreSession();
      return;
    }
    setCurrentIdx(nextIdx);
    setSelectedAnswer(null);
    if (bufRef.current[nextIdx]) {
      setPhase('question');
    } else {
      setPhase('loading_next');
    }
  };

  // ── When buf grows, resolve loading_next ──
  useEffect(() => {
    if (phase !== 'loading_next') return;
    if (bufRef.current[currentIdx]) {
      setPhase('question');
      return;
    }
    // Trigger on-demand fetch if slot was missed or failed
    prefetchSlot(currentIdx);
    // Watchdog: poll every 300 ms in case bufVersion doesn't fire (e.g. after a failed attempt)
    const t = setInterval(() => {
      if (bufRef.current[currentIdx]) {
        setPhase('question');
      } else {
        prefetchSlot(currentIdx);
      }
    }, 300);

  }, [bufVersion, phase, currentIdx, prefetchSlot]);

  // ── Score session ──
  const scoreSession = async () => {
    setPhase('scoring');
    const allAnswers = answersRef.current;
    const correct = allAnswers.filter(a => a.correct).length;
    const total   = allAnswers.length;
    const score   = Math.round((correct / total) * 100);

    const wrongItems = allAnswers
      .filter(a => !a.correct)
      .map(a => {
        const q = bufRef.current[a.questionIdx];
        return `"${q?.word}" (${q?.category}): chose "${q?.choices[a.selected]}" — correct: "${q?.choices[q?.correct]}"`;
      });

    const system = `You are analyzing a Spanish vocabulary listening session. Return ONLY valid JSON.`;
    const prompt = `${level} learner, vocabulary listening session results:
- Score: ${correct}/${total} correct
- Wrong answers: ${wrongItems.length ? wrongItems.join('; ') : 'none — perfect score!'}

Return JSON:
{
  "weakTags": [/* up to 4 specific category strings from their wrong answers, empty array if perfect */],
  "feedback": "2 sentences: an observation about what they're doing well and one specific thing to focus on next. Be encouraging and concrete."
}`;

    let weakTags = [];
    let feedback = `You got ${correct} out of ${total} correct.`;

    try {
      const raw = await callClaude(apiKey, system, prompt, 512);
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        const parsed = JSON.parse(match[0]);
        weakTags = parsed.weakTags || [];
        feedback = parsed.feedback || feedback;
      }
    } catch(_) { /* use fallback */ }

    // Ensure weakTags includes categories of wrong answers even if Claude fails
    if (!weakTags.length && wrongItems.length) {
      weakTags = [...new Set(allAnswers.filter(a => !a.correct).map(a => bufRef.current[a.questionIdx]?.category).filter(Boolean))];
    }

  const q = bufRef.current[currentIdx];

  // ── PHASE: init ──
  if (phase === 'init') {

      <div className="fade-in flex flex-col gap-6 py-4">
        <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">

        <div className="text-center py-4">

          <p className="text-slate-400 text-sm mb-3">Vocab Level Test</p>

          <button onClick={() => setShowHowItWorks(v => !v)} className="w-full flex items-center justify-between px-5 pb-3 text-xs text-slate-500 hover:text-slate-300 transition-colors">
            <span>How it works {showHowItWorks ? '▲' : '▼'}</span>

              ].map(([icon, text]) => (

                  <span className="text-slate-300 text-xs leading-5">{text}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-slate-800/40 border border-slate-700/30 rounded-xl p-4 flex items-center gap-3">
          <div className="text-2xl">📚</div>
          <div>
            <div className="text-white text-sm font-medium">{eligible.length.toLocaleString()} words in your level range</div>
            <div className="text-slate-500 text-xs">Ranks {minRank}–{maxRank} · 10 questions per session</div>
          </div>
        </div>

        <button
          onClick={generateQuestions}
          className="w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors"

      <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
        <div className="w-12 h-12 rounded-full border-4 border-sky-500/30 border-t-sky-500 spin" />
        <div>
          <p className="text-white font-semibold">Building your session…</p>
          <p className="text-slate-400 text-sm mt-1">Claude is generating 10 tailored questions</p>
        </div>
      </div>
    );
  }

  // ── PHASE: error ──
  if (phase === 'error') {
    return (
      <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
        <div className="text-4xl">⚠️</div>
        <div>
          <p className="text-white font-semibold mb-1">Something went wrong</p>
          <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded-lg px-3 py-2 mt-2 break-all">{errorMsg}</p>
        </div>
        <div className="flex gap-3">
          <button onClick={handleReset} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>

        </div>

  }

  // ── PHASE: scoring ──
  if (phase === 'scoring') {
    return (
      <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">

        <div>
          <p className="text-white font-semibold">Analyzing your session…</p>

    );
  }

  // ── PHASE: results ──
  if (phase === 'results' && sessionResult) {
    const { score, correct, total, weakTags, feedback } = sessionResult;
    const perQ = answersRef.current;
    return (
      <div className="fade-in space-y-5 py-4">
        <div className="text-center">

                  <div className={`w-5 h-5 rounded-full flex-shrink-0 mt-0.5 flex items-center justify-center ${a.correct ? 'bg-green-500' : 'bg-red-500'}`}>

                      <span className="text-white font-semibold text-sm">{qs?.word}</span>

          </button>

            New Session
          </button>
        </div>
      </div>
    );
  }

  if (phase === 'loading_next') {
    return (
      <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
        <div className="w-10 h-10 rounded-full border-4 border-sky-500/30 border-t-sky-500 spin" />
        <p className="text-slate-400 text-sm">Loading next question…</p>
      </div>
    );
  }

  // ── PHASE: question / revealed ──
  if (!q) return null;
  const isRevealed = phase === 'revealed';

  return (
    <div className="fade-in flex flex-col gap-3" style={{ height: 'calc(100svh - 5.5rem)' }}>
      {/* Header — fixed height */}
      <div className="flex-none flex items-center gap-3">
        <button onClick={onBack} className="w-8 h-8 text-slate-400 hover:text-white transition-colors flex-shrink-0">
          <Icons.ArrowLeft />
        </button>
        <div className="flex-1">
          <div className="flex justify-between text-xs text-slate-400 mb-1.5">
            <span>Question {currentIdx + 1} of {totalQ}</span>
            <span>{answersRef.current.filter(a=>a.correct).length} correct</span>
          </div>
          <div className="h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div
              className="h-full bg-gradient-to-r from-sky-500 to-blue-500 rounded-full transition-all duration-500"
              style={{ width: `${progressPct}%` }}
            />
          </div>
        </div>
        <span className={`text-[10px] font-semibold px-2 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      {/* Audio player — fixed height */}
      <div className="flex-none bg-gradient-to-br from-sky-900/40 to-blue-900/40 border border-sky-500/20 rounded-2xl p-4 text-center">
        {isRevealed ? (
          <div>
            <div className="text-3xl font-bold text-white mb-3 tracking-wide">{q.word}</div>
            <button onClick={handleReplay} className="w-full flex items-center justify-center gap-2 bg-teal-500 hover:bg-teal-400 active:bg-teal-600 text-white font-semibold text-sm px-4 py-3 rounded-xl transition-colors mb-2">
              <span className="text-base leading-none">🔊</span> Play Example Sentence
            </button>
            <p className="text-slate-500 text-xs italic">"{q.carrier}"</p>
          </div>
        ) : (
          <div>
            <p className="text-sky-300/60 text-xs mb-3">

            </p>
            <div className="flex gap-2 justify-center">
              <button
                onClick={handleReplayWordOnly}
                className="flex items-center gap-1.5 bg-sky-500/20 hover:bg-sky-500/30 border border-sky-500/30 text-sky-300 text-xs font-medium px-3 py-2 rounded-lg transition-colors"
              >
