}

// ─── HOME SCREEN ──────────────────────────────────────────────────────────────
function HomeScreen({ profile, updateProfile, sessions, onStartModule }) {
  // Per-module stats
  const modStats = useMemo(() => {
    const result = {};
    MODULES.forEach(m => {
      const ms = sessions.filter(s => s.module === m.id);
      if (!ms.length) { result[m.id] = null; return; }
      const avg = Math.round(ms.reduce((a,s) => a+s.score, 0) / ms.length);
      result[m.id] = { avg, total: ms.length, lastLevel: ms[0].level };
    });
    return result;
  }, [sessions]);

  // Per-module selected level — uses placement default unless manually overridden
  const defaultLevel = loadJSON(KEYS.DEFAULT_LEVEL, null) ?? profile.level;
  const [selectedLevels, setSelectedLevels] = useState(() => {
    const manualOverrides = loadJSON(KEYS.MANUAL_LEVELS, {});
    const init = {};
    MODULES.forEach(m => { init[m.id] = manualOverrides[m.id] ?? defaultLevel; });
    return init;
  });

  // Per-module level recommendation based on last 1–2 sessions
  const recommendations = useMemo(() => {
    const result = {};
    MODULES.forEach(m => {
      const ms = sessions.filter(s => s.module === m.id); // newest-first
      if (!ms.length) { result[m.id] = null; return; }
      const recent = ms.slice(0, 2).map(s => s.score);
      const allBelow70 = recent.every(s => s < 70);
      const allAbove90 = recent.every(s => s > 90);
      const lastLvl = ms[0].level;
      const lvlIdx = LEVELS.indexOf(lastLvl);
      if (allBelow70) {
        if (lvlIdx === 0) { result[m.id] = { type: 'floor', text: 'Keep practicing at A1', color: 'text-orange-400 bg-orange-500/10 border-orange-500/25' }; }
        else { result[m.id] = { type: 'down', text: `Move down to ${LEVELS[lvlIdx - 1]}`, color: 'text-orange-400 bg-orange-500/10 border-orange-500/25', icon: '⬇' }; }
      } else if (allAbove90) {
        if (lvlIdx === LEVELS.length - 1) { result[m.id] = { type: 'ceiling', text: "Excellent — you've mastered C1", color: 'text-green-400 bg-green-500/10 border-green-500/25' }; }
        else { result[m.id] = { type: 'up', text: `Ready to advance to ${LEVELS[lvlIdx + 1]}`, color: 'text-green-400 bg-green-500/10 border-green-500/25', icon: '⬆' }; }
      } else {
        result[m.id] = null;
      }
    });
    return result;
  }, [sessions]);

  return (
    <div className="fade-in space-y-5">
      {/* ── Header ── */}
      <div className="text-center pt-4 pb-1">
        <div className="inline-flex items-center gap-2 bg-brand-500/10 border border-brand-500/20 rounded-full px-4 py-1.5 mb-3">
          <div className="w-3.5 h-3.5 text-brand-400"><Icons.Sparkles /></div>
          <span className="text-brand-400 text-xs font-medium tracking-wide uppercase">Audio-first training</span>
        </div>
        <h1 className="text-3xl font-bold text-white mb-1">Oído</h1>
        <p className="text-slate-400 text-sm max-w-xs mx-auto">Latin American Spanish listening fluency — from first words to native-speed TV.</p>
      </div>

      {/* ── Module cards ── */}
      <div className="space-y-4">
        {MODULES.map(mod => {
          const ModIcon = mod.icon;
          const st = modStats[mod.id];
          const selLvl = selectedLevels[mod.id] ?? profile.level;
          const rec = recommendations[mod.id];

          const isPlacement = mod.id === 'placement';

          return (
            <div key={mod.id} className={`bg-slate-800/70 border ${mod.border} rounded-2xl overflow-hidden`}>

              {/* ── TOP: clickable launch area ── */}
              <button
                className={`module-card w-full text-left p-4 hover:bg-slate-700/40 active:bg-slate-700/60 transition-colors`}
                onClick={() => {
                  if (selLvl !== defaultLevel) {
                    const overrides = loadJSON(KEYS.MANUAL_LEVELS, {});
                    saveJSON(KEYS.MANUAL_LEVELS, { ...overrides, [mod.id]: selLvl });
                  }
                  onStartModule(mod.id, selLvl);
                }}
              >
                <div className="flex items-center gap-3">
                  <div className={`w-11 h-11 rounded-xl bg-gradient-to-br ${mod.color} p-2.5 flex-shrink-0`}><ModIcon /></div>
                  <div className="flex-1 min-w-0">
                    <span className="font-bold text-white text-base">{mod.title}</span>
                    {st && !isPlacement && (
                      <div className="text-xs text-slate-500 mt-0.5">
                        {st.total} {st.total === 1 ? 'session' : 'sessions'} · avg {st.avg}%
                      </div>
                    )}
                    {!st && <p className="text-xs text-slate-600 mt-0.5 italic">Not started</p>}
                  </div>
                  <div className={`w-12 h-12 rounded-full flex items-center justify-center bg-gradient-to-br ${mod.color} shadow-lg flex-shrink-0`}>
                    <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-white ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  </div>
                  {st && !isPlacement && <ScoreRing score={st.avg} size={40} />}
                </div>
              </button>

              {/* ── BOTTOM: level selector (training modules only) ── */}
              {!isPlacement && (
                <div className={`border-t ${mod.border} bg-slate-900/40 px-4 py-2.5`}>
                  <div className="flex items-center gap-1.5">
                    <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider flex-shrink-0">Level</span>
                    <div className="flex gap-1 flex-1">
                      {LEVELS.map(lvl => (
                        <button key={lvl}
                          onClick={() => {
                            setSelectedLevels(prev => ({ ...prev, [mod.id]: lvl }));
                            const overrides = loadJSON(KEYS.MANUAL_LEVELS, {});
                            if (lvl !== defaultLevel) {
                              saveJSON(KEYS.MANUAL_LEVELS, { ...overrides, [mod.id]: lvl });
                            } else {
                              const { [mod.id]: _, ...rest } = overrides;
                              saveJSON(KEYS.MANUAL_LEVELS, rest);
                            }
                          }}
                          className={`level-pill flex-1 py-1 rounded-lg border text-xs font-bold transition-all ${selLvl === lvl ? LEVEL_ACTIVE[lvl] : LEVEL_COLORS[lvl]}`}
                        >{lvl}</button>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Recent Sessions ── */}
      {sessions.slice(0,3).length > 0 && (
        <section>
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Recent Sessions</div>
          <div className="space-y-2">
            {sessions.slice(0,3).map(s => {
              const mod = MODULES.find(m => m.id === s.module);
              return (
                <div key={s.id} className="flex items-center gap-3 bg-slate-800/40 rounded-xl p-3">
                  <div className={`w-7 h-7 rounded-lg bg-gradient-to-br ${mod?.color||'from-slate-600 to-slate-700'} p-1.5 flex-shrink-0`}>{mod && <mod.icon />}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-white font-medium">{mod?.title||s.module}</div>
                    <div className="text-xs text-slate-500">{s.level} · {new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
                  </div>
                  <ScoreRing score={s.score} size={32}/>
                </div>
              );
            })}
          </div>
        </section>
      )}
    </div>
  );
}

// ─── STUDY PLAN ───────────────────────────────────────────────────────────────

// Module lookup used by plan cards
const MOD_CFG = Object.fromEntries(MODULES.map(m => [m.id, m]));
const MOD_STRIP  = { placement:'bg-teal-500',  vocabulary:'bg-sky-500', structure:'bg-violet-500', speed:'bg-amber-500' };
const MOD_ACCENT = { placement:'text-teal-400 hover:text-teal-300', vocabulary:'text-sky-400 hover:text-sky-300', structure:'text-violet-400 hover:text-violet-300', speed:'text-amber-400 hover:text-amber-300' };
const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function DayCard({ item, isToday, isPast, onToggleDone }) {
  const [expanded, setExpanded] = useState(false);
  const mod   = MOD_CFG[item.module] || MOD_CFG.vocabulary;
  const MIcon = mod.icon;
  const date  = new Date(item.date + 'T12:00:00');
  const strip = MOD_STRIP[item.module] || 'bg-slate-500';
  const accent = MOD_ACCENT[item.module] || 'text-slate-400';

  return (
    <div className={`rounded-2xl border overflow-hidden transition-all ${
      item.done  ? 'opacity-55 border-slate-700/30 bg-slate-800/20'
      : isToday  ? 'border-brand-500/40 bg-slate-800 ring-1 ring-brand-500/20'
      :            `${mod.border} bg-slate-800/50 hover:bg-slate-800/70`
    }`}>
      <div className="flex">
        {/* Left color strip */}
        <div className={`w-1 flex-shrink-0 ${item.done ? 'bg-slate-700' : strip}`} />

        <div className="flex-1 p-3.5">
          {/* Top row: date | module | level | priority | done */}
          <div className="flex items-start gap-2.5 mb-2.5">
            <div className="text-center w-9 flex-shrink-0 pt-0.5">
              <div className={`text-[10px] font-bold uppercase tracking-wide ${isToday ? 'text-brand-400' : 'text-slate-500'}`}>
                {DAY_NAMES[date.getDay()]}
              </div>
              <div className={`text-lg font-bold leading-none mt-0.5 ${isToday ? 'text-white' : isPast ? 'text-slate-500' : 'text-slate-300'}`}>
                {date.getDate()}
              </div>
            </div>

            <div className={`w-8 h-8 rounded-xl bg-gradient-to-br ${mod.color} p-1.5 flex-shrink-0`}><MIcon /></div>

            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5 flex-wrap mb-1">
                <span className={`text-xs font-semibold ${item.done ? 'text-slate-500' : 'text-white'}`}>{mod.title}</span>
                <span className={`text-[10px] px-1.5 py-0.5 rounded-full border ${LEVEL_COLORS[item.level] || ''}`}>{item.level}</span>
                {isToday && <span className="text-[10px] font-semibold text-brand-400 bg-brand-500/10 px-1.5 py-0.5 rounded-full">Today</span>}
                {item.priority === 'high' && !item.done && (
                  <span className="text-[10px] font-semibold text-red-400">↑ Priority</span>
                )}
              </div>
              <p className={`text-sm font-semibold leading-snug ${item.done ? 'line-through text-slate-500' : 'text-white'}`}>
                {item.title}
              </p>
            </div>

            <button onClick={onToggleDone}
              className={`w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-all mt-0.5 ${item.done ? 'bg-brand-500 border-brand-500' : 'border-slate-600 hover:border-brand-400'}`}>
              {item.done && <div className="w-3.5 h-3.5 text-white"><Icons.Check /></div>}
            </button>
          </div>

          {/* Goal */}
          <p className="text-xs text-slate-400 leading-relaxed mb-2.5">{item.goal}</p>

          {/* Strategy (expandable) */}
          {item.strategy && (
            <>
              <button onClick={() => setExpanded(e => !e)}
                className={`flex items-center gap-1.5 text-[11px] font-medium transition-colors ${accent}`}>
                <span>💡</span>
                <span>{expanded ? 'Hide strategy' : 'Practice strategy'}</span>
                <div className={`w-3 h-3 transition-transform ${expanded ? 'rotate-90' : ''}`}><Icons.ChevronRight /></div>
              </button>
              {expanded && (
                <div className="mt-2 text-xs text-slate-300 leading-relaxed bg-slate-900/60 border border-slate-700/40 rounded-xl p-3 slide-up">
                  {item.strategy}
                </div>
              )}
            </>
          )}

          {item.duration && <p className="text-[10px] text-slate-600 mt-2">{item.duration}</p>}
        </div>
      </div>
    </div>
  );
}

function StudyPlan({ plan, savePlan, profile, sessions, apiKey, onNeedApiKey }) {
  const todayStr = new Date().toISOString().split('T')[0];
  const [generating, setGenerating] = useState(false);
  const [genError, setGenError]     = useState('');

  const isNewFormat = plan?.bottleneck !== undefined;

  const generatePlan = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    setGenerating(true); setGenError('');

    // Build session history string
    const sorted  = [...sessions].sort((a,b) => new Date(a.date) - new Date(b.date));
    const history = sorted.length
      ? sorted.map(s => {
          const d   = new Date(s.date).toLocaleDateString('en-US', { month:'short', day:'numeric' });
          const mod = { placement:'Vocab Level Test', 'word-recognition':'Words', transcription:'Sentences', structure:'Phrases', discourse:'Speeches & Dialogues' }[s.module] || s.module;
          const tags = s.weakTags?.length ? `weak: ${s.weakTags.join(', ')}` : 'no weak tags';
          return `• ${d} | ${mod} | Level ${s.level} | Score ${s.score}/100 | ${tags}`;
        }).join('\n')
      : 'No sessions completed yet — generate a starter plan for this learner.';

    // Per-module performance summary
    const modStats = {};
    sessions.forEach(s => {
      if (!modStats[s.module]) modStats[s.module] = { scores:[], tags:[] };
      modStats[s.module].scores.push(s.score);
      modStats[s.module].tags.push(...(s.weakTags||[]));
    });
    const statsLines = Object.entries(modStats).map(([m, d]) => {
      const avg  = Math.round(d.scores.reduce((a,b)=>a+b,0) / d.scores.length);
      const tags = [...new Set(d.tags)].slice(0,6);
      const label = { placement:'Level Check', 'word-recognition':'Fonética', transcription:'Dictado', structure:'Estructura', discourse:'Discurso' }[m] || m;
      return `${label}: avg ${avg}/100 across ${d.scores.length} session(s)${tags.length ? `; recurring weak tags: ${tags.join(', ')}` : ''}`;
    });

    // Speed log
    const speedLog   = loadJSON('oido_speed_sessions', {});
    const speedLines = Object.entries(speedLog).map(([lvl, ss]) => {
      const r = ss.slice(-4);
      return `Level ${lvl}: last ${r.length} speed sessions — rates: ${r.map(s=>s.rate+'×').join(', ')}, scores: ${r.map(s=>s.score).join(', ')}`;
    });

    const system = `You are a Spanish listening fluency coach generating a personalized, data-driven study plan. Return ONLY valid JSON — no markdown, no code fences, no commentary.`;

    const prompt = `This user is training their Spanish listening fluency through three stages: vocabulary recognition (Stage 1), decoding of natural utterances (Stage 2), and real-time comprehension at native speed (Stage 3). Based on the session history below — including scores, weak tags, levels, and dates — generate a prioritized 7-day study plan. The plan should:
- Identify which stage is the user's current bottleneck
- Reference specific recurring weak tags by name
- Recommend which module to prioritize each day and at which level setting
- Suggest concrete practice strategies for the user's specific weak areas (e.g. if "clitic clusters" is a recurring tag, suggest specific practice approaches for that exact pattern)
- Note any areas where scores show improvement across sessions
- Recommend a target speed setting for the next Real-time Comprehension session if applicable

LEARNER PROFILE:
• Current level: ${profile.level}
• Total sessions completed: ${sessions.length}

MODULE PERFORMANCE SUMMARY:
${statsLines.length ? statsLines.join('\n') : 'No session data yet.'}

SPEED TRAINING LOG:
${speedLines.length ? speedLines.join('\n') : 'No speed sessions yet.'}

FULL SESSION LOG (chronological):
${history}

Return ONLY this JSON structure:
{
  "bottleneck": {
    "module": "vocabulary|structure|speed",
    "stageLabel": "Words|Phrases|Sentences|Speeches & Dialogues",
    "summary": "2-3 sentences: what the data shows, why this stage is the bottleneck, what specific patterns explain the low scores",
    "recurringWeakTags": ["exact weak tag strings from the session log — copy them verbatim"],
    "improvementNote": "One sentence noting any area showing improvement across sessions, or null if none"
  },
  "days": [
    {
      "module": "vocabulary|structure|speed",
      "level": "A1|A2|B1|B2|C1",
      "title": "Specific descriptive title (5-8 words, e.g. 'Clitic Cluster Recognition Sprint')",
      "goal": "One sentence: what exactly to do in this session",
      "strategy": "2-3 sentences of specific, actionable practice advice tied directly to this user's weak tags — NOT generic advice. Name the exact pattern, explain the failure mode, and give a concrete technique.",
      "duration": "~15 min",
      "priority": "high|medium|low"
    }
  ],
  "speedNote": "Specific speed recommendation for the next Velocidad session with reasoning (e.g. 'Your last two sessions at 0.85× scored 82 and 87 — try 0.90× next time'), or null"
}

Generate exactly 7 day entries. Start from today. Vary the modules thoughtfully — don't do the same module 7 days in a row unless the data strongly justifies it.`;

    try {
      const raw  = await callClaude(apiKey, system, prompt, 3072);
      const m    = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON found in response');
      const parsed = JSON.parse(m[0]);
      if (!Array.isArray(parsed.days)) throw new Error('Response missing days array');

      const items = parsed.days.slice(0, 7).map((day, i) => {
        const d = new Date(); d.setDate(d.getDate() + i);
        return { ...day, date: d.toISOString().split('T')[0], done: false };
      });

      savePlan({
        generated:  new Date().toISOString(),
        bottleneck: parsed.bottleneck || null,
        items,
        speedNote:  parsed.speedNote || null,
      });
    } catch(e) {
      setGenError(e.message);
    } finally {
      setGenerating(false);
    }
  }, [apiKey, sessions, profile, onNeedApiKey, savePlan]);

  const toggleDone = useCallback((idx) => {
    if (!plan) return;
    savePlan({ ...plan, items: plan.items.map((item,i) => i===idx ? { ...item, done:!item.done } : item) });
  }, [plan, savePlan]);

  return (
    <div className="fade-in space-y-5">

      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-white">Study Plan</h2>
          <p className="text-xs text-slate-400 mt-0.5">AI-generated from your session data</p>
        </div>
        <button onClick={generatePlan} disabled={generating}
          className="flex items-center gap-1.5 text-xs font-medium bg-brand-600 hover:bg-brand-500 disabled:opacity-50 text-white px-3 py-2 rounded-lg transition-colors">
          {generating
            ? <div className="w-3 h-3 rounded-full border-2 border-white/30 border-t-white spin" />
            : <div className="w-3.5 h-3.5"><Icons.Sparkles /></div>}
          {plan ? 'Regenerate' : 'Generate Plan'}
        </button>
      </div>

      {/* Error */}
      {genError && (
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 flex gap-2 items-start">
          <span className="flex-shrink-0 text-sm">⚠️</span>
          <p className="text-red-300 text-xs leading-relaxed">{genError}</p>
        </div>
      )}

      {/* States */}
      {!plan && !generating ? (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-center">
          <div className="w-14 h-14 text-slate-600"><Icons.Calendar /></div>
          <div>
            <p className="text-slate-300 font-medium text-sm">No plan yet</p>
            <p className="text-slate-500 text-xs mt-1 max-w-[260px]">
              {sessions.length
                ? `Claude will analyze your ${sessions.length} session${sessions.length>1?'s':''} and build a personalized 7-day plan.`
                : 'Complete a session, or generate a starter plan for your level.'}
            </p>
          </div>
          <button onClick={generatePlan}
            className="bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors">
            {sessions.length ? 'Generate My Plan' : 'Generate Starter Plan'}
          </button>
        </div>

      ) : generating ? (
        <div className="flex flex-col items-center justify-center py-16 gap-4">
          <div className="w-10 h-10 rounded-full border-4 border-brand-500/30 border-t-brand-500 spin" />
          <div className="text-center">
            <p className="text-white font-semibold text-sm">Analyzing your sessions…</p>
            <p className="text-slate-500 text-xs mt-1">Claude is reading your history and building your plan</p>
          </div>
        </div>

      ) : isNewFormat ? (
        <>
          {/* ── Bottleneck card ── */}
          {plan.bottleneck && (() => {
            const mod   = MOD_CFG[plan.bottleneck.module] || MOD_CFG.vocabulary;
            const MIcon = mod.icon;
            return (
              <div className={`bg-slate-800/70 border ${mod.border} rounded-2xl p-4 space-y-3`}>
                <div className="flex items-center gap-3">
                  <div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${mod.color} p-2.5 flex-shrink-0`}><MIcon /></div>
                  <div>
                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-0.5">Current Bottleneck</p>
                    <p className="text-white font-bold text-sm leading-snug">{plan.bottleneck.stageLabel}</p>
                  </div>
                </div>

                <p className="text-slate-300 text-xs leading-relaxed">{plan.bottleneck.summary}</p>

                {plan.bottleneck.recurringWeakTags?.length > 0 && (
                  <div>
                    <p className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider mb-1.5">Recurring weak spots</p>
                    <div className="flex flex-wrap gap-1.5">
                      {plan.bottleneck.recurringWeakTags.map(t => (
                        <span key={t} className="text-[11px] bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg px-2 py-0.5">{t}</span>
                      ))}
                    </div>
                  </div>
                )}

                {plan.bottleneck.improvementNote && (
                  <div className="flex gap-2 items-start bg-green-500/8 border border-green-500/20 rounded-xl p-2.5">
                    <span className="text-sm flex-shrink-0">📈</span>
                    <p className="text-green-300/80 text-xs leading-relaxed">{plan.bottleneck.improvementNote}</p>
                  </div>
                )}
              </div>
            );
          })()}

          {/* ── Speed recommendation ── */}
          {plan.speedNote && (
            <div className="bg-amber-500/8 border border-amber-500/20 rounded-xl p-3.5 flex gap-2.5 items-start">
              <div className="w-4 h-4 text-amber-400 flex-shrink-0 mt-0.5"><Icons.Zap /></div>
              <div>
                <p className="text-[10px] font-bold text-amber-500 uppercase tracking-wider mb-1">Speed Recommendation</p>
                <p className="text-amber-200/80 text-xs leading-relaxed">{plan.speedNote}</p>
              </div>
            </div>
          )}

          {/* ── Day cards ── */}
          <div className="space-y-2.5">
            {plan.items.map((item, idx) => (
              <DayCard key={idx} item={item}
                isToday={item.date === todayStr}
                isPast={item.date < todayStr}
                onToggleDone={() => toggleDone(idx)}
              />
            ))}
          </div>

          <p className="text-xs text-slate-600 text-center pb-1">
            Generated {new Date(plan.generated).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
            {' '}· Tap ✓ to mark done · Tap "Practice strategy" for targeted tips
          </p>
        </>

      ) : (
        /* Old format */
        <div className="text-center py-10">
          <p className="text-slate-400 text-sm mb-3">Plan format updated — regenerate to get the AI-powered version.</p>
          <button onClick={generatePlan}
            className="bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium px-5 py-2 rounded-xl transition-colors">
            Regenerate
          </button>
        </div>
      )}
    </div>
  );
}

// ─── SESSION HISTORY ──────────────────────────────────────────────────────────
function SessionHistory({ sessions, onClear }) {
  const [filterModule, setFilterModule] = useState('all');
  const [confirmClear, setConfirmClear] = useState(false);
  const [view, setView] = useState('list'); // 'list' | 'charts'

  const filtered = filterModule==='all' ? sessions : sessions.filter(s=>s.module===filterModule);
  const grouped  = useMemo(() => {
    const groups = {};
    filtered.forEach(s => {
      const key = new Date(s.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      if (!groups[key]) groups[key]=[];
      groups[key].push(s);
    });
    return Object.entries(groups);
  }, [filtered]);

  // Chronological chart data — one point per session; null gaps for connectNulls
  const chartData = useMemo(() =>
    [...sessions].sort((a,b) => new Date(a.date) - new Date(b.date))
      .map((s,i) => ({
        n: i + 1,
        date: new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        vocabulary: s.module==='vocabulary' ? s.score : null,
        structure:  s.module==='structure'  ? s.score : null,
        discourse:  s.module==='discourse'   ? s.score : null,
      })),
    [sessions]
  );

  // Speed progression chart
  const speedData = useMemo(() => {
    const log = loadJSON('oido_speed_sessions', {});
    return Object.entries(log)
      .flatMap(([lvl, ss]) => ss.map((s,i) => ({ lvl, rate: s.rate, score: s.score, date: s.date })))
      .sort((a,b) => new Date(a.date) - new Date(b.date))
      .map((d, i) => ({ ...d, idx: i+1, label: new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) }));
  }, []);

  // Recharts (CDN global)
  const RC = typeof Recharts !== 'undefined' ? Recharts : {};
  const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = RC;

  return (
    <div className="fade-in space-y-5">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-white">Session History</h2>
          <p className="text-xs text-slate-400 mt-0.5">{sessions.length} sessions recorded</p>
        </div>
        {sessions.length > 0 && (
          <button onClick={() => setConfirmClear(true)} className="w-7 h-7 text-slate-500 hover:text-red-400 transition-colors">
            <Icons.Trash />
          </button>
        )}
      </div>

      {confirmClear && (
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-center gap-3">
          <div className="flex-1 text-sm text-red-300">Clear all session history?</div>
          <button onClick={() => { onClear(); setConfirmClear(false); }} className="text-xs font-semibold text-red-400 hover:text-red-300 px-2 py-1 rounded">Yes</button>
          <button onClick={() => setConfirmClear(false)} className="text-xs text-slate-400 hover:text-white px-2 py-1 rounded">Cancel</button>
        </div>
      )}

      {sessions.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-20 gap-3 text-center">
          <div className="w-12 h-12 text-slate-600"><Icons.History /></div>
          <p className="text-slate-500 text-sm">No sessions yet — complete a module to see history here.</p>
        </div>
      ) : (
        <>
          {/* View toggle */}
          <div className="flex gap-1 bg-slate-800/60 rounded-xl p-1 border border-slate-700/40">
            {[['list','Sessions'],['charts','Charts']].map(([v,label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`flex-1 text-xs font-semibold py-1.5 rounded-lg transition-colors ${view===v ? 'bg-slate-600 text-white' : 'text-slate-400 hover:text-white'}`}>
                {label}
              </button>
            ))}
          </div>

          {/* ── CHARTS VIEW ── */}
          {view === 'charts' && (
            <div className="space-y-5">
              {/* Per-module averages */}
              <div className="grid grid-cols-3 gap-2">
                {MODULES.map(mod => {
                  const ss = sessions.filter(s => s.module === mod.id);
                  if (!ss.length) return (
                    <div key={mod.id} className={`bg-slate-800/30 border border-slate-700/30 rounded-xl p-3 text-center opacity-40`}>
                      <div className="text-lg font-bold text-slate-500">—</div>
                      <div className={`text-[10px] ${mod.accent} font-medium mt-0.5`}>{mod.title}</div>
                    </div>
                  );
                  const sorted = [...ss].sort((a,b) => new Date(a.date)-new Date(b.date));
                  const avg    = Math.round(sorted.reduce((a,s)=>a+s.score,0)/sorted.length);
                  const trend  = sorted.length >= 2 ? sorted[sorted.length-1].score - sorted[0].score : 0;
                  const trendIcon  = trend > 5 ? '↑' : trend < -5 ? '↓' : '→';
                  const trendColor = trend > 5 ? 'text-green-400' : trend < -5 ? 'text-red-400' : 'text-slate-500';
                  return (
                    <div key={mod.id} className={`bg-slate-800/50 border ${mod.border} rounded-xl p-3 text-center`}>
                      <div className={`text-xl font-bold ${avg >= 70 ? 'text-white' : 'text-red-300'}`}>{avg}</div>
                      <div className={`text-[10px] ${mod.accent} font-medium mt-0.5`}>{mod.title}</div>
                      <div className={`text-[10px] font-semibold mt-1 ${trendColor}`}>{trendIcon} {ss.length} sessions</div>
                    </div>
                  );
                })}
              </div>

              {/* Score line chart */}
              {LineChart && chartData.length > 1 && (
                <div className="bg-slate-800/50 border border-slate-700/40 rounded-2xl p-4">
                  <p className="text-sm font-semibold text-white mb-0.5">Scores Over Time</p>
                  <p className="text-xs text-slate-500 mb-4">All sessions, chronological</p>
                  <div style={{ height: 190 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={chartData} margin={{ top:4, right:8, bottom:4, left:-18 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                        <XAxis dataKey="n" tick={{ fill:'#475569', fontSize:10 }} tickLine={false} label={{ value:'Session #', position:'insideBottomRight', fill:'#475569', fontSize:9, dy:6 }} />
                        <YAxis domain={[0,100]} tick={{ fill:'#475569', fontSize:10 }} tickLine={false} axisLine={false} />
                        <Tooltip
                          contentStyle={{ background:'#1e293b', border:'1px solid #334155', borderRadius:'0.5rem', fontSize:'12px', color:'#f1f5f9' }}
                          labelStyle={{ color:'#94a3b8' }}
                          labelFormatter={n => `Session ${n} · ${chartData[n-1]?.date || ''}`}
                          formatter={(v,name) => [v, name.charAt(0).toUpperCase()+name.slice(1)]}
                        />
                        <ReferenceLine y={70} stroke="#334155" strokeDasharray="4 2" />
                        <Line isAnimationActive={false} type="monotone" dataKey="vocabulary" name="vocabulary" stroke="#38bdf8" strokeWidth={2} dot={(p) => p.value!=null ? <circle key={p.index} cx={p.cx} cy={p.cy} r={5} fill="#38bdf8" /> : null} connectNulls activeDot={{ r:6, fill:'#38bdf8' }} />
                        <Line isAnimationActive={false} type="monotone" dataKey="structure"  name="structure"  stroke="#a78bfa" strokeWidth={2} dot={(p) => p.value!=null ? <circle key={p.index} cx={p.cx} cy={p.cy} r={5} fill="#a78bfa" /> : null} connectNulls activeDot={{ r:6, fill:'#a78bfa' }} />
                        <Line isAnimationActive={false} type="monotone" dataKey="speed"      name="speed"      stroke="#fbbf24" strokeWidth={2} dot={(p) => p.value!=null ? <circle key={p.index} cx={p.cx} cy={p.cy} r={5} fill="#fbbf24" /> : null} connectNulls activeDot={{ r:6, fill:'#fbbf24' }} />
                        <Legend iconType="circle" iconSize={7} wrapperStyle={{ fontSize:'11px', paddingTop:'8px' }} formatter={v => <span style={{color:'#94a3b8'}}>{v.charAt(0).toUpperCase()+v.slice(1)}</span>} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              )}

              {/* Speed rate chart */}
              {LineChart && speedData.length > 0 && (
                <div className="bg-slate-800/50 border border-amber-500/20 rounded-2xl p-4">
                  <p className="text-sm font-semibold text-white mb-0.5">Velocidad — Speed Progression</p>
                  <p className="text-xs text-slate-500 mb-4">Playback rate per session</p>
                  <div style={{ height: 155 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={speedData} margin={{ top:4, right:8, bottom:4, left:-8 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                        <XAxis dataKey="idx" tick={{ fill:'#475569', fontSize:10 }} tickLine={false} />
                        <YAxis domain={[0.65, 1.25]} tick={{ fill:'#475569', fontSize:9 }} tickLine={false} axisLine={false} tickFormatter={v => v.toFixed(2)+'×'} />
                        <Tooltip
                          contentStyle={{ background:'#1e293b', border:'1px solid #334155', borderRadius:'0.5rem', fontSize:'12px', color:'#f1f5f9' }}
                          formatter={(v,n) => [v.toFixed(2)+'×', 'Rate']}
                          labelFormatter={i => `Session ${i} · ${speedData[i-1]?.label||''}`}
                        />
                        <ReferenceLine y={1.0} stroke="#475569" strokeDasharray="4 2" label={{ value:'Native', position:'insideTopRight', fill:'#475569', fontSize:9 }} />
                        <Line isAnimationActive={false} type="monotone" dataKey="rate" stroke="#fbbf24" strokeWidth={2.5} dot={(p) => p.value!=null ? <circle key={p.index} cx={p.cx} cy={p.cy} r={5} fill="#fbbf24" /> : null} activeDot={{ r:6, fill:'#fbbf24' }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              )}

              {!LineChart && (
                <div className="text-center py-6 text-slate-500 text-xs">Charts loading… (requires Recharts CDN)</div>
              )}
            </div>
          )}

          {/* ── LIST VIEW ── */}
          {view === 'list' && (
            <>
              <div className="flex gap-2 overflow-x-auto pb-1">
                <button onClick={() => setFilterModule('all')} className={`flex-shrink-0 text-xs font-medium px-3 py-1.5 rounded-lg border transition-all ${filterModule==='all'?'bg-slate-600 text-white border-slate-500':'text-slate-400 border-slate-700 hover:text-white'}`}>All</button>
                {MODULES.map(m => <button key={m.id} onClick={() => setFilterModule(m.id)} className={`flex-shrink-0 text-xs font-medium px-3 py-1.5 rounded-lg border transition-all ${filterModule===m.id?`${m.badge} border-transparent`:'text-slate-400 border-slate-700 hover:text-white'}`}>{m.title}</button>)}
              </div>

              {filtered.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-10 gap-3 text-center">
                  <p className="text-slate-500 text-sm">No sessions for this module yet.</p>
                </div>
              ) : (
                <div className="space-y-5">
                  {grouped.map(([dateKey, daySessions]) => (
                    <div key={dateKey}>
                      <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">{dateKey}</div>
                      <div className="space-y-2">
                        {daySessions.map(s => {
                          const mod = MODULES.find(m => m.id===s.module);
                          return (
                            <div key={s.id} className="bg-slate-800/50 border border-slate-700/40 rounded-xl p-3.5">
                              <div className="flex items-center gap-3">
                                <div className={`w-9 h-9 rounded-lg bg-gradient-to-br ${mod?.color||'from-slate-600 to-slate-700'} p-2 flex-shrink-0`}>{mod && <mod.icon />}</div>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-2 mb-0.5">
                                    <span className="text-sm font-semibold text-white">{mod?.title||s.module}</span>
                                    <span className={`text-[10px] px-1.5 py-0.5 rounded-full border ${LEVEL_COLORS[s.level]}`}>{s.level}</span>
                                  </div>
                                  <div className="text-xs text-slate-500">{new Date(s.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
                                </div>
                                <ScoreRing score={s.score} size={40} />
                              </div>
                              {s.weakTags?.length > 0 && (
                                <div className="mt-2.5 flex flex-wrap gap-1">
                                  <span className="text-[10px] text-slate-500 mr-1">Weak:</span>
                                  {s.weakTags.map(tag => <span key={tag} className="text-[10px] bg-red-500/10 text-red-400 border border-red-500/20 rounded px-1.5 py-0.5">{tag}</span>)}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </>
      )}
    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({ tab, setTab }) {
  const tabs = [
    {id:'home',label:'Home',icon:Icons.Home},
    {id:'plan',label:'Plan',icon:Icons.Calendar},
    {id:'history',label:'History',icon:Icons.History},
  ];
  return (
    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800">
      <div className="max-w-md mx-auto flex">
        {tabs.map(t => {
          const active = tab===t.id;
          const TIcon = t.icon;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 flex flex-col items-center gap-1 py-3 transition-colors ${active?'text-brand-400':'text-slate-500 hover:text-slate-300'}`}>
              <div className={`w-5 h-5 transition-transform ${active?'scale-110':''}`}><TIcon /></div>
              <span className="text-[10px] font-medium">{t.label}</span>
            </button>
          );
        })}
      </div>
    </nav>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState('home');
  const [activeModule, setActiveModule] = useState(null);
  const [activeLevel,  setActiveLevel]  = useState(null);
  const [wordList, setWordList]     = useState([]);
  const [wordListLoading, setWordListLoading] = useState(true);
  const [wordListError, setWordListError]     = useState('');
  // API key lives in .env and is handled by proxy.py — not stored in the browser.
  const apiKey = 'proxy';
  const [showOnboarding, setShowOnboarding]   = useState(() => !localStorage.getItem('oido_onboarded'));
  const [lightMode, setLightMode] = useState(() => localStorage.getItem('oido_theme') === 'light');
  const toggleTheme = () => setLightMode(v => { const next = !v; localStorage.setItem('oido_theme', next ? 'light' : 'dark'); return next; });
  const { sessions, addSession }    = useSessions();
  const { profile, updateProfile }  = useProfile();
  const { plan, savePlan }          = usePlan();
  const { voiceLang, voiceLabel }   = useTTS();

  // Load word list on mount
  useEffect(() => {
    loadWordList()
      .then(words => { setWordList(words); setWordListLoading(false); })
      .catch(e => { setWordListError(e.message); setWordListLoading(false); });
  }, []);

  // Show API key modal if vocabulary module is opened without a key
  const handleNeedApiKey = useCallback(() => {}, []); // no-op: key is in .env

  const handleClearHistory = () => {
    saveJSON(KEYS.SESSIONS, []);
    window.location.reload();
  };

  const handleDismissOnboarding = () => {
    localStorage.setItem('oido_onboarded', '1');
    setShowOnboarding(false);
  };

  // Wordlist loading overlay
  if (wordListLoading) {
    return (
      <div className="min-h-screen bg-slate-900 flex items-center justify-center flex-col gap-4">
        <div className="w-10 h-10 rounded-full border-4 border-brand-500/30 border-t-brand-500 spin" />
        <p className="text-slate-400 text-sm">Loading frequency dictionary…</p>
      </div>
    );
  }

  if (wordListError) {
    return (
      <div className="min-h-screen bg-slate-900 flex items-center justify-center flex-col gap-4 px-8 text-center">
        <div className="text-3xl">⚠️</div>
        <p className="text-white font-semibold">Could not load word list</p>
        <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded px-3 py-2">{wordListError}</p>
        <p className="text-slate-500 text-xs">Make sure <code className="text-slate-300">wordlist.csv</code> is in the same directory as index.html and the server is running.</p>
      </div>
    );
  }

  return (
    <div className={`min-h-screen bg-slate-900${lightMode ? ' light-mode' : ''}`}>
      {showOnboarding && <OnboardingModal onDismiss={handleDismissOnboarding} />}

      {/* Theme toggle (top-left) */}
      <button
        onClick={toggleTheme}
        className="fixed top-4 left-4 z-40 w-8 h-8 rounded-full bg-slate-800/90 backdrop-blur border border-slate-700/50 flex items-center justify-center text-slate-400 hover:text-white transition-colors"
        title={lightMode ? 'Switch to dark mode' : 'Switch to light mode'}
      >
        {lightMode ? '🌙' : '☀️'}
      </button>

      {/* Voice indicator (top-right) */}
      {!activeModule && voiceLabel && (
        <div className="fixed top-4 right-4 z-40">
          <div className="flex items-center gap-1 bg-slate-800/90 backdrop-blur border border-slate-700/50 rounded-full pl-1.5 pr-2.5 py-1"
            title={voiceLabel}>
            <div className="w-3 h-3 text-slate-400 flex-shrink-0"><Icons.Volume /></div>
            <span className="text-[10px] text-slate-400 truncate">{voiceLang || voiceLabel}</span>
          </div>
        </div>
      )}

      <div className="max-w-md mx-auto px-4 pt-6 pb-28">
        {activeModule === 'placement' ? (
          <PlacementModule
            wordList={wordList}
            apiKey={apiKey}
            onBack={() => setActiveModule(null)}
            updateProfile={updateProfile}
          />
        ) : activeModule === 'word-recognition' ? (
          <WordRecognitionModule
            level={activeLevel ?? profile.level}
            apiKey={apiKey}
            onBack={() => setActiveModule(null)}
            addSession={addSession}
            onNeedApiKey={handleNeedApiKey}
          />
        ) : activeModule === 'transcription' ? (
          <DictadoModule
            level={activeLevel ?? profile.level}
            apiKey={apiKey}
            onBack={() => setActiveModule(null)}
            addSession={addSession}
            onNeedApiKey={handleNeedApiKey}
          />
        ) : activeModule === 'structure' ? (
          <EstructuraModule
            level={activeLevel ?? profile.level}
            apiKey={apiKey}
            onBack={() => setActiveModule(null)}
            addSession={addSession}
            onNeedApiKey={handleNeedApiKey}
          />
        ) : activeModule === 'discourse' ? (
          <DiscourseModule
            level={activeLevel ?? profile.level}
            apiKey={apiKey}
            onBack={() => setActiveModule(null)}
            addSession={addSession}
            onNeedApiKey={handleNeedApiKey}
          />
        ) : activeModule ? (
          <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] text-center gap-4 px-4">
            <div className="text-3xl">🚧</div>
            <p className="text-slate-300 text-sm">This module isn't available yet.</p>
            <button onClick={() => setActiveModule(null)} className="text-sm text-slate-400 hover:text-white underline">← Back</button>
          </div>
        ) : (
          <>
            {tab==='home'    && <HomeScreen profile={profile} updateProfile={updateProfile} sessions={sessions} onStartModule={(m,lvl)=>{setActiveModule(m);setActiveLevel(lvl);setTab('home');}} />}
            {tab==='plan'    && <StudyPlan plan={plan} savePlan={savePlan} profile={profile} sessions={sessions} apiKey={apiKey} onNeedApiKey={handleNeedApiKey} />}
            {tab==='history' && <SessionHistory sessions={sessions} onClear={handleClearHistory} />}
          </>
        )}
      </div>

      <BottomNav
        tab={activeModule ? 'home' : tab}
        setTab={t => { setActiveModule(null); setTab(t); }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
