  const generateOne = useCallback(async (qNum, _attempt = 0) => {
    const spec   = DICTADO_SPECS[level] || DICTADO_SPECS.B1;
    const topic  = DICTADO_TOPICS[qNum % DICTADO_TOPICS.length];
    const recent = getRecent();
    const usedList = usedSentences.current.length > 0
      ? `\n\nALREADY USED (do NOT repeat these sentences or their topics):\n${usedSentences.current.map((s,i) => `${i+1}. ${s}`).join('\n')}`
      : '';
    const system = `You are a Latin American Spanish language expert. Return ONLY valid JSON, no markdown, no code fences.`;
    const prompt = `Write 1 natural Latin American Spanish sentence for a CEFR ${level} dictation exercise.

TOPIC FOR THIS SENTENCE: ${topic} — the sentence must be about this topic.${usedList}${avoidRepeatInstruction(recent)}

STRICT REQUIREMENTS:
- Word count: ${spec.words} words HARD LIMIT — count every word before writing. If your sentence exceeds the limit, rewrite it shorter before responding. (contractions like "al" = 1 word)
- Tenses: ${spec.tenses}
- Vocabulary: ${spec.vocab}
- ${vocabInstruction(level)}
- Clause structure: ${spec.clauses}
- Style: ${spec.style}
- LEVEL EXAMPLES (match this difficulty exactly): ${spec.examples}

FORBIDDEN at ${level}:
${level === 'A1' ? '- No past tense, no future, no subjunctive\n- No idioms, no subordinate clauses\n- No reflexive verbs except "llamarse"\n- No word outside top 300 frequency' : ''}
${level === 'A2' ? '- No imperfect, no future, no subjunctive\n- No complex idioms\n- No word outside top 600 frequency' : ''}
${level === 'B1' ? '- No subjunctive\n- No regional slang\n- No more than one subordinate clause' : ''}

Return ONLY this JSON:
{
  "sentence": "The complete Spanish sentence with all accent marks and punctuation.",
  "sentenceEn": "Natural English translation.",
  "grammarNote": "One sentence explaining the most important or tricky grammar/vocabulary point in this sentence that a ${level} learner might miss. Be specific — mention the actual word or structure."
}`;

    try {
      const raw   = await callClaude(apiKey, system, prompt, 300);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('no JSON');
      const p = JSON.parse(match[0]);
      if (!p.sentence || !p.sentenceEn) throw new Error('missing fields');

      // Hard word count guard — reject strictly over the max
      const wc  = p.sentence.trim().split(/\s+/).length;
      const [lo, hi] = spec.words.split('–').map(Number);
      if (wc > hi) {
        if (_attempt < 3) return generateOne(qNum, _attempt + 1);
        throw new Error(`sentence too long (${wc} words) after retries`);
      }
      usedSentences.current.push(p.sentence);
      addItems([p.sentence]);
      return { sentence: p.sentence, sentenceEn: p.sentenceEn, grammarNote: p.grammarNote ?? '' };
    } catch(e) {
      if (_attempt < 2) return generateOne(qNum, _attempt + 1);
      throw e;
    }
  }, [apiKey, level]);

  const prefetchUpTo = useCallback(async (targetIdx) => {
    if (generatingRef.current) return;
    const end = Math.min(targetIdx, DICTADO_TOTAL);
    if (genIdxRef.current >= end) return;
    generatingRef.current = true;
    try {
      while (genIdxRef.current < end) {
        const idx = genIdxRef.current;
        bufRef.current[idx] = await generateOne(idx);
        genIdxRef.current++;
        setBufVersion(v => v + 1);
      }
    } catch(e) {
      setPhase('error');
    } finally {
      generatingRef.current = false;
    }
  }, [generateOne]);

  const startSession = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    bufRef.current = []; genIdxRef.current = 0; generatingRef.current = false; usedSentences.current = [];
    setCurrentIdx(0); setTypedText(''); setReplayCount(0);
    setSessionResults([]); setSessionDone(null);
    setPhase('generating');
    await prefetchUpTo(3);
    if (bufRef.current[0]) setPhase('listening');
  }, [apiKey, prefetchUpTo, onNeedApiKey]);

  // Auto-play when entering listening phase for a new question
  const playCurrentSentence = useCallback((idx) => {
    const q = bufRef.current[idx ?? currentIdx];
    if (!q) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    setIsPaused(false);
    speakSequence([{ text: q.sentence, rate: currentRate }], () => { setIsPlaying(false); setIsPaused(false); });
    playTimerRef.current = setTimeout(() => { setIsPlaying(false); setIsPaused(false); }, 20000);
  }, [speakSequence, currentRate, currentIdx]);

  const handlePauseResume = () => {
    if (isPaused) {
      resumeAudio();
      setIsPaused(false);
    } else {
      pauseAudio();
      setIsPaused(true);
    }
  };

  useEffect(() => {
    if (phase === 'listening') {
      setTypedText('');
      setReplayCount(0);
      playCurrentSentence(currentIdx);
    }
    return () => clearTimeout(playTimerRef.current);
  }, [phase, currentIdx, bufVersion]); // eslint-disable-line

  const handleReplay = () => {
    playCurrentSentence(currentIdx);
    setReplayCount(c => c + 1);
  };

  // Insert special character at cursor
  const insertChar = (ch) => {
    const el = textareaRef.current;
    if (!el) { setTypedText(t => t + ch); return; }
    const start = el.selectionStart;
    const end   = el.selectionEnd;
    const next  = typedText.slice(0, start) + ch + typedText.slice(end);
    setTypedText(next);
    requestAnimationFrame(() => {
      el.focus();
      el.setSelectionRange(start + ch.length, start + ch.length);
    });
  };

  const handleSubmit = () => {
    if (!typedText.trim()) return;
    const q       = bufRef.current[currentIdx];
    const aligned = alignWords(q.sentence, typedText.trim());
    const correct = aligned.filter(w => w.status === 'correct' || w.status === 'accent').length;
    const total   = aligned.length;
    const score   = Math.round((correct / total) * 100);
    const result  = { q, typed: typedText.trim(), aligned, score, replays: replayCount };

    cancel(); clearTimeout(playTimerRef.current); setIsPlaying(false);
    setSessionResults(prev => [...prev, result]);
    setPhase('revealed');

    // Auto-replay after short delay so user sees result before hearing
    setTimeout(() => {
      setIsPlaying(true);
      speakSequence([{ text: q.sentence, rate: currentRate }], () => setIsPlaying(false));
    }, 700);

    prefetchUpTo(currentIdx + 3);
  };

  const handleNext = () => {
    cancel(); clearTimeout(playTimerRef.current); setIsPlaying(false);
    const nextIdx = currentIdx + 1;
    if (nextIdx >= DICTADO_TOTAL) {
      const allResults = [...sessionResults];
      const avgScore   = Math.round(allResults.reduce((s, r) => s + r.score, 0) / allResults.length);
      setSessionDone({ avgScore, results: allResults });
      addSession({ module:'transcription', level, score: avgScore, weakTags: [], duration: null });
      setPhase('results');
    } else {
      setCurrentIdx(nextIdx);
      if (bufRef.current[nextIdx]) {
        setPhase('listening');
      } else {
        setPhase('loading_next');
        prefetchUpTo(nextIdx + 1).then(() => {
          if (bufRef.current[nextIdx]) setPhase('listening');
        });
      }
    }
  };

  // ── PHASE: init ──
  if (phase === 'init') return (
    <div className="fade-in flex flex-col gap-6 py-4">
      <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">
        <div className="w-4 h-4"><Icons.ArrowLeft /></div> Back
      </button>
      <div className="text-center py-4">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-rose-500 to-pink-600 p-4 mx-auto mb-4"><Icons.BookOpen /></div>
        <h1 className="text-2xl font-bold text-white mb-1">Dictado</h1>
        <p className="text-slate-400 text-sm mb-3">Sentences</p>
        <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl overflow-hidden">
        <p className="text-slate-300 text-sm leading-relaxed px-5 pt-4 pb-3">
          Hear a Spanish sentence and type exactly what you heard — word for word.
        </p>
        <button onClick={() => setShowHowItWorks(v => !v)} className="w-full flex items-center justify-between px-5 pb-3 text-xs text-slate-500 hover:text-slate-300 transition-colors">
          <span>How it works {showHowItWorks ? '▲' : '▼'}</span>
        </button>
        {showHowItWorks && (
          <div className="border-t border-slate-700/40 px-5 py-3 space-y-2.5">
            {[
              ['🔊','A sentence plays — replay as many times as you need'],
              ['✍️','Type exactly what you hear in the text box. Use the accent buttons to insert Spanish characters'],
              ['✅','Submit to see each word marked correct (green) or wrong (red). Missing accent marks are noted but not counted wrong'],
              ['📖','The sentence plays again automatically so you can hear while reading the correction'],
            ].map(([icon, text]) => (
              <div key={text} className="flex gap-3">
                <span className="text-base leading-5 flex-shrink-0">{icon}</span>
                <span className="text-slate-300 text-xs leading-5">{text}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <button onClick={startSession} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
        Start Session →
      </button>
    </div>
  );

  // ── PHASE: generating / loading_next ──
  if (phase === 'generating' || phase === 'loading_next') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-rose-500/30 border-t-rose-500 spin" />
      <div>
        <p className="text-white font-semibold">{phase === 'generating' ? 'Building your session…' : 'Loading next sentence…'}</p>
        <p className="text-slate-400 text-sm mt-1">
          {phase === 'generating' ? `Claude is writing ${DICTADO_TOTAL} sentences for ${level}` : `Sentence ${currentIdx + 1} of ${DICTADO_TOTAL}`}
        </p>
      </div>
    </div>
  );

  // ── PHASE: error ──
  if (phase === 'error') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <p className="text-white font-semibold">Something went wrong generating sentences.</p>
      <div className="flex gap-3">
        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>
        <button onClick={startSession} className="bg-rose-600 hover:bg-rose-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Try Again</button>
      </div>
    </div>
  );

  // ── PHASE: listening / revealed ──
  if ((phase === 'listening' || phase === 'revealed') && bufRef.current[currentIdx]) {
    const q = bufRef.current[currentIdx];
    const lastResult = sessionResults[sessionResults.length - 1];

    return (
      <div className="fade-in flex flex-col gap-4 py-4">
        {/* Progress bar */}
        <div>
          <div className="flex items-center justify-between text-xs text-slate-500 mb-1.5">
            <span>Sentence {currentIdx + 1} of {DICTADO_TOTAL}</span>
            {phase === 'listening' && replayCount > 0 && (
              <span className="text-rose-400/70">{replayCount} replay{replayCount > 1 ? 's' : ''}</span>
            )}
            {phase === 'revealed' && lastResult && (
              <span className={lastResult.score >= 80 ? 'text-green-400' : lastResult.score >= 50 ? 'text-amber-400' : 'text-red-400'}>
                {lastResult.score}% this sentence
              </span>
            )}
          </div>
          <div className="h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-rose-500 rounded-full transition-all duration-300"
              style={{ width:`${(currentIdx / DICTADO_TOTAL) * 100}%` }} />
          </div>
        </div>

        {/* Audio player card */}
        <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-5 text-center">
          {phase === 'revealed' && lastResult ? (
            <div className="space-y-3 text-left">
              {/* User's attempt — wrong words crossed out */}
              <div>
                <p className="text-xs text-slate-500 uppercase tracking-widest mb-1.5">Your attempt</p>
                <p className="text-sm leading-loose text-slate-300">
                  {lastResult.aligned.map((w, i) => (
                    <span key={i}>
                      {i > 0 && ' '}
                      {w.status === 'correct' || w.status === 'accent' ? (
                        <span className={w.status === 'accent' ? 'text-amber-300' : 'text-slate-300'}>{w.typed || w.word}</span>
                      ) : w.status === 'wrong' && w.typed ? (
                        <span className="text-red-400 line-through decoration-red-500">{w.typed}</span>
                      ) : w.status === 'missing' ? (
                        <span className="text-red-500 italic">___</span>
                      ) : null}
                    </span>
                  ))}
                </p>
              </div>
              {/* Correct sentence — always shown in green, never crossed out */}
              <div className="bg-green-500/10 border border-green-500/25 rounded-xl p-3">
                <p className="text-xs text-green-400/70 uppercase tracking-widest mb-1.5">Correct sentence</p>
                <p className="text-base font-medium leading-relaxed text-green-300">{q.sentence}</p>
              </div>
              <p className="text-slate-400 text-xs italic">{q.sentenceEn}</p>
              {lastResult.aligned.some(w => w.status === 'accent') && (
                <p className="text-amber-300/70 text-xs">
                  Underlined words: correct meaning, missing accent mark
                </p>
              )}
            </div>
          ) : (
            <div className="space-y-3">
              <p className="text-slate-400 text-xs uppercase tracking-widest">
                {isPlaying && !isPaused ? 'Playing…' : isPaused ? 'Paused' : 'Listen, then type what you heard'}
              </p>
              <div className="flex items-center justify-center gap-3">
                <button
                  onClick={() => playCurrentSentence(currentIdx)}
                  disabled={isPlaying && !isPaused}
                  className={`w-16 h-16 rounded-full flex items-center justify-center transition-all ${isPlaying && !isPaused ? 'bg-rose-500/30 scale-95' : 'bg-rose-500/20 hover:bg-rose-500/40 hover:scale-105 active:scale-95'} disabled:cursor-not-allowed`}
                >
                  <svg viewBox="0 0 24 24" fill="currentColor" className={`w-8 h-8 ${isPlaying && !isPaused ? 'text-rose-300' : 'text-rose-400'}`}>
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                </button>
                {isPlaying && (
                  <button
                    onClick={handlePauseResume}
                    className="w-10 h-10 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-all"
                  >
                    {isPaused
                      ? <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 text-slate-300"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      : <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 text-slate-300"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    }
                  </button>
                )}
              </div>
            </div>
          )}
          <div className="flex items-center justify-center gap-3 mt-3 pt-3 border-t border-slate-700/30">
            <span className="text-xs text-slate-500">Speed</span>
            <button onClick={rateStepDown} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">−</button>
            <span className="text-sm font-bold text-rose-400 min-w-[44px] text-center">{currentRate.toFixed(2)}×</span>
            <button onClick={rateStepUp} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">+</button>
          </div>
        </div>

        {/* Grammar note — after reveal */}
        {phase === 'revealed' && q.grammarNote && (
          <div className="bg-rose-500/8 border border-rose-500/20 rounded-xl p-3.5 flex gap-2 items-start slide-up">
            <span className="text-sm flex-shrink-0">📌</span>
            <p className="text-rose-200/80 text-xs leading-relaxed">{q.grammarNote}</p>
          </div>
        )}

        {/* Text input area — only during listening */}
        {phase === 'listening' && (
          <div className="space-y-2">
            <textarea
              ref={textareaRef}
              value={typedText}
              onChange={e => setTypedText(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); } }}
              placeholder="Type what you hear in Spanish…"
              rows={3}
              className="w-full bg-slate-800 border border-slate-600/50 rounded-xl px-4 py-3 text-white text-sm placeholder-slate-600 resize-none focus:outline-none focus:border-rose-500/50 focus:ring-1 focus:ring-rose-500/20"
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
            />
            {/* Special character bar */}
            <div className="flex flex-wrap gap-1.5">
              {SPECIAL_CHARS.map(ch => (
                <button
                  key={ch}
                  onMouseDown={e => { e.preventDefault(); insertChar(ch); }}
                  className="min-w-[36px] h-9 rounded-lg bg-slate-700 hover:bg-slate-600 active:bg-rose-700/60 text-slate-200 text-sm font-semibold transition-colors px-2"
                >
                  {ch}
                </button>
              ))}
            </div>
            <button
              onClick={handleSubmit}
              disabled={!typedText.trim()}
              className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-40 text-white font-semibold py-3.5 rounded-xl text-sm transition-colors"
            >
              Check Answer
            </button>
          </div>
        )}

        {/* Next button — after reveal */}
        {phase === 'revealed' && (
          <button onClick={handleNext} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors slide-up">
            {currentIdx < DICTADO_TOTAL - 1 ? 'Next Sentence →' : 'See Results →'}
          </button>
        )}
      </div>
    );
  }

  // ── PHASE: results ──
  if (phase === 'results' && sessionDone) {
    const { avgScore, results } = sessionDone;
    return (
      <div className="fade-in space-y-5 py-4">
        <div className="text-center">
          <ScoreRing score={avgScore} size={100} fontSize={18} />
          <h2 className="text-2xl font-bold text-white mt-3">
            {avgScore>=90?'Near-perfect transcription!':avgScore>=75?'Strong decoding':avgScore>=60?'Good progress':avgScore>=40?'Keep listening':'Needs more practice'}
          </h2>
          <p className="text-slate-400 text-sm mt-1">{avgScore}% avg accuracy · {level} · {currentRate.toFixed(2)}×</p>
        </div>

        <div className="space-y-3">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Sentence Review</p>
          {results.map((r, i) => {
            const wrong = r.aligned.filter(w => w.status === 'wrong' || w.status === 'missing').length;
            return (
              <div key={i} className={`rounded-xl p-3.5 border space-y-2 ${r.score >= 80 ? 'border-green-500/20 bg-green-500/5' : r.score >= 50 ? 'border-amber-500/20 bg-amber-500/5' : 'border-red-500/20 bg-red-500/5'}`}>
                <div className="flex items-start justify-between gap-2">
                  <p className="text-xs text-white leading-relaxed flex-1">
                    {r.aligned.map((w, j) => (
                      <span key={j}>
                        {j > 0 && ' '}
                        <span className={
                          w.status === 'correct'  ? 'text-green-400' :
                          w.status === 'accent'   ? 'text-amber-300' :
                          'text-red-400'
                        }>{w.word}</span>
                      </span>
                    ))}
                  </p>
                  <span className={`text-xs font-bold flex-shrink-0 ${r.score>=80?'text-green-400':r.score>=50?'text-amber-400':'text-red-400'}`}>{r.score}%</span>
                </div>
                {wrong > 0 && (
                  <p className="text-slate-500 text-[11px] italic">You wrote: "{r.typed}"</p>
                )}
                {r.q.grammarNote && wrong > 0 && (
                  <p className="text-rose-300/70 text-[11px] leading-relaxed">📌 {r.q.grammarNote}</p>
                )}
              </div>
            );
          })}
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onBack} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-3 rounded-2xl transition-colors">Home</button>
          <button onClick={startSession} className="flex-1 bg-rose-600 hover:bg-rose-500 text-white text-sm font-semibold py-3 rounded-2xl transition-colors">New Session →</button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── DISCOURSE MODULE (Stage 4) ───────────────────────────────────────────────
function DiscourseModule({ level, apiKey, onBack, addSession, onNeedApiKey }) {
  const numQ = (level === 'A1' || level === 'A2') ? 2 : 3;

  const [phase, setPhase]         = useState('init');
  const [showHowItWorks, setShowHowItWorks] = useState(false);
  const [currentRate, setCurrentRate]     = useState(() => LEVEL_SPEEDS[level] ?? 1.0);
  const [passage, setPassage]     = useState('');
  const [meta, setMeta]           = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [hasPlayed, setHasPlayed] = useState(false);
  const [replaysLeft, setReplaysLeft] = useState(0);
  const [answers, setAnswers]     = useState(() => Array(numQ).fill(''));
  const [sessionResult, setSessionResult] = useState(null);
  const [showPassage, setShowPassage]     = useState(false);
  const [errorMsg, setErrorMsg]   = useState('');
  const [submitError, setSubmitError] = useState('');
  const defaultLength = (level === 'A1' || level === 'A2') ? 'short' : 'medium';
  const [passageLength, setPassageLength] = useState(defaultLength);
  const playTimerRef   = useRef(null);
  const audioUrlRef    = useRef(null);
  const nextRef        = useRef(null);
  const isPregenRef    = useRef(false);
  const topicIdxRef    = useRef(0);
  const { speakSequence, cancel, fetchAudioStreaming, playUrlDirect } = useTTS();
  const { addItems, getRecent } = useContentHistory();

  const DISCOURSE_TOPICS = ['family','work','travel','food','health','weather','relationships','money','school','technology','sports','news','culture','humor'];

  const maxReplays = LEVEL_REPLAYS[level] ?? 0;

  const LENGTH_SPECS = {
    short:  { sentences: '3–5',   words: '30–55'   },
    medium: { sentences: '6–10',  words: '60–110'  },
    long:   { sentences: '12–16', words: '130–180' },
  };

  const buildQSpec = () => {
    const base = [
      `    {"question": "What was this passage mainly about? (Main idea — answer in English)", "type": "main_idea"}`,
      `    {"question": "A specific detail question — one thing mentioned that a careful listener would catch (answer in English)", "type": "detail"}`,
    ];
    if (numQ === 2) return base.join(',\n');
    const inf = level === 'B1'
      ? 'A simple inference — something clearly implied but not directly stated (answer in English)'
      : 'A challenging inference — implicit meaning, attitude, tone, or subtext requiring reading between the lines (answer in English)';
    return [...base, `    {"question": "${inf}", "type": "inference"}`].join(',\n');
  };

  // ── Background pre-generation of next passage ──
  const pregenerateNext = useCallback(async () => {
    if (isPregenRef.current || !apiKey) return;
    isPregenRef.current = true;
    try {
      const spec   = PASSAGE_SPECS[level];
      const lenSpec = LENGTH_SPECS[passageLength] || LENGTH_SPECS.medium;
      const topic  = DISCOURSE_TOPICS[topicIdxRef.current % DISCOURSE_TOPICS.length];
      topicIdxRef.current++;
      const recent = getRecent();
      const system = `You are generating a Latin American Spanish listening passage. Return ONLY valid JSON, no other text.`;
      const prompt = `Create a Latin American Spanish listening passage for a ${level} CEFR learner.

TOPIC: ${topic} — the passage must be specifically about this topic.
Sentence count: ${lenSpec.sentences} sentences — count before writing.
Word count: ${lenSpec.words} words — count before writing. Stay within range.
Tenses: ${spec.tenses}
Style: ${spec.style}${spec.critical ? `\nCRITICAL: ${spec.critical}` : ''}
${vocabInstruction(level)}${avoidRepeatInstruction(recent)}
Medium: Text-to-speech. Write for the ear: natural speech rhythms, not literary prose.
Latin American Spanish: use ustedes (not vosotros). Vocabulary from Mexico, Colombia, or Argentina. NOT Castilian.

Return this exact JSON:
{
  "title": "Descriptive English title (4–7 words)",
  "topic": "2–4 word English topic label",
  "passage": "The full Spanish passage. May be dialogue (speaker tags like 'Ana: ' or '— ') or narration. Natural punctuation.",
  "questions": [
${buildQSpec()}
  ],
  "keyPoints": ["${numQ === 2 ? '2–3' : '3–5'} key facts a successful listener should understand"]
}`;
      const raw    = await callClaude(apiKey, system, prompt, 2048);
      const m      = raw.match(/\{[\s\S]*\}/);
      if (!m) return;
      const parsed = JSON.parse(m[0]);
      if (!parsed.passage) return;
      addItems([parsed.passage.slice(0, 120)]);
      const audioUrl = await fetchAudioStreaming(parsed.passage, currentRate);
      nextRef.current = {
        passage: parsed.passage,
        meta: { title: parsed.title||'Passage', topic: parsed.topic||'conversation', questions: parsed.questions||[], keyPoints: parsed.keyPoints||[] },
        audioUrl,
      };
    } catch (e) {
      console.warn('[Discourse] pre-generation failed:', e.message);
    } finally {
      isPregenRef.current = false;
    }
  }, [apiKey, level, passageLength, currentRate, fetchAudioStreaming, numQ, getRecent, addItems]);

  // ── Generate passage ──
  const generatePassage = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    setPhase('generating');
    setErrorMsg(''); setHasPlayed(false); setShowPassage(false); setSessionResult(null);
    if (audioUrlRef.current) { URL.revokeObjectURL(audioUrlRef.current); audioUrlRef.current = null; }

    const spec   = PASSAGE_SPECS[level];
    const lenSpec = LENGTH_SPECS[passageLength] || LENGTH_SPECS.medium;
    const topic  = DISCOURSE_TOPICS[topicIdxRef.current % DISCOURSE_TOPICS.length];
    topicIdxRef.current++;
    const recent = getRecent();
    const system = `You are generating a Latin American Spanish listening passage. Return ONLY valid JSON, no other text.`;
    const prompt = `Create a natural Latin American Spanish listening passage for a ${level} CEFR learner.

TOPIC: ${topic} — the passage must be specifically about this topic.
Sentence count: ${lenSpec.sentences} sentences — count before writing.
Word count: ${lenSpec.words} words — count before writing. Stay within range.
Tenses: ${spec.tenses}
Style: ${spec.style}${spec.critical ? `\nCRITICAL: ${spec.critical}` : ''}
${vocabInstruction(level)}${avoidRepeatInstruction(recent)}
Medium: Text-to-speech. Write for the ear: natural speech rhythms, not literary prose.
Latin American Spanish: use ustedes (not vosotros). Vocabulary from Mexico, Colombia, or Argentina. NOT Castilian.

Return this exact JSON:
{
  "title": "Descriptive English title (4–7 words)",
  "topic": "2–4 word English topic label",
  "passage": "The full Spanish passage. May be dialogue (speaker tags like 'Ana: ' or '— ') or narration. Natural punctuation.",
  "questions": [
${buildQSpec()}
  ],
  "keyPoints": ["${numQ === 2 ? '2–3' : '3–5'} key facts a successful listener should understand"]
}`;

    try {
      const raw    = await callClaude(apiKey, system, prompt, 2048);
      const m      = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON in response');
      const parsed = JSON.parse(m[0]);
      if (!parsed.passage) throw new Error('Missing passage field');

      addItems([parsed.passage.slice(0, 120)]); // store topic fingerprint
      setPassage(parsed.passage);
      setMeta({ title: parsed.title||'Passage', topic: parsed.topic||'conversation', questions: parsed.questions||[], keyPoints: parsed.keyPoints||[] });
      setReplaysLeft(maxReplays);
      setAnswers(Array(numQ).fill(''));

      setPhase('preparing_audio');
      const url = await fetchAudioStreaming(parsed.passage, currentRate);
      audioUrlRef.current = url;
      setPhase('listening');
    } catch(e) { setErrorMsg(e.message); setPhase('error'); }
  }, [apiKey, level, passageLength, maxReplays, currentRate, fetchAudioStreaming, onNeedApiKey, numQ, getRecent, addItems]);

  // ── Playback ──
  const playPassage = useCallback(() => {
    if (!passage && !audioUrlRef.current) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    const onDone = () => { setIsPlaying(false); setHasPlayed(true); };
    if (audioUrlRef.current) {
      // Use pre-fetched / streaming URL — no extra network round-trip
      playUrlDirect(audioUrlRef.current, onDone);
    } else {
      // Fallback: fetch fresh (shouldn't normally happen)
      speakSequence([{ text: passage, rate: currentRate }], onDone);
    }
    const words = (passage || '').split(/\s+/).length;
    const ms = (words / 155) * 60000 / currentRate * 1.35 + 2500;
    playTimerRef.current = setTimeout(() => { setIsPlaying(false); setHasPlayed(true); }, ms);
  }, [passage, currentRate, speakSequence, playUrlDirect]);

  // Auto-play as soon as we enter listening phase — audio is already ready.
  // Also kick off background pre-generation of the next passage.
  useEffect(() => {
    if (phase === 'listening') {
      const t = setTimeout(playPassage, 150);
      pregenerateNext(); // fire-and-forget
      return () => clearTimeout(t);
    }
    return () => clearTimeout(playTimerRef.current);
  }, [phase]); // eslint-disable-line

  const handleReplay = () => {
    playPassage();
  };

  // ── Evaluate ──
  const handleSubmit = async () => {
    setSubmitError('');
    setPhase('evaluating');

    const qs = meta?.questions || [];
    const kp = meta?.keyPoints || [];
    const qLines = qs.map((q, i) => {
      const label = q.type === 'main_idea' ? 'Main idea' : q.type === 'inference' ? 'Inference' : 'Detail';
      return `${i+1}. [${label}] ${q.question}\n   → "${answers[i] || '(no answer)'}"`;
    }).join('\n\n');

    const system = `You are evaluating a Spanish listening comprehension exercise. Return ONLY valid JSON.`;
    const prompt = `A ${level} CEFR Spanish learner listened to this passage at ${currentRate.toFixed(2)}× speed.

PASSAGE:
${passage}

KEY POINTS (what a successful listener should catch):
${kp.map((k,i) => `${i+1}. ${k}`).join('\n')}

QUESTIONS AND USER ANSWERS:
${qLines}

Evaluate holistically. At ${currentRate.toFixed(2)}× without text, partial understanding is normal at ${level}. Give credit for partial understanding. Penalize only for things completely missed or reversed.

Score rubric: 90–100 = excellent, 75–89 = good, 60–74 = partial, 40–59 = fragments only, 0–39 = breakdown.

Return ONLY this JSON (questionResults must have exactly ${numQ} entries):
{
  "score": 0-100,
  "feedback": "2–3 sentences: name what they caught, what they missed, and a specific observation about their listening at this speed/level",
  "questionResults": [${Array.from({length: numQ}, () => '\n    {"correct": true, "partialCredit": 1.0, "feedback": "one sentence specific assessment"}').join(',')}
  ],
  "weakTags": ["tags from: lost detail at speed | missed implied meaning | vocabulary gap | misread register or tone | missed discourse structure | pronoun/clitic confusion | tense confusion"],
  "strengths": "One sentence about what they understood well — be specific"
}`;

    let result;
    try {
      const raw = await callClaude(apiKey, system, prompt, 1024);
      const m   = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON');
      result = JSON.parse(m[0]);
    } catch(_) {
      const filled = answers.filter(a => a.trim()).length;
      result = {
        score: Math.round((filled / numQ) * 55),
        feedback: 'Could not evaluate automatically. Score estimated from completion.',
        questionResults: Array(numQ).fill({ correct: false, partialCredit: 0.5, feedback: 'Auto-eval unavailable' }),
        weakTags: [],
        strengths: 'You completed the session.',
      };
    }

    const score    = Math.max(0, Math.min(100, result.score || 0));
    const weakTags = result.weakTags || [];
    setSessionResult({ score, ...result });
    addSession({ module: 'discourse', level, score, weakTags, duration: null });
    setShowPassage(true);
    setPhase('results');
  };

  const handleReset = () => {
    cancel(); clearTimeout(playTimerRef.current);
    isPregenRef.current = false; nextRef.current = null;
    if (audioUrlRef.current) { URL.revokeObjectURL(audioUrlRef.current); audioUrlRef.current = null; }
    setPassage(''); setMeta(null); setIsPlaying(false); setHasPlayed(false);
    setReplaysLeft(0); setAnswers(Array(numQ).fill(''));
    setSessionResult(null); setShowPassage(false);
    setErrorMsg(''); setSubmitError(''); setPhase('init');
  };

  const handleNewSession = () => {
    cancel(); clearTimeout(playTimerRef.current);
    const next = nextRef.current;
    isPregenRef.current = false; nextRef.current = null;
    setIsPlaying(false); setHasPlayed(false); setShowPassage(false);
    setSessionResult(null); setErrorMsg(''); setSubmitError('');
    setAnswers(Array(numQ).fill(''));
    if (next) {
      setPassage(next.passage);
      setMeta(next.meta);
      setReplaysLeft(maxReplays);
      if (audioUrlRef.current) URL.revokeObjectURL(audioUrlRef.current);
      audioUrlRef.current = next.audioUrl;
      setPhase('listening');
    } else {
      if (audioUrlRef.current) { URL.revokeObjectURL(audioUrlRef.current); audioUrlRef.current = null; }
      setPassage(''); setMeta(null); setReplaysLeft(0);
      generatePassage();
    }
  };

  const rateStepDown = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i > 0) setCurrentRate(SPEED_STEPS[i-1]); };
  const rateStepUp   = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i < SPEED_STEPS.length-1) setCurrentRate(SPEED_STEPS[i+1]); };

  // ── PHASE: init ──
  if (phase === 'init') return (
    <div className="fade-in flex flex-col gap-6 py-4">
      <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">
        <div className="w-4 h-4"><Icons.ArrowLeft /></div> Back
      </button>
      <div className="text-center py-2">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 p-4 mx-auto mb-4"><Icons.Zap /></div>
        <h1 className="text-2xl font-bold text-white mb-1">Discurso</h1>
        <p className="text-slate-400 text-sm mb-3">Speeches & Dialogues</p>
        <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl overflow-hidden">
        <p className="text-slate-300 text-sm leading-relaxed px-5 pt-4 pb-3">
          Listen to an extended Spanish passage — text hidden — then answer 3 comprehension questions from memory.
        </p>
        <button onClick={() => setShowHowItWorks(v => !v)} className="w-full flex items-center justify-between px-5 pb-3 text-xs text-slate-500 hover:text-slate-300 transition-colors">
          <span>How it works {showHowItWorks ? '▲' : '▼'}</span>
        </button>
        {showHowItWorks && (
          <div className="border-t border-slate-700/40 px-5 py-3 space-y-2.5">
            {[
              ['🎬', 'Listen to a passage — TV dialogue, film narration, or real conversation. Text is hidden.'],
              ['🔁', 'Replay as many times as you need using the play button'],
              ['✍️', `Answer ${numQ} comprehension questions in English from memory`],
              ['🤖', 'Claude evaluates your answers and identifies exactly what broke down'],
            ].map(([icon, text]) => (
              <div key={text} className="flex gap-3">
                <span className="text-base leading-5 flex-shrink-0">{icon}</span>
                <span className="text-slate-300 text-xs leading-5">{text}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Length selector */}
      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-4 space-y-2">
        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Passage length</p>
        <div className="grid grid-cols-3 gap-2">
          {[
            { key: 'short',  label: 'Short',  sub: '3–5 sentences' },
            { key: 'medium', label: 'Medium', sub: '6–10 sentences' },
            { key: 'long',   label: 'Long',   sub: '12–16 sentences' },
          ].map(({ key, label, sub }) => (
            <button key={key} onClick={() => setPassageLength(key)}
              className={`rounded-xl border p-3 text-center transition-all ${
                passageLength === key
                  ? 'bg-amber-500/20 border-amber-500/60 text-amber-300'
                  : 'bg-slate-800/40 border-slate-700/30 text-slate-400 hover:border-slate-600'
              }`}>
              <div className="font-semibold text-sm">{label}</div>
              <div className="text-[10px] mt-0.5 opacity-70">{sub}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Info grid */}
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-slate-800/40 border border-slate-700/30 rounded-xl p-3 text-center">
          <div className="text-xl font-bold text-amber-400">∞</div>
          <div className="text-xs text-slate-400 mt-0.5">Replays allowed</div>
        </div>
        <div className="bg-slate-800/40 border border-slate-700/30 rounded-xl p-3 text-center">
          <div className="text-xl font-bold text-amber-400">{numQ}</div>
          <div className="text-xs text-slate-400 mt-0.5">Questions</div>
        </div>
      </div>

      <button onClick={generatePassage} className="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
        Start Session →
      </button>
    </div>
  );

  // ── PHASE: generating ──
  if (phase === 'generating') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-amber-500/30 border-t-amber-500 spin" />
      <div>
        <p className="text-white font-semibold">Preparing your passage…</p>
        <p className="text-slate-400 text-sm mt-1">Claude is writing authentic {level} content</p>
      </div>
    </div>
  );

  // ── PHASE: preparing_audio ──
  if (phase === 'preparing_audio') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 p-4 mx-auto flex items-center justify-center">
        <Icons.Volume />
      </div>
      <div>
        <p className="text-white font-semibold text-lg">Preparing audio…</p>
        <p className="text-slate-400 text-sm mt-1">Synthesizing speech for your passage</p>
      </div>
      <div className="w-52 h-1.5 bg-slate-700/80 rounded-full overflow-hidden">
        <div className="h-full w-1/3 bg-amber-500 rounded-full loading-bar" />
      </div>
    </div>
  );

  // ── PHASE: error ──
  if (phase === 'error') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <div>
        <p className="text-white font-semibold mb-1">Something went wrong</p>
        <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded-lg px-3 py-2 mt-2 break-all">{errorMsg}</p>
      </div>
      <div className="flex gap-3">
        <button onClick={handleReset} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>
        <button onClick={generatePassage} className="bg-amber-600 hover:bg-amber-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Try Again</button>
      </div>
    </div>
  );

  // ── PHASE: listening ──
  if (phase === 'listening') return (
    <div className="fade-in flex flex-col gap-5 py-2">
      <div className="flex items-center gap-3">
        <button onClick={() => { cancel(); handleReset(); }} className="w-8 h-8 text-slate-400 hover:text-white transition-colors flex-shrink-0"><Icons.ArrowLeft /></button>
        <div className="flex-1">
          <p className="text-white font-semibold text-sm">{meta?.title || 'Passage'}</p>
          <p className="text-slate-500 text-xs">Topic: {meta?.topic}</p>
        </div>
        <span className={`text-[10px] font-semibold px-2 py-1 rounded-full border flex-shrink-0 ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      {/* Waveform player */}
      <div className="bg-gradient-to-br from-amber-900/30 to-orange-900/30 border border-amber-500/20 rounded-2xl p-6">
        <Waveform isPlaying={isPlaying} color="#f59e0b" />

        <div className="flex items-center justify-center gap-3 mt-5">
          <div className="flex flex-col items-center gap-1">
            <button onClick={rateStepDown} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">−</button>
            <div className="text-amber-400 font-bold text-sm min-w-[44px] text-center">{currentRate.toFixed(2)}×</div>
            <button onClick={rateStepUp} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">+</button>
          </div>
          <button
            onClick={isPlaying ? () => {} : (hasPlayed ? handleReplay : playPassage)}
            disabled={isPlaying || (hasPlayed && replaysLeft === 0)}
            className={`w-14 h-14 rounded-full flex items-center justify-center text-white font-bold transition-all ${
              isPlaying ? 'bg-amber-600/50 cursor-not-allowed' :
              hasPlayed && replaysLeft === 0 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' :
              'bg-amber-500 hover:bg-amber-400 active:scale-95'
            }`}
          >
            {isPlaying
              ? <div className="w-5 h-5 text-amber-200"><Icons.Volume /></div>
              : <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            }
          </button>
          <div className="text-center">
            <div className="font-bold text-sm text-amber-400">∞</div>
            <div className="text-[10px] text-slate-500">replays</div>
          </div>
        </div>

        <p className="text-center text-amber-300/50 text-xs mt-4">
          {isPlaying ? 'Playing — listen carefully' : hasPlayed ? 'Replay or answer when ready' : 'Press play to begin'}
        </p>
      </div>

      <div className="flex gap-2 flex-wrap">
        {['No text shown during playback', `${numQ} comprehension questions`, 'Unlimited replays'].map(tip => (
          <span key={tip} className="text-[11px] text-slate-500 bg-slate-800/60 border border-slate-700/40 rounded-lg px-2.5 py-1">{tip}</span>
        ))}
      </div>

      {hasPlayed && (
        <button onClick={() => setPhase('answering')} className="slide-up w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
          I'm ready to answer →
        </button>
      )}
    </div>
  );

  // ── PHASE: answering ──
  if (phase === 'answering') {
    const qs = meta?.questions || [];
    return (
      <div className="fade-in flex flex-col gap-5 py-2">
        <div className="flex items-center gap-3">
          <button onClick={() => setPhase('listening')} className="w-8 h-8 text-slate-400 hover:text-white transition-colors flex-shrink-0"><Icons.ArrowLeft /></button>
          <div className="flex-1">
            <p className="text-white font-semibold text-sm">Answer from memory</p>
            <p className="text-slate-500 text-xs">No looking back at the audio</p>
          </div>
        </div>

        <div className="bg-amber-500/8 border border-amber-500/20 rounded-xl p-3 flex gap-2 items-start">
          <span className="flex-shrink-0 text-sm">💡</span>
          <p className="text-amber-200/80 text-xs leading-relaxed">Write in English. You don't need perfect recall — partial credit is given.</p>
        </div>

        {/* 3 Questions */}
        {qs.map((q, i) => (
          <div key={i}>
            <div className="flex items-start gap-2 mb-2">
              <span className={`text-[10px] font-bold px-2 py-1 rounded flex-shrink-0 ${
                q.type==='main_idea' ? 'bg-sky-500/20 text-sky-300' :
                q.type==='detail'    ? 'bg-violet-500/20 text-violet-300' :
                                       'bg-amber-500/20 text-amber-300'}`}>
                {q.type==='main_idea'?'MAIN IDEA':q.type==='detail'?'DETAIL':'INFERENCE'}
              </span>
              <label className="text-sm text-white leading-relaxed">{q.question}</label>
            </div>
            <textarea
              rows={2}
              value={answers[i]}
              onChange={e => { const a=[...answers]; a[i]=e.target.value; setAnswers(a); }}
              placeholder="Your answer…"
            />
          </div>
        ))}

        {submitError && <p className="text-red-400 text-xs">{submitError}</p>}

        <button onClick={handleSubmit} className="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
          Submit for evaluation →
        </button>
      </div>
    );
  }

  // ── PHASE: evaluating ──
  if (phase === 'evaluating') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-amber-500/30 border-t-amber-500 spin" />
      <div>
        <p className="text-white font-semibold">Evaluating your comprehension…</p>
        <p className="text-slate-400 text-sm mt-1">Claude is reading your summary and checking your answers</p>
      </div>
    </div>
  );

  // ── PHASE: results ──
  if (phase === 'results' && sessionResult) {
    const { score, feedback, questionResults, weakTags, strengths } = sessionResult;
    const qs = meta?.questions || [];
    return (
      <div className="fade-in space-y-5 py-4">
        <div className="text-center">
          <ScoreRing score={score} size={100} fontSize={18} />
          <h2 className="text-2xl font-bold text-white mt-3">
            {score>=90?'Excellent listening!':score>=75?'Good comprehension':score>=60?'Getting there':score>=40?'Keep training':'Needs more work'}
          </h2>
          <p className="text-slate-400 text-sm mt-1">{currentRate.toFixed(2)}× · {level} · {meta?.topic}</p>
        </div>

        {/* Feedback */}
        {feedback && (
          <div className="bg-amber-500/8 border border-amber-500/20 rounded-2xl p-4">
            <div className="flex gap-2 items-start">
              <div className="w-4 h-4 text-amber-400 mt-0.5 flex-shrink-0"><Icons.Sparkles /></div>
              <p className="text-slate-200 text-sm leading-relaxed">{feedback}</p>
            </div>
          </div>
        )}

        {/* Strengths */}
        {strengths && (
          <div className="bg-green-500/8 border border-green-500/20 rounded-xl p-3.5 flex gap-2">
            <span className="text-sm flex-shrink-0">✓</span>
            <p className="text-green-200/80 text-xs leading-relaxed"><span className="font-semibold text-green-300">Strength: </span>{strengths}</p>
          </div>
        )}

        {/* Weak tags */}
        {weakTags?.length > 0 && (
          <div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Weak areas tagged</p>
            <div className="flex flex-wrap gap-2">
              {weakTags.map(tag => <span key={tag} className="text-xs bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg px-2.5 py-1">{tag}</span>)}
            </div>
          </div>
        )}

        {/* Per-question breakdown */}
        {questionResults && (
          <div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Question breakdown</p>
            <div className="space-y-2">
              {qs.map((q, i) => {
                const r = questionResults[i];
                if (!r) return null;
                const credit = r.partialCredit ?? (r.correct ? 1 : 0);
                const color = credit >= 0.8 ? 'border-green-500/20 bg-green-500/5' : credit >= 0.4 ? 'border-amber-500/20 bg-amber-500/5' : 'border-red-500/20 bg-red-500/5';
                const badge = credit >= 0.8 ? 'text-green-400' : credit >= 0.4 ? 'text-amber-400' : 'text-red-400';
                return (
                  <div key={i} className={`rounded-xl p-3 border ${color}`}>
                    <div className="flex items-start gap-2 mb-1.5">
                      <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${
                        q.type==='main_idea'?'bg-sky-500/20 text-sky-300':q.type==='detail'?'bg-violet-500/20 text-violet-300':'bg-amber-500/20 text-amber-300'}`}>
                        {q.type==='main_idea'?'MAIN IDEA':q.type==='detail'?'DETAIL':'INFERENCE'}
                      </span>
                      <span className={`text-xs font-semibold ml-auto flex-shrink-0 ${badge}`}>
                        {credit >= 0.8 ? '✓ Correct' : credit >= 0.4 ? '~ Partial' : '✗ Missed'}
                      </span>
                    </div>
                    <p className="text-slate-400 text-xs mb-1.5 leading-relaxed">{q.question}</p>
                    {answers[i] && <p className="text-slate-300 text-xs italic mb-1.5">You: "{answers[i]}"</p>}
                    {r.feedback && <p className="text-slate-500 text-xs leading-relaxed">{r.feedback}</p>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Passage transcript — auto-revealed after submit */}
        <div className="border border-slate-700/50 rounded-2xl overflow-hidden">
          <button
            onClick={() => setShowPassage(v => !v)}
            className="w-full flex items-center justify-between px-4 py-3.5 bg-slate-800/40 hover:bg-slate-800/60 transition-colors text-sm"
          >
            <span className="text-slate-300 font-medium">{showPassage ? 'Hide' : 'Show'} full passage text</span>
            <div className={`w-4 h-4 text-slate-400 transition-transform ${showPassage ? 'rotate-90' : ''}`}><Icons.ChevronRight /></div>
          </button>
          {showPassage && (
            <div className="p-4 bg-slate-900/50 border-t border-slate-700/40 space-y-4">
              {/* Large play button — listen while reading along */}
              <div className="flex items-center gap-3">
                <button
                  onClick={handleReplay}
                  disabled={isPlaying}
                  className={`w-12 h-12 rounded-full flex items-center justify-center text-white transition-all flex-shrink-0 ${
                    isPlaying ? 'bg-amber-600/50 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-400 active:scale-95'
                  }`}
                >
                  {isPlaying
                    ? <div className="w-5 h-5 text-amber-200"><Icons.Volume /></div>
                    : <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <span className="text-xs text-slate-400">{isPlaying ? 'Playing…' : 'Listen while reading'}</span>
              </div>
              <p className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">{passage}</p>
            </div>
          )}
        </div>

        <div className="flex gap-3 pt-1">
          <button onClick={onBack} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-3 rounded-xl transition-colors">Home</button>
          <button onClick={handleNewSession} className="flex-1 bg-amber-600 hover:bg-amber-500 text-white text-sm font-semibold py-3 rounded-xl transition-colors">New Session</button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── MODULE PLACEHOLDER (placeholder removed — all 3 modules built) ────────────

  if (!mod) return null;
  const ModIcon = mod.icon;

      <div>
        <h2 className="text-2xl font-bold text-white mb-2">{mod.title}</h2>

      </div>
      <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-5 max-w-xs">
