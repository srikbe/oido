              </button>
              <button
                onClick={handleReplaySentenceOnly}
                className="flex items-center gap-1.5 bg-slate-700/50 hover:bg-slate-700 border border-slate-600/50 text-slate-300 text-xs font-medium px-3 py-2 rounded-lg transition-colors"
              >
                <div className="w-3.5 h-3.5"><Icons.RotateCcw /></div> Example Sentence
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Label — fixed height */}
      <p className="flex-none text-slate-300 text-sm font-medium text-center">
        {phase === 'revealed' ? 'Result' : 'What does this word mean?'}
      </p>

      {/* Swap zone — takes all remaining space, scrollable inside */}
      <div className="flex-1 min-h-0 overflow-y-auto">
        {phase === 'revealed' ? (
          /* ── Revealed: pinned correct answer + explanation ── */
          <div className="slide-up space-y-2.5">
            {/* Correct answer always visible */}
            <div className="flex items-center gap-3 rounded-xl border bg-green-500/15 border-green-500/50 px-4 py-3.5">
              <span className="w-6 h-6 rounded-lg flex-shrink-0 flex items-center justify-center text-xs font-bold border bg-green-500/30 border-green-500/50 text-green-300">
                {CHOICE_LABELS[q.correct]}
              </span>
              <span className="text-sm flex-1 text-green-200">{q.choices[q.correct]}</span>
              <div className="w-4 h-4 text-green-400 flex-shrink-0"><Icons.Check /></div>
            </div>
            {/* Explanation */}
            <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-4 space-y-2">
              <div className="flex items-center gap-2">
                <div className="w-3.5 h-3.5 text-brand-400 flex-shrink-0"><Icons.Sparkles /></div>
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Explanation</span>
                <span className="ml-auto text-[10px] bg-slate-700/60 text-slate-400 rounded px-1.5 py-0.5">{q.category}</span>
              </div>
              <p className="text-slate-200 text-sm leading-relaxed">{q.explanation}</p>
              <button
                onClick={() => setShowTranscript(v => !v)}
                className="text-xs text-slate-500 hover:text-slate-300 transition-colors underline underline-offset-2"
              >
                {showTranscript ? 'Hide' : 'Show'} carrier sentence
              </button>
              {showTranscript && (
                <p className="text-sky-300/80 text-sm italic border-t border-slate-700/50 pt-2">"{q.carrier}"</p>
              )}
            </div>
          </div>
        ) : (
          /* ── Question / answering: show all choices (with color flash in answering) ── */
          <div className="space-y-2.5">
            {q.choices.map((choice, idx) => {
              const isCorrect  = idx === q.correct;
              const isSelected = idx === selectedAnswer;
              let style, labelStyle, icon = null;
              if (phase === 'answering') {
                if (isCorrect) {
                  style      = 'bg-green-500/15 border-green-500/50 text-green-200';
                  labelStyle = 'bg-green-500/30 border-green-500/50 text-green-300';
                  icon       = <div className="w-4 h-4 text-green-400 flex-shrink-0"><Icons.Check /></div>;
                } else if (isSelected) {
                  style      = 'bg-red-500/15 border-red-500/40 text-red-300';
                  labelStyle = 'bg-red-500/30 border-red-500/50 text-red-300';
                  icon       = <div className="w-4 h-4 text-red-400 flex-shrink-0"><Icons.X /></div>;
                } else {
                  style      = 'bg-slate-800/30 border-slate-700/30 text-slate-500';
                  labelStyle = 'bg-slate-700/40 border-slate-600/30 text-slate-500';
                }
              } else {
                style      = 'bg-slate-800/60 border-slate-700/50 text-slate-200 hover:bg-slate-800 hover:border-slate-600';
                labelStyle = 'bg-slate-700/60 border-slate-600/50 text-slate-400';
              }
              return (
                <button
                  key={idx}
                  onClick={() => phase === 'question' && handleAnswer(idx)}
                  disabled={phase === 'answering'}
                  className={`choice-btn w-full flex items-center gap-3 rounded-xl border px-4 py-3.5 text-left transition-all duration-200 ${style} ${phase === 'question' ? 'cursor-pointer' : 'cursor-default'}`}
                >
                  <span className={`w-6 h-6 rounded-lg flex-shrink-0 flex items-center justify-center text-xs font-bold border ${labelStyle}`}>
                    {CHOICE_LABELS[idx]}
                  </span>
                  <span className="text-sm flex-1">{choice}</span>
                  {icon}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* Next button — pinned at bottom, appears only after explanation */}
      <div className="flex-none pt-1">
        <button
          onClick={handleNext}
          className={`w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors ${phase === 'revealed' ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
        >
          {currentIdx < totalQ - 1 ? `Next Word →` : 'See Results →'}
        </button>
      </div>
    </div>
  );
}

// ─── ESTRUCTURA MODULE (Stage 2) ─────────────────────────────────────────────
function EstructuraModule({ level, apiKey, onBack, addSession, onNeedApiKey }) {
  const TOTAL_Q = 10;
  const [phase, setPhase]           = useState('init');
  const [showHowItWorks, setShowHowItWorks] = useState(false);
  const [currentRate, setCurrentRate] = useState(() => ESTRUCTURA_SPEEDS[level] ?? 0.85);
  const rateStepDown = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i > 0) setCurrentRate(SPEED_STEPS[i-1]); };
  const rateStepUp   = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i < SPEED_STEPS.length-1) setCurrentRate(SPEED_STEPS[i+1]); };
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const answersRef    = useRef([]);
  const [answersVersion, setAnswersVersion] = useState(0);
  const [sessionResult, setSessionResult] = useState(null);
  const [errorMsg, setErrorMsg]     = useState('');
  const [isPlaying, setIsPlaying]   = useState(false);
  const [askOpen, setAskOpen]       = useState(false);
  const [askQuestion, setAskQuestion] = useState('');
  const [askAnswer, setAskAnswer]   = useState('');
  const [askLoading, setAskLoading] = useState(false);
  const playTimerRef  = useRef(null);
  const { speakSequence, cancel }   = useTTS();
  const { addItems, getRecent }     = useContentHistory();

  // Prefetch buffer — same pattern as VocabularyModule
  const bufRef        = useRef([]);
  const [bufVersion, setBufVersion] = useState(0);
  const genIdxRef     = useRef(0);
  const generatingRef = useRef(false);
  const usedUtterancesRef = useRef([]); // track phrases used this session

  const LEVEL_GUIDANCE = {
    A1: 'WORD LIMIT: 3–5 words maximum — count before writing. Present tense only. No subordinate clauses. Core vocabulary only (top 500 frequency words). Single clitics only (me gusta, se llama). No idioms. No contracted speech. Example: "Quiero un café."',
    A2: 'WORD LIMIT: 5–8 words maximum — count before writing. Present and simple preterite past only. One clause maximum. Top 1000 frequency words. Common expressions (¿qué onda?, a poco, ahorita, ándale). Simple reflexives. Example: "Ayer fui al mercado con mi mamá."',
    B1: 'WORD LIMIT: 8–12 words — count before writing. Common tenses (present, preterite, imperfect). One subordinate clause allowed. Double object clitics (se lo di, te lo juro). Discourse markers (o sea, bueno, es que). Common Mexican/Colombian/Argentine expressions. Example: "No vine porque me sentí mal toda la mañana."',
    B2: 'WORD LIMIT: 12–18 words — count before writing. All tenses freely. Complex clitic clusters (me la vas a pagar). Heavier ellipsis. Hace + time + que. Dative of interest. Fast casual register with contractions. Regional slang from 2+ countries. Example: "Se me olvidó decirte que mañana no voy a poder ir."',
    C1: "WORD LIMIT: 18–25 words — count before writing. Full native complexity. Rapid contracted speech (pos, 'ta, pa', usté, 'orita). Heavy implicit subjects, topic-drop, nested clitics. Highly regional slang. Near-native pace. Example: \"Pa' qué te digo que no si al final siempre termino haciendo lo que me pides.\"",
  };

  // ── Level-gated categories and structure maps ──
  const LEVEL_CATS = {
    A1: ["present tense basics","hay + noun","simple questions","basic negation","basic adjectives","tener construction","ser vs estar","llamarse construction","querer/poder basics","ir + a place"],
    A2: ["gustar construction","simple preterite","reflexive verbs","ir + a + infinitive","tener que","present tense regular verbs","basic question words","direct object pronouns","simple comparisons","time expressions"],
    B1: ["se constructions","irregular preterite","imperfect tense","porque/que clauses","poder/querer/deber","present progressive","simple object clitics","discourse markers","tense & aspect traps","reflexive constructions"],
    B2: ["clitic clusters","idiomatic expressions","ellipsis & topic-drop","no-parallel constructions","discourse markers","tense & aspect traps","regional expressions","false cognates in context","reduced speech","reflexive constructions"],
    C1: ["clitic clusters","regional expressions","ellipsis & topic-drop","idiomatic expressions","reduced speech","no-parallel constructions","false cognates in context","discourse markers","tense & aspect traps","reflexive constructions"],
  };

  const WORD_LIMITS = { A1: 5, A2: 8, B1: 12, B2: 18, C1: 25 };

  const STRUCTURE_MAPS = {
    A1: `PERMITTED GRAMMAR STRUCTURES — USE ONLY THESE, NOTHING ELSE:
- Present tense of: ser, estar, tener, ir, querer, poder, hacer, llamarse
- Simple questions with: qué, cómo, dónde, cuántos
- Hay + noun
- Negation with "no"
- Basic articles (el, la, un, una) and common adjectives
FORBIDDEN (automatic failure): subordinate clauses, proverbs, idioms, subjunctive, past tense, future tense, reflexive verbs (except llamarse), any word outside top 300 frequency, more than 5 words, compound sentences
REQUIRED: present tense only, single clause, concrete everyday meaning
EXAMPLES (copy this style exactly):
1. "Tengo hambre." 2. "¿Cómo te llamas?" 3. "Quiero agua." 4. "Ella es alta." 5. "Hay un gato."`,
    A2: `PERMITTED GRAMMAR STRUCTURES — USE ONLY THESE:
- All A1 structures
- Present tense of all regular verbs
- Simple preterite of regular verbs only (fui, comí, hablé, etc.)
- Gustar construction (me gusta, le gustan)
- Ir + a + infinitive (near future)
- Basic reflexive verbs (me llamo, me levanto, me siento)
- Tener + que + infinitive
FORBIDDEN (automatic failure): proverbs, subjunctive mood, compound tenses (he comido, había, etc.), more than 8 words, idiomatic expressions, irregular preterite verbs (except ir/ser → fui), embedded clauses
REQUIRED: present or simple preterite only, one clause maximum, top 600 frequency words
EXAMPLES (copy this style exactly):
1. "Fui al mercado ayer." 2. "Me gusta el café." 3. "¿Dónde está el baño?" 4. "Ella habló con su mamá." 5. "Tengo que estudiar hoy."`,
    B1: `PERMITTED GRAMMAR STRUCTURES — USE ONLY THESE:
- All A1 and A2 structures
- Irregular preterite (vine, dije, puse, hice, tuve)
- Imperfect tense (era, tenía, vivía, hacía)
- Present progressive (estoy comiendo)
- Se + verb impersonal / passive (se me olvidó, se dice)
- Poder/querer/deber + infinitive
- Simple subordinate clauses with "que" and "porque"
- Simple double object clitics (se lo di, te lo juro)
- Common discourse markers (o sea, bueno, es que)
FORBIDDEN: proverbs, advanced idiomatic expressions, more than 12 words, imperfect subjunctive, compound subjunctive
EXAMPLES (copy this style exactly):
1. "No vine porque me sentí mal." 2. "¿Me puedes ayudar con esto?" 3. "Se me olvidó el libro." 4. "Estaba muy cansado ayer." 5. "O sea, no sé qué hacer."`,
    B2: `PERMITTED GRAMMAR STRUCTURES — all B1 structures plus:
- Present subjunctive (quiero que, espero que, ojalá)
- Conditional tense (haría, podría, tendría)
- Clitic clusters (me lo, te lo, se lo, me la vas a pagar)
- Passive se
- Common idioms and collocations
- Regional slang from Mexico, Colombia, or Argentina
WORD LIMIT: 18 words maximum
EXAMPLES (copy this style exactly):
1. "Se me olvidó decirte que mañana no voy a poder ir." 2. "¿Me lo puedes explicar de nuevo?" 3. "Ojalá que no llueva mañana." 4. "A poco no sabías que era su cumpleaños." 5. "Me la vas a pagar, ¿eh?"`,
    C1: `PERMITTED GRAMMAR STRUCTURES — all levels plus:
- Imperfect subjunctive (si tuviera, si hubiera)
- All compound tenses (he comido, había dicho, habré terminado)
- Reduced/contracted speech (pos, 'ta, pa', usté, 'orita)
- Proverbs and set phrases
- Full natural complexity, heavy ellipsis, implicit subjects
WORD LIMIT: 25 words maximum
EXAMPLES (copy this style exactly):
1. "Pa' qué te digo que no si al final siempre termino haciendo lo que me pides." 2. "Pos ya ni modo, se cayó el veinte tarde." 3. "¿Hubiera sabido, no 'stuviera aquí." 4. "No hay mal que por bien no venga, mija." 5. "Ta' bien, 'orita te lo mando."`,
  };

  // ── Generate a single utterance question (qNum 0-9 for category variety) ──
  const generateOneQuestion = useCallback(async (qNum, _attempt = 0) => {
    console.log(`[Estructura] generating Q${qNum + 1}${_attempt ? ` (retry ${_attempt})` : ''}`);

    const cats = LEVEL_CATS[level] || LEVEL_CATS.B1;
    const cat = cats[qNum % cats.length];
    const wordLimit = WORD_LIMITS[level] || 15;
    const structureMap = STRUCTURE_MAPS[level];

    const recent = getRecent();
    const usedList = usedUtterancesRef.current.length > 0
      ? `\n\nDO NOT REUSE these utterances or their sentence structures from the current session:\n${usedUtterancesRef.current.map((u,i)=>`${i+1}. ${u}`).join('\n')}`
      : '';
    const system = `You are an expert Latin American Spanish linguistics teacher creating graded listening comprehension questions. You MUST follow the grammar structure map for the selected level exactly. Return ONLY a valid JSON object — no markdown, no code fences, no commentary.`;

    const prompt = `Create 1 Latin American Spanish listening comprehension question.
LEVEL: ${level} CEFR
CATEGORY TO FEATURE: "${cat}"
WORD LIMIT: ${wordLimit} words maximum — count every word before writing, reject and rewrite if over limit
${vocabInstruction(level)}${avoidRepeatInstruction(recent)}${usedList}

${structureMap}

TASK: Create one utterance that tests the category "${cat}" at ${level} level, using ONLY the structures permitted above.

Return ONLY this JSON object — no other text:
{
  "utterance": "The Spanish phrase — must follow all structure restrictions above. Count words. Max ${wordLimit} words.",
  "english_options": [
    "Option A — natural idiomatic English (not literal)",
    "Option B — natural idiomatic English (not literal)",
    "Option C — natural idiomatic English (not literal)",
    "Option D — natural idiomatic English (not literal)"
  ],
  "correct_index": 0,
  "explanation": "One sentence: what the utterance means and why the wrong options fail.",
  "weak_tag": "${cat}"
}

TRANSLATION RULE — ALL options must use natural English as a fluent speaker says it, never word-for-word:
"Tengo hambre" → "I'm hungry" NOT "I have hunger"
"Tengo 30 años" → "I'm 30 years old" NOT "I have 30 years"
"Me cae bien" → "I like him" NOT "He falls well on me"
The three wrong options should differ in meaning (wrong subject, tense, or interpretation) but match the same natural English register as the correct answer.`;

    try {
      const raw = await callClaude(apiKey, system, prompt, 500);
      console.log(`[Estructura] Q${qNum + 1} raw length:`, raw.length);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('no JSON object in response');
      const p = JSON.parse(match[0]);
      if (!p.utterance || !Array.isArray(p.english_options) || p.english_options.length !== 4 || p.correct_index == null)
        throw new Error('missing required fields');

      // Hard filter: reject if utterance exceeds the word limit for this level
      const wordCount = p.utterance.trim().split(/\s+/).length;
      if (wordCount > wordLimit) {
        console.warn(`[Estructura] Q${qNum + 1} REJECTED — ${wordCount} words exceeds ${level} limit of ${wordLimit}. Retrying.`);
        if (_attempt < 3) return generateOneQuestion(qNum, _attempt + 1);
        throw new Error(`utterance too long (${wordCount} words) after 3 retries`);
      }

      // Shuffle choices so correct answer isn't always option A
      const options = p.english_options.slice(0, 4);
      const correctText = options[Number(p.correct_index)];
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      const correctIdx = options.indexOf(correctText);

      usedUtterancesRef.current.push(p.utterance);
      addItems([p.utterance]);
      return {
        utterance:   p.utterance,
        choices:     options,
        correct:     correctIdx,
        explanation: p.explanation ?? '',
        category:    p.weak_tag ?? cat,
      };
    } catch (e) {
      console.warn(`[Estructura] Q${qNum + 1} failed (attempt ${_attempt + 1}):`, e.message);
      if (_attempt < 2) return generateOneQuestion(qNum, _attempt + 1);
      throw e;
    }
  }, [apiKey, level]);

  // ── Prefetch up through targetIdx (exclusive) ──
  const prefetchUpTo = useCallback(async (targetIdx) => {
    if (generatingRef.current) return;
    const end = Math.min(targetIdx, TOTAL_Q);
    if (genIdxRef.current >= end) return;
    generatingRef.current = true;
    const start = genIdxRef.current;
    genIdxRef.current = end;
    console.log(`[Estructura] prefetching Q${start + 1}–Q${end}`);
    try {
      const results = await Promise.allSettled(
        Array.from({ length: end - start }, (_, i) => generateOneQuestion(start + i))
      );
      const good = results.filter(r => r.status === 'fulfilled').map(r => r.value);
      const bad  = results.filter(r => r.status === 'rejected');
      if (bad.length) console.warn('[Estructura] prefetch failures:', bad.map(r => r.reason?.message));
      if (good.length) { bufRef.current = [...bufRef.current, ...good]; setBufVersion(v => v + 1); }
    } finally {
      generatingRef.current = false;
    }
  }, [generateOneQuestion]);

  // ── Start session: generate Q1 immediately, prefetch Q2-Q3 in background ──
  const generateQuestions = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    console.log('[Estructura] starting session');
    setPhase('generating');
    setErrorMsg('');
    answersRef.current = [];
    setAnswersVersion(0);
    bufRef.current = [];
    genIdxRef.current = 0;
    generatingRef.current = false;
    setBufVersion(0);
    try {
      const q0 = await generateOneQuestion(0);
      genIdxRef.current = 1;
      bufRef.current = [q0];
      setBufVersion(1);
      setCurrentIdx(0);
      setPhase('question');
      console.log('[Estructura] Q1 ready, kicking off background prefetch');
      prefetchUpTo(3);
    } catch(e) {
      console.error('[Estructura] Q1 generation failed:', e);
      setErrorMsg(e.message);
      setPhase('error');
    }
  }, [apiKey, generateOneQuestion, prefetchUpTo, onNeedApiKey]);

  // ── Audio ──
  const playUtterance = useCallback((idx) => {
    const q = bufRef.current[idx];
    if (!q) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    speakSequence([{ text: q.utterance, rate: currentRate, pitch: 1.0 }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 10000);
  }, [speakSequence]);

  useEffect(() => {
    if (phase === 'question' && bufRef.current[currentIdx]) playUtterance(currentIdx);
    return () => clearTimeout(playTimerRef.current);
  }, [phase, currentIdx, bufVersion]); // eslint-disable-line

  const handleReplay = (slow = false) => {
    const cur = bufRef.current[currentIdx];
    if (!cur) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    const rate = slow ? Math.max(0.70, currentRate - 0.10) : currentRate;
    speakSequence([{ text: cur.utterance, rate }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 12000);
  };

  // ── Answer ──
  const handleAnswer = (choiceIdx) => {
    if (phase !== 'question') return;
    cancel(); clearTimeout(playTimerRef.current); setIsPlaying(false);
    setSelectedAnswer(choiceIdx);
    const q = bufRef.current[currentIdx];
    answersRef.current = [...answersRef.current, {
      questionIdx: currentIdx, selected: choiceIdx,
      correct: choiceIdx === q.correct, category: q.category, feature: q.feature,
    }];
    setAnswersVersion(v => v + 1);
    setPhase('revealed');
    prefetchUpTo(currentIdx + 3);
  };

  const handleNext = () => {
    const nextIdx = currentIdx + 1;
    setAskOpen(false); setAskQuestion(''); setAskAnswer('');
    if (nextIdx >= TOTAL_Q) { scoreSession(); return; }
    setCurrentIdx(nextIdx);
    setSelectedAnswer(null);
    if (nextIdx < bufRef.current.length) {
      setPhase('question');
    } else {
      setPhase('loading_next');
    }
  };

  const handleAskClaude = async () => {
    const cur = bufRef.current[currentIdx];
    if (!askQuestion.trim() || !cur) return;
    setAskLoading(true);
    setAskAnswer('');
    try {
      const context = `Spanish utterance: "${cur.utterance}"\nCorrect meaning: "${cur.choices[cur.correct]}"\nExplanation: ${cur.explanation}`;
      const raw = await callClaude(apiKey,
        'You are a concise Latin American Spanish language tutor. Answer the student\'s follow-up question in 2–4 sentences. Be specific and practical.',
        `${context}\n\nStudent question: ${askQuestion.trim()}`
        , 300);
      setAskAnswer(raw.trim());
    } catch(e) {
      setAskAnswer('Sorry, something went wrong. Try again.');
    } finally {
      setAskLoading(false);
    }
  };

  // Resolve loading_next when buffer grows
  useEffect(() => {
    if (phase === 'loading_next' && currentIdx < bufRef.current.length) setPhase('question');
  }, [bufVersion, phase, currentIdx]);

  // ── Score ──
  const scoreSession = async () => {
    setPhase('scoring');
    const allAnswers = answersRef.current;
    const correct = allAnswers.filter(a => a.correct).length;
    const score   = Math.round((correct / allAnswers.length) * 100);
    const wrongItems = allAnswers.filter(a => !a.correct).map(a => {
      const q = bufRef.current[a.questionIdx];
      return `"${q?.utterance}" (${q?.category} / ${q?.feature}): chose "${q?.choices[a.selected]}" — correct: "${q?.choices[q?.correct]}"`;
    });

    let weakTags = [], feedback = `You got ${correct} out of ${allAnswers.length} correct.`;
    try {
      const raw = await callClaude(apiKey,
        `You are analyzing a Spanish structure comprehension session. Return ONLY valid JSON.`,
        `${level} learner, structure session: ${correct}/${allAnswers.length} correct.\nWrong: ${wrongItems.length ? wrongItems.join('; ') : 'none'}\n\nReturn JSON:\n{"weakTags":[/* up to 4 category strings from wrong answers, [] if perfect */],"feedback":"2 sentences: what structural patterns they handle well, and one specific pattern to focus on next."}`,
        512);
      const m = raw.match(/\{[\s\S]*\}/);
      if (m) { const p = JSON.parse(m[0]); weakTags = p.weakTags||[]; feedback = p.feedback||feedback; }
    } catch(_) {}

    if (!weakTags.length && wrongItems.length)
      weakTags = [...new Set(allAnswers.filter(a=>!a.correct).map(a=>bufRef.current[a.questionIdx]?.category).filter(Boolean))];

    setSessionResult({ score, correct, total: allAnswers.length, weakTags, feedback });
    addSession({ module:'structure', level, score, weakTags, duration: null });
    setPhase('results');
  };

  const handleReset = () => {
    cancel();
    answersRef.current = [];
    bufRef.current = [];
    genIdxRef.current = 0;
    generatingRef.current = false;
    setAnswersVersion(0);
    setBufVersion(0);
    setCurrentIdx(0);
    setSelectedAnswer(null);
    setSessionResult(null);
    setErrorMsg('');
    setIsPlaying(false);
    setPhase('init');
  };

  const q = bufRef.current[currentIdx];
  const progressPct = ((currentIdx + (phase === 'revealed' ? 1 : 0)) / TOTAL_Q) * 100;
  const isRevealed = phase === 'revealed';

  // ── PHASE: init ──
  if (phase === 'init') return (
    <div className="fade-in flex flex-col gap-6 py-4">
      <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">
        <div className="w-4 h-4"><Icons.ArrowLeft /></div> Back
      </button>
      <div className="text-center py-4">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-700 p-4 mx-auto mb-4"><Icons.BookOpen /></div>
        <h1 className="text-2xl font-bold text-white mb-1">Estructura</h1>
        <p className="text-slate-400 text-sm mb-3">Phrases</p>
        <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>
      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl overflow-hidden">
        <p className="text-slate-300 text-sm leading-relaxed px-5 pt-4 pb-3">
          Hear a Latin American utterance and choose its real meaning — not the literal translation. Covers idioms, clitics, regional speech, and reduced forms.
        </p>
        <button onClick={() => setShowHowItWorks(v => !v)} className="w-full flex items-center justify-between px-5 pb-3 text-xs text-slate-500 hover:text-slate-300 transition-colors">
          <span>How it works {showHowItWorks ? '▲' : '▼'}</span>
        </button>
        {showHowItWorks && (
          <div className="border-t border-slate-700/40 px-5 py-3 space-y-2.5">
            {[
              ['🎧', "You'll hear a complete utterance as it would sound in a Latin American film or conversation"],
              ['🧩', 'Select the real meaning — not the literal translation — from 4 options'],
              ['🔄', 'Replay at normal or slower speed as many times as you need'],
              ['⚠️', 'After answering, see exactly why the literal reading fails and what the utterance actually does'],
            ].map(([icon, text]) => (
              <div key={text} className="flex gap-3">
                <span className="text-base leading-5 flex-shrink-0">{icon}</span>
                <span className="text-slate-300 text-xs leading-5">{text}</span>
              </div>
            ))}
            <div className="pt-1 space-y-2">
              <p className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Patterns you'll encounter</p>
              {[
                { label:'Clitics',  ex:'Se lo dije tres veces.',          note:'Who is it? What was said? Clitics collapse everything.' },
                { label:'Idioms',   ex:'Me cayó el veinte.',              note:'"It finally hit me" — nothing to do with twenty pesos' },
                { label:'Regional', ex:'¡Órale, está chido!',             note:'Mexican approval — sounds nothing like textbook Spanish' },
                { label:'Reduced',  ex:"'Tá bien, pa' mí no hay pedo.",   note:'Contracted casual speech at native speed' },
              ].map(({ label, ex, note }) => (
                <div key={label} className="bg-slate-800/40 border border-slate-700/30 rounded-xl p-3 flex gap-3">
                  <span className="text-[10px] font-bold text-violet-400 bg-violet-500/10 border border-violet-500/20 rounded px-1.5 py-1 h-fit flex-shrink-0">{label}</span>
                  <div>
                    <div className="text-sm text-white font-medium italic">"{ex}"</div>
                    <div className="text-xs text-slate-500 mt-0.5">{note}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      <button onClick={generateQuestions} className="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
        Start Session →
      </button>
    </div>
  );

  // ── PHASE: generating ──
  if (phase === 'generating') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-violet-500/30 border-t-violet-500 spin" />
      <div>
        <p className="text-white font-semibold">Building your session…</p>
        <p className="text-slate-400 text-sm mt-1">Claude is generating 10 authentic utterances for {level}</p>
      </div>
    </div>
  );

  // ── PHASE: error ──
  if (phase === 'error') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <div>
        <p className="text-white font-semibold mb-1">Something went wrong</p>
        <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded-lg px-3 py-2 mt-2 break-all">{errorMsg}</p>
      </div>
      <div className="flex gap-3">
        <button onClick={handleReset} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>
        <button onClick={generateQuestions} className="bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Try Again</button>
      </div>
    </div>
  );

  // ── PHASE: scoring ──
  if (phase === 'scoring') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-violet-500/30 border-t-violet-500 spin" />
      <div>
        <p className="text-white font-semibold">Analyzing your session…</p>
        <p className="text-slate-400 text-sm mt-1">Claude is tagging your structural weak spots</p>
      </div>
    </div>
  );

  // ── PHASE: results ──
  if (phase === 'results' && sessionResult) {
    const { score, correct, total, weakTags, feedback } = sessionResult;
    return (
      <div className="fade-in space-y-5 py-4">
        <div className="text-center">
          <ScoreRing score={score} size={100} fontSize={18} />
          <h2 className="text-2xl font-bold text-white mt-3">{correct}/{total} correct</h2>
          <p className="text-slate-400 text-sm mt-1">
            {score>=90?'Excellent!':score>=70?'Good work':score>=50?'Keep going':'Room to grow'} · {level} structure session
          </p>
        </div>
        {feedback && (
          <div className="bg-violet-500/10 border border-violet-500/20 rounded-2xl p-4">
            <div className="flex gap-2 items-start">
              <div className="w-4 h-4 text-violet-400 mt-0.5 flex-shrink-0"><Icons.Sparkles /></div>
              <p className="text-slate-200 text-sm leading-relaxed">{feedback}</p>
            </div>
          </div>
        )}
        {weakTags.length > 0 && (
          <div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Weak areas tagged</p>
            <div className="flex flex-wrap gap-2">
              {weakTags.map(tag => <span key={tag} className="text-xs bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg px-2.5 py-1">{tag}</span>)}
            </div>
          </div>
        )}
        <div>
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Question breakdown</p>
          <div className="space-y-2">
            {answersRef.current.map((a, i) => {
              const qs = bufRef.current[a.questionIdx];
              return (
                <div key={i} className={`rounded-xl p-3 border ${a.correct?'bg-green-500/5 border-green-500/20':'bg-red-500/5 border-red-500/20'}`}>
                  <div className="flex items-start gap-3">
                    <div className={`w-5 h-5 rounded-full flex-shrink-0 mt-0.5 flex items-center justify-center ${a.correct?'bg-green-500':'bg-red-500'}`}>
                      <div className="w-3 h-3 text-white">{a.correct?<Icons.Check/>:<Icons.X/>}</div>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-white text-sm font-medium italic mb-1">"{qs?.utterance}"</p>
                      <div className="flex gap-1 flex-wrap mb-1">
                        <span className="text-[10px] text-violet-400 bg-violet-500/10 border border-violet-500/20 rounded px-1.5 py-0.5">{qs?.category}</span>
                        {qs?.feature && <span className="text-[10px] text-slate-500 bg-slate-700/30 rounded px-1.5 py-0.5">{qs?.feature}</span>}
                      </div>
                      {!a.correct
                        ? <p className="text-xs text-slate-400">You chose: <span className="text-red-400">"{qs?.choices[a.selected]}"</span> · Correct: <span className="text-green-400">"{qs?.choices[qs?.correct]}"</span></p>
                        : <p className="text-xs text-green-400">"{qs?.choices[qs?.correct]}" ✓</p>
                      }
                      {!a.correct && qs?.literal && <p className="text-xs text-slate-500 mt-1 leading-relaxed">{qs.literal}</p>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="flex gap-3 pt-2">
          <button onClick={onBack} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-3 rounded-xl transition-colors">Home</button>
          <button onClick={handleReset} className="flex-1 bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold py-3 rounded-xl transition-colors">New Session</button>
        </div>
      </div>
    );
  }

  // ── PHASE: loading_next ──
  if (phase === 'loading_next') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-violet-500/30 border-t-violet-500 spin" />
      <div>
        <p className="text-white font-semibold">Loading next question…</p>
        <p className="text-slate-400 text-sm mt-1">Generating utterance {currentIdx + 1} of {TOTAL_Q}</p>
      </div>
    </div>
  );

  // ── PHASE: question / revealed ──
  if (!q) return null;

  return (
    <div className="fade-in flex flex-col gap-5 py-2">
      {/* Header */}
      <div className="flex items-center gap-3">
        <button onClick={onBack} className="w-8 h-8 text-slate-400 hover:text-white transition-colors flex-shrink-0"><Icons.ArrowLeft /></button>
        <div className="flex-1">
          <div className="flex justify-between text-xs text-slate-400 mb-1.5">
            <span>Question {currentIdx + 1} of {TOTAL_Q}</span>
            <span>{answersRef.current.filter(a=>a.correct).length} correct</span>
          </div>
          <div className="h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-violet-500 to-purple-500 rounded-full transition-all duration-500" style={{ width:`${progressPct}%` }} />
          </div>
        </div>
        <span className={`text-[10px] font-semibold px-2 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      {/* Context — omitted when not present */}
      {q.context && (
        <div className="flex items-start gap-2">
          <span className="text-[10px] font-bold text-violet-400 bg-violet-500/10 border border-violet-500/20 rounded px-2 py-1 flex-shrink-0 mt-0.5">Scene</span>
          <p className="text-slate-400 text-xs leading-relaxed">{q.context}</p>
        </div>
      )}

      {/* Audio player */}
      <div className="bg-gradient-to-br from-violet-900/40 to-purple-900/40 border border-violet-500/20 rounded-2xl p-5">
        {isRevealed ? (
          <div className="text-center">
            <p className="text-[10px] text-violet-400/60 uppercase tracking-widest mb-2">Utterance</p>
            <div className="text-xl font-bold text-white leading-relaxed mb-3">"{q.utterance}"</div>
            <button onClick={() => handleReplay(false)}
              className="w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-violet-500/20 hover:bg-violet-500/40 active:scale-95 transition-all">
              <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-violet-400 ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
          </div>
        ) : (
          <div className="text-center">
            <p className="text-violet-300/60 text-xs mb-4">{isPlaying ? 'Listening…' : 'What did they say?'}</p>
            <button onClick={() => handleReplay(false)}
              className="w-16 h-16 mx-auto rounded-full flex items-center justify-center bg-violet-500/20 hover:bg-violet-500/40 hover:scale-105 active:scale-95 transition-all">
              <svg viewBox="0 0 24 24" fill="currentColor" className="w-8 h-8 text-violet-400 ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
          </div>
        )}
        <div className="flex items-center justify-center gap-3 mt-3 pt-3 border-t border-violet-500/20">
          <span className="text-xs text-slate-500">Speed</span>
          <button onClick={rateStepDown} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">−</button>
          <span className="text-sm font-bold text-violet-400 min-w-[44px] text-center">{currentRate.toFixed(2)}×</span>
          <button onClick={rateStepUp} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">+</button>
        </div>
      </div>

      {/* Choices */}
      <p className="text-slate-300 text-sm font-medium text-center">{isRevealed ? 'Result' : 'What does this mean?'}</p>
      <div className="space-y-2.5">
        {q.choices.map((choice, idx) => {
          const isAnswering = phase === 'answering';
          const isWrong = idx !== q.correct;
          const isSelected = idx === selectedAnswer;
          // During answering phase: flash correct green, selected wrong red, others fade out
          let style = 'bg-slate-800/60 border-slate-700/50 text-slate-200 hover:bg-slate-800 hover:border-slate-600';
          let icon = null;
          let extraCls = '';
          if (isAnswering) {
            if (idx === q.correct) { style='bg-green-500/15 border-green-500/50 text-green-200'; }
            else if (isSelected) { style='bg-red-500/15 border-red-500/40 text-red-300'; }
            else { extraCls = 'opacity-0'; style='bg-slate-800/30 border-slate-700/30 text-slate-500'; }
          }
          if (isRevealed) {
            // Hide wrong choices entirely — explanation fills the space
            if (isWrong) return null;
            style='bg-green-500/15 border-green-500/50 text-green-200';
            icon=<div className="w-4 h-4 text-green-400 flex-shrink-0"><Icons.Check /></div>;
          }
          return (
            <button key={idx} onClick={() => !isRevealed && !isAnswering && handleAnswer(idx)} disabled={isRevealed || isAnswering}
              className={`choice-btn w-full flex items-center gap-3 rounded-xl border px-4 py-3.5 text-left transition-all duration-300 ${style} ${!isRevealed&&!isAnswering?'cursor-pointer':'cursor-default'} ${extraCls}`}>
              <span className={`w-6 h-6 rounded-lg flex-shrink-0 flex items-center justify-center text-xs font-bold border ${
                (isRevealed||isAnswering)&&idx===q.correct?'bg-green-500/30 border-green-500/50 text-green-300'
                :(isRevealed||isAnswering)&&isSelected?'bg-red-500/30 border-red-500/50 text-red-300'
                :'bg-slate-700/60 border-slate-600/50 text-slate-400'}`}>{CHOICE_LABELS[idx]}</span>
              <span className="text-sm flex-1">{choice}</span>
              {icon}
            </button>
          );
        })}
      </div>

      {/* Reveal: wrong-answer result + explanation (slides in where wrong choices were) */}
      {isRevealed && (
        <>
          <div className="slide-up space-y-2.5">
            {selectedAnswer !== q.correct && (
              <div className="bg-red-500/10 border border-red-500/25 rounded-xl px-4 py-3 flex items-center gap-3">
                <div className="w-4 h-4 text-red-400 flex-shrink-0"><Icons.X /></div>
                <span className="text-red-300 text-sm flex-1">{q.choices[selectedAnswer]}</span>
              </div>
            )}
            {q.literal && (
              <div className="bg-red-500/8 border border-red-500/20 rounded-xl p-3.5">
                <div className="flex gap-2 items-start">
                  <span className="text-sm flex-shrink-0">⚠️</span>
                  <div>
                    <p className="text-[10px] font-bold text-red-400 uppercase tracking-wider mb-1">Literal trap</p>
                    <p className="text-slate-300 text-xs leading-relaxed">{q.literal}</p>
                  </div>
                </div>
              </div>
            )}
            <div className="bg-slate-800/60 border border-slate-700/40 rounded-xl p-3.5">
              <div className="flex items-center gap-2 mb-2">
                <div className="w-3.5 h-3.5 text-violet-400 flex-shrink-0"><Icons.Sparkles /></div>
                <span className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Explanation</span>
                <div className="ml-auto flex gap-1 flex-wrap">
                  <span className="text-[10px] bg-violet-500/15 text-violet-400 border border-violet-500/25 rounded px-1.5 py-0.5">{q.category}</span>
                </div>
              </div>
              <p className="text-slate-200 text-xs leading-relaxed">{q.explanation}</p>
              {q.feature && <p className="text-[10px] text-slate-500 mt-2">Pattern: <span className="text-slate-400 font-medium">{q.feature}</span></p>}
            </div>
          </div>

          {/* Ask Claude */}
          <div className="bg-slate-800/40 border border-violet-500/20 rounded-xl overflow-hidden">
            <button
              onClick={() => { setAskOpen(v => !v); setAskAnswer(''); }}
              className="w-full flex items-center gap-2 px-3.5 py-2.5 text-xs text-violet-400 hover:text-violet-300 transition-colors"
            >
              <div className="w-3.5 h-3.5"><Icons.Sparkles /></div>
              Ask Claude a follow-up
              <span className="ml-auto">{askOpen ? '▲' : '▼'}</span>
            </button>
            {askOpen && (
              <div className="border-t border-violet-500/15 px-3.5 pb-3.5 pt-2.5 space-y-2">
                <input
                  type="text"
                  value={askQuestion}
                  onChange={e => setAskQuestion(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && !askLoading && handleAskClaude()}
                  placeholder="e.g. When do you use this structure?"
                  className="w-full bg-slate-900/60 border border-slate-700/50 rounded-lg px-3 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-violet-500/50"
                />
                <button
                  onClick={handleAskClaude}
                  disabled={askLoading || !askQuestion.trim()}
                  className="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-xs font-semibold py-2 rounded-lg transition-colors"
                >
                  {askLoading ? 'Asking…' : 'Ask →'}
                </button>
                {askAnswer && (
                  <p className="text-slate-200 text-xs leading-relaxed pt-1">{askAnswer}</p>
                )}
              </div>
            )}
          </div>
        </>
      )}

      {isRevealed && (
        <button onClick={handleNext} className="slide-up w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
          {currentIdx < TOTAL_Q - 1 ? 'Next Utterance →' : 'See Results →'}
        </button>
      )}
    </div>
  );
}

// ─── SPEED MODULE CONSTANTS ──────────────────────────────────────────────────

// ─── WAVEFORM ────────────────────────────────────────────────────────────────
function Waveform({ isPlaying, color = '#f59e0b' }) {
  const bars = useMemo(() => Array.from({length:22}, () => ({
    h: 14 + Math.floor(Math.random() * 60),
    d: (0.30 + Math.random() * 0.50).toFixed(2),
    delay: (Math.random() * 0.65).toFixed(2),
  })), []);
  return (
    <div className="flex items-end justify-center gap-0.5 h-14 overflow-hidden">
      {bars.map((b, i) => (
        <div key={i} style={{
          width: '5px', borderRadius: '3px',
          height: `${b.h}px`, transformOrigin: 'bottom center',
          backgroundColor: isPlaying ? color : '#334155',
          animationName: isPlaying ? 'waveBounce' : 'none',
          animationDuration: `${b.d}s`,
          animationDelay: `${b.delay}s`,
          animationTimingFunction: 'ease-in-out',
          animationIterationCount: 'infinite',
          transition: 'background-color 0.4s',
        }} />
      ))}
    </div>
  );
}

// ─── WORD RECOGNITION MODULE (Stage 2) ───────────────────────────────────────
const WR_SPEEDS  = { A1:0.75, A2:0.80, B1:0.90, B2:0.95, C1:1.0 };
const WR_SPECS   = {
  A1: { words:'4–6',   distractors:'very distinct — different syllable count or opening consonant allowed', topics:'greetings, food, numbers, family, classroom' },
  A2: { words:'5–8',   distractors:'moderately similar — same number of syllables, different vowel or final consonant', topics:'everyday routines, shopping, directions, time' },
  B1: { words:'7–10',  distractors:'phonetically close — minimal pair or near-minimal pair required (e.g. pero/perro, casa/caza)', topics:'work, relationships, news, anecdotes' },
  B2: { words:'8–12',  distractors:'very close — same stress and syllable count, differ by one phoneme only (e.g. vino/fino, caro/calo)', topics:'abstract ideas, media, opinions, culture' },
  C1: { words:'10–15', distractors:'near-identical at speed — words that merge in fast native speech (e.g. hay/ahí, sino/sin o, por qué/porque)', topics:'political commentary, humor, idiomatic conversation' },
};
const WR_TAGS = ['r/rr distinction','b/v confusion','s/c/z distinction','vowel clarity','silent h','diphthong confusion','ll/y distinction','stress pattern','word-final reduction','nasal consonants'];

function WordRecognitionModule({ level, apiKey, onBack, addSession, onNeedApiKey }) {
  const TOTAL_Q = 10;
  const [phase, setPhase]             = useState('init');
  const [showHowItWorks, setShowHowItWorks] = useState(false);
  const [currentRate, setCurrentRate] = useState(() => WR_SPEEDS[level] ?? 0.85);
  const rateStepDown = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i > 0) setCurrentRate(SPEED_STEPS[i-1]); };
  const rateStepUp   = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i < SPEED_STEPS.length-1) setCurrentRate(SPEED_STEPS[i+1]); };
  const [currentIdx, setCurrentIdx]   = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const answersRef    = useRef([]);
  const [answersVersion, setAnswersVersion] = useState(0);
  const [sessionResult, setSessionResult] = useState(null);
  const [errorMsg, setErrorMsg]       = useState('');
  const [isPlaying, setIsPlaying]     = useState(false);
  const playTimerRef  = useRef(null);
  const { speakSequence, cancel }     = useTTS();
  const { addItems, getRecent }       = useContentHistory();

  // Prefetch buffer
  const bufRef        = useRef([]);
  const [bufVersion, setBufVersion]   = useState(0);
  const genIdxRef     = useRef(0);
  const generatingRef = useRef(false);

  // ── Generate one question ──
  const generateOneQuestion = useCallback(async (qNum, _attempt = 0) => {
    console.log(`[Fonetica] generating Q${qNum + 1}${_attempt ? ` (retry ${_attempt})` : ''}`);
    const spec  = WR_SPECS[level] || WR_SPECS.B1;
    const tag   = WR_TAGS[qNum % WR_TAGS.length];
    const recent = getRecent();
    const system = `You are a Latin American Spanish phonetics expert. Return ONLY valid JSON, no markdown, no code fences, nothing else.`;
    const prompt = `Create 1 word-recognition listening question for a ${level} CEFR learner of Latin American Spanish.

PHONETIC FOCUS: "${tag}"
SENTENCE LENGTH: ${spec.words} words
TOPIC: ${spec.topics}
${vocabInstruction(level)}${avoidRepeatInstruction(recent)}

TASK:
1. Write a short, natural Latin American Spanish sentence (${spec.words} words) that clearly contains a TARGET WORD.
2. The target word should naturally stress or feature the phonetic contrast "${tag}".
3. Choose 3 DISTRACTOR words that are phonetically similar to the target in Latin American pronunciation. Distractors MUST be REAL Spanish words or natural multi-word phrases.
4. The sentence must make the target word unambiguous in context (so the answer is clearly one word, not another).

DISTRACTOR CATEGORIES — include at least one from each relevant category:
  Category A (Minimal pairs): words differing by one phoneme — e.g. pero/perro, casa/caza, caro/carro
  Category B (Homophones or near-homophones): words that sound identical or near-identical — e.g. hola/ola, has/az, vino/bino
  Category C (Phrase-word confusions): a single word that sounds like a multi-word phrase when spoken at natural speed in Latin American Spanish, or vice versa. THIS IS THE MOST IMPORTANT CATEGORY for real listening comprehension.

For Category C — phrase-word confusions:
- Think specifically about the TARGET WORD chosen for this question. Ask: is there a phrase or word combination that sounds like THIS specific word at natural conversational speed?
- Only include a phrase-word confusion distractor if a genuine, natural-sounding confusion exists for this target word specifically.
- If no natural phrase-word confusion exists for this target word, use a minimal pair or near-homophone instead (do not force a phrase-word distractor).
- Do NOT reuse example pairs from other words. The confusion must be specific to the target word.
- Examples of the TYPE of confusion to look for (do not reuse these directly — generate new ones for the target word): lloviendo → "yo viendo", también → "tan bien", porque → "por qué"
- Multi-word distractors should be written exactly as they would appear in natural writing (e.g. "tan bien", "si no", "a ver").

Return ONLY this JSON:
{
  "sentence": "The full Spanish sentence.",
  "targetWord": "the single target word as it appears in the sentence",
  "targetWordEn": "English translation of the target word (1-3 words, natural English)",
  "sentenceEn": "Natural English translation of the full sentence",
  "distractors": ["distractor1", "distractor2 or phrase", "distractor3 or phrase"],
  "phonNote": "One sentence explaining the phonetic difference between '${tag}' and the most likely wrong choice — specific to Latin American Spanish pronunciation.",
  "weak_tag": "${tag}"
}

RULES:
- All 4 options (target + 3 distractors) must be real Spanish words or natural Spanish phrases that a native speaker would immediately recognize
- NEVER split a single word with a space — "ca rro" is NOT a valid distractor for "carro". If you cannot find a real similar word, use a word from the same semantic field instead
- NEVER invent non-words, partial words, or syllables — every option must exist in a Spanish dictionary
- For minimal pair distractors, verify the distractor is a real word: carro→caro ✓, perro→pero ✓, but "ca rro" ✗ (not a word)
- If you cannot find 3 real phonetically-similar Spanish words, use real words that begin with the same syllable or are from the same topic as the sentence
- ${spec.distractors}
- The sentence in context must make only the target word correct
- In Latin American Spanish: 's','c','z' all sound like /s/ (no Castilian th-sound); 'll' and 'y' merge as /ʝ/ in most regions; 'b' and 'v' are identical; 'h' is silent
- phonNote must explain the Latin American pronunciation contrast, not Castilian`;

    try {
      const raw = await callClaude(apiKey, system, prompt, 400);
      console.log(`[Fonetica] Q${qNum + 1} raw response:`, raw.slice(0, 600));
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('no JSON');
      const p = JSON.parse(match[0]);
      console.log(`[Fonetica] Q${qNum + 1} parsed:`, JSON.stringify({
        targetWord: p.targetWord, distractors: p.distractors
      }));
      if (!p.sentence || !p.targetWord || !Array.isArray(p.distractors))
        throw new Error('missing required fields');

      // Sanitize all choice values — fixes capitalization bugs and label leakage
      const cleanTarget = cleanChoice(p.targetWord);
      const cleanDistr  = p.distractors.slice(0, 3).map(d => cleanChoice(d));
      // Pad to 3 distractors if Claude returned fewer
      while (cleanDistr.length < 3) cleanDistr.push(['otra', 'más', 'igual'][cleanDistr.length]);
      // Drop empty/duplicate distractors, and reject any distractor that is just
      // the target word with a space inserted (e.g. "ca rro" for "carro")
      const isSpaceSplit = (d) => d.replace(/\s+/g,'').toLowerCase() === cleanTarget.replace(/\s+/g,'').toLowerCase();
      const validDistractors = cleanDistr.filter(d => d && !isSpaceSplit(d));
      while (validDistractors.length < 3) validDistractors.push(['otra', 'más', 'igual', 'bien'].find(w => !validDistractors.includes(w) && w !== cleanTarget) || 'bien');
      const deduped = [...new Set([cleanTarget, ...validDistractors])];
      if (deduped.length < 4) deduped.push(...['otra', 'más', 'igual', 'bien'].filter(w => !deduped.includes(w)));
      const finalDistractors = deduped.filter(w => w !== cleanTarget).slice(0, 3);

      if (!cleanTarget) throw new Error('empty targetWord after cleaning');
      console.log(`[Fonetica] Q${qNum + 1} cleaned: target="${cleanTarget}", distractors=${JSON.stringify(finalDistractors)}`);

      // Hard filter: sentence word count
      const wc = p.sentence.trim().split(/\s+/).length;
      const [, hi] = spec.words.split('–').map(Number);
      if (wc > hi + 2) {
        if (_attempt < 3) return generateOneQuestion(qNum, _attempt + 1);
        throw new Error(`sentence too long (${wc} words)`);
      }

      // Build shuffled 4-option choice list
      const all = [cleanTarget, ...finalDistractors];
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      addItems([p.sentence]);
      return {
        sentence:     p.sentence,
        targetWord:   cleanTarget,
        targetWordEn: p.targetWordEn ?? '',
        sentenceEn:   p.sentenceEn ?? '',
        choices:      all,
        correct:      all.indexOf(cleanTarget),
        phonNote:     p.phonNote ?? '',
        category:     p.weak_tag ?? tag,
      };
    } catch (e) {
      console.warn(`[Fonetica] Q${qNum + 1} failed (attempt ${_attempt + 1}):`, e.message);
      if (_attempt < 2) return generateOneQuestion(qNum, _attempt + 1);
      throw e;
    }
  }, [apiKey, level, addItems, getRecent]);

  // ── Per-slot prefetch — each slot is independent, no global mutex ──
  const pendingSlots = useRef(new Set());

  const prefetchSlot = useCallback(async (idx) => {
    if (idx >= TOTAL_Q) return;
    if (pendingSlots.current.has(idx)) {
      console.log(`[Fonetica] slot ${idx + 1}: already in-flight`);
      return;
    }
    if (bufRef.current[idx] !== undefined) {
      console.log(`[Fonetica] slot ${idx + 1}: already in buffer`);
      return;
    }
    pendingSlots.current.add(idx);
    console.log(`[Fonetica] slot ${idx + 1}: generating…`);
    try {
      const q = await withTimeout(generateOneQuestion(idx), 15000, `Q${idx + 1}`);
      bufRef.current[idx] = q;
      console.log(`[Fonetica] slot ${idx + 1}: done ✓`);
      setBufVersion(v => v + 1);
    } catch (e) {
      console.warn(`[Fonetica] slot ${idx + 1}: FAILED — ${e.message} (will retry on demand)`);
      // Leave bufRef.current[idx] undefined so the watchdog can retry
    } finally {
      pendingSlots.current.delete(idx);
    }
  }, [generateOneQuestion]);

  // Schedule slots from the watermark up to targetIdx — fire-and-forget
  const scheduleUpTo = useCallback((targetIdx) => {
    const end = Math.min(targetIdx, TOTAL_Q);
    let scheduled = 0;
    for (let i = genIdxRef.current; i < end; i++) {
      prefetchSlot(i);
      scheduled++;
    }
    if (end > genIdxRef.current) {
      console.log(`[Fonetica] scheduled ${scheduled} new slots (${genIdxRef.current + 1}–${end})`);
      genIdxRef.current = end;
    }
  }, [prefetchSlot]);

  // ── Start session ──
  const generateQuestions = useCallback(async () => {
    if (!apiKey) { onNeedApiKey(); return; }
    bufRef.current = [];
    genIdxRef.current = 0;
    generatingRef.current = false;
    pendingSlots.current = new Set();
    answersRef.current = [];
    setCurrentIdx(0); setSelectedAnswer(null); setSessionResult(null); setErrorMsg('');
    setBufVersion(0);
    setPhase('generating');

    // Schedule ALL 10 questions in parallel upfront
    scheduleUpTo(TOTAL_Q);

    // Wait for Q0 with a 15s hard timeout
    const deadline = Date.now() + 15000;
    while (!bufRef.current[0] && Date.now() < deadline) {
      await new Promise(r => setTimeout(r, 150));
    }
    if (bufRef.current[0]) {
      console.log('[Fonetica] Q1 ready — entering question phase');
      setPhase('question');
    } else {
      setErrorMsg('Question generation timed out — please try again');
      setPhase('error');
    }
  }, [apiKey, scheduleUpTo, onNeedApiKey]);

  // ── Auto-play when entering question phase ──
  const playQuestion = useCallback((idx) => {
    const q = bufRef.current[idx];
    if (!q) return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    speakSequence([{ text: q.sentence, rate: currentRate }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 15000);
  }, [speakSequence, currentRate]);

  useEffect(() => {
    if (phase === 'question' && bufRef.current[currentIdx]) playQuestion(currentIdx);
    return () => clearTimeout(playTimerRef.current);
  }, [phase, currentIdx, bufVersion]); // eslint-disable-line

  const handleReplay = () => {
    const q = bufRef.current[currentIdx];
    if (!q || phase === 'revealed') return;
    clearTimeout(playTimerRef.current);
    setIsPlaying(true);
    speakSequence([{ text: q.sentence, rate: currentRate }], () => setIsPlaying(false));
    playTimerRef.current = setTimeout(() => setIsPlaying(false), 15000);
  };

  // ── Answer selection ──
  const handleAnswer = (choiceIdx) => {
    if (phase !== 'question') return;
    cancel(); clearTimeout(playTimerRef.current); setIsPlaying(false);
    setSelectedAnswer(choiceIdx);
    const q   = bufRef.current[currentIdx];
    const correct = choiceIdx === q.correct;
    answersRef.current[currentIdx] = { selected: choiceIdx, correct };
    setAnswersVersion(v => v + 1);
    setPhase('revealed');
    // Auto-replay sentence after short delay so user hears while reading
    setTimeout(() => {
      setIsPlaying(true);
      speakSequence([{ text: q.sentence, rate: currentRate }], () => setIsPlaying(false));
    }, 600);
    // Ensure the next few slots are scheduled (safe no-op if already done)
    scheduleUpTo(currentIdx + 4);
  };

  // ── loading_next watchdog: poll + retry on-demand until slot arrives ──
  useEffect(() => {
    if (phase !== 'loading_next') return;
    if (bufRef.current[currentIdx]) {
      console.log(`[Fonetica] loading_next: Q${currentIdx + 1} already ready`);
      setPhase('question');
      return;
    }
    console.log(`[Fonetica] loading_next: waiting for Q${currentIdx + 1}`);
    prefetchSlot(currentIdx); // trigger on-demand if slot was missed
    const t = setInterval(() => {
      if (bufRef.current[currentIdx]) {
        console.log(`[Fonetica] loading_next: Q${currentIdx + 1} arrived`);
        setPhase('question');
      } else {
        console.log(`[Fonetica] loading_next: Q${currentIdx + 1} still loading…`);
        prefetchSlot(currentIdx); // no-op if already in-flight
      }
    }, 300);
    return () => clearInterval(t);
  }, [bufVersion, phase, currentIdx, prefetchSlot]);

  // ── Next question / finish ──
  const handleNext = () => {
    cancel(); clearTimeout(playTimerRef.current); setIsPlaying(false);
    const nextIdx = currentIdx + 1;
    if (nextIdx >= TOTAL_Q) {
      const correct = answersRef.current.filter(a => a?.correct).length;
      const score   = Math.round((correct / TOTAL_Q) * 100);
      const weakTags = answersRef.current
        .map((a, i) => (!a?.correct && bufRef.current[i]?.category) || null)
        .filter(Boolean);
      setSessionResult({ score, correct, weakTags });
      addSession({ module:'word-recognition', level, score, weakTags, duration: null });
      setPhase('results');
    } else {
      setCurrentIdx(nextIdx);
      setSelectedAnswer(null);
      if (bufRef.current[nextIdx]) {
        console.log(`[Fonetica] next: Q${nextIdx + 1} ready immediately`);
        setPhase('question');
      } else {
        console.log(`[Fonetica] next: Q${nextIdx + 1} not ready, entering loading_next`);
        prefetchSlot(nextIdx); // on-demand generation
        setPhase('loading_next');
      }
    }
  };

  // ── PHASE: init ──
  if (phase === 'init') return (
    <div className="fade-in flex flex-col gap-6 py-4">
      <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-fit">
        <div className="w-4 h-4"><Icons.ArrowLeft /></div> Back
      </button>
      <div className="text-center py-4">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-cyan-600 p-4 mx-auto mb-4"><Icons.Zap /></div>
        <h1 className="text-2xl font-bold text-white mb-1">Fonética</h1>
        <p className="text-slate-400 text-sm mb-3">Words</p>
        <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full border ${LEVEL_COLORS[level]}`}>{level}</span>
      </div>

      <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl overflow-hidden">
        <p className="text-slate-300 text-sm leading-relaxed px-5 pt-4 pb-3">
          You'll hear a Spanish sentence. Identify the exact word spoken from 4 phonetically similar options.
        </p>
        <button onClick={() => setShowHowItWorks(v => !v)} className="w-full flex items-center justify-between px-5 pb-3 text-xs text-slate-500 hover:text-slate-300 transition-colors">
          <span>How it works {showHowItWorks ? '▲' : '▼'}</span>
        </button>
        {showHowItWorks && (
          <div className="border-t border-slate-700/40 px-5 py-3 space-y-2.5">
            {[
              ['🔊', 'A Spanish sentence plays — listen for the specific word being tested'],
              ['🔤', 'Choose which of the 4 options you actually heard in the sentence'],
              ['📖', 'After answering, the sentence appears in text with the target word highlighted, and plays again so you can hear it while reading'],
              ['🧠', 'Each question focuses on a specific phonetic contrast: r/rr, b/v, vowels, stress patterns, and more'],
            ].map(([icon, text]) => (
              <div key={text} className="flex gap-3">
                <span className="text-base leading-5 flex-shrink-0">{icon}</span>
                <span className="text-slate-300 text-xs leading-5">{text}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <button onClick={generateQuestions} className="w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors">
        Start Session →
      </button>
    </div>
  );

  // ── PHASE: generating / loading_next ──
  if (phase === 'generating' || phase === 'loading_next') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center">
      <div className="w-12 h-12 rounded-full border-4 border-sky-500/30 border-t-sky-500 spin" />
      <div>
        <p className="text-white font-semibold">{phase === 'generating' ? 'Building your session…' : 'Loading next question…'}</p>
        <p className="text-slate-400 text-sm mt-1">
          {phase === 'generating' ? `Claude is generating ${TOTAL_Q} phonetic challenges for ${level}` : `Question ${currentIdx + 1} of ${TOTAL_Q}`}
        </p>
      </div>
    </div>
  );

  // ── PHASE: error ──
  if (phase === 'error') return (
    <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] gap-5 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <div>
        <p className="text-white font-semibold mb-1">Something went wrong</p>
        <p className="text-slate-400 text-xs font-mono bg-slate-800 rounded-lg px-3 py-2 mt-2 break-all">{errorMsg}</p>
      </div>
      <div className="flex gap-3">
        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl">Back</button>
        <button onClick={generateQuestions} className="bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Try Again</button>
      </div>
    </div>
  );

  // ── PHASE: question / revealed ──
  if ((phase === 'question' || phase === 'revealed') && bufRef.current[currentIdx]) {
    const q = bufRef.current[currentIdx];
    const answered = answersRef.current[currentIdx];

    // Render sentence with target word bolded
    const renderSentence = (sentence, target, className = '') => {
      const re  = new RegExp(`(\\b${target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b)`, 'i');
      const parts = sentence.split(re);
      return (
        <span className={className}>
          {parts.map((part, i) =>
            re.test(part)
              ? <strong key={i} className="text-sky-300 font-bold underline decoration-sky-400/50">{part}</strong>
              : <span key={i}>{part}</span>
          )}
        </span>
      );
    };

    return (
      <div className="fade-in flex flex-col gap-4 py-4">
        {/* Progress */}
        <div>
          <div className="flex items-center justify-between text-xs text-slate-500 mb-1.5">
            <span>Question {currentIdx + 1} of {TOTAL_Q}</span>
            <span className="font-medium text-sky-400/70">{q.category}</span>
          </div>
          <div className="h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-sky-500 rounded-full transition-all duration-300"
              style={{ width: `${(currentIdx / TOTAL_Q) * 100}%` }} />
          </div>
        </div>

        {/* Sentence player */}
        <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-5 text-center space-y-3">
          {phase === 'revealed' ? (
            <>
              <div className="bg-slate-700/60 border border-slate-600/40 rounded-xl px-4 py-3">
                <p className="text-xl leading-relaxed font-medium text-white">
                  {renderSentence(q.sentence, q.targetWord)}
                </p>
              </div>
              <p className="text-slate-400 text-sm leading-relaxed italic">
                {renderSentence(q.sentenceEn, q.targetWordEn, 'text-slate-400')}
              </p>
            </>
          ) : (
            <>
              <p className="text-slate-400 text-xs uppercase tracking-widest mb-1">
                {isPlaying ? 'Playing…' : 'Which word did you hear?'}
              </p>
              <button
                onClick={handleReplay}
                disabled={isPlaying}
                className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center transition-all ${isPlaying ? 'bg-sky-500/30 scale-95' : 'bg-sky-500/20 hover:bg-sky-500/40 hover:scale-105 active:scale-95'} disabled:cursor-not-allowed`}
              >
                <svg viewBox="0 0 24 24" fill="currentColor" className={`w-8 h-8 ${isPlaying ? 'text-sky-300' : 'text-sky-400'}`}>
                  <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
              </button>
            </>
          )}
          <div className="flex items-center justify-center gap-3 mt-3 pt-3 border-t border-slate-700/30">
            <span className="text-xs text-slate-500">Speed</span>
            <button onClick={rateStepDown} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">−</button>
            <span className="text-sm font-bold text-sky-400 min-w-[44px] text-center">{currentRate.toFixed(2)}×</span>
            <button onClick={rateStepUp} className="w-7 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-bold flex items-center justify-center">+</button>
          </div>
        </div>

        {/* Choices */}
        <div className="grid grid-cols-2 gap-2.5">
          {q.choices.map((choice, i) => {
            let cls = 'py-4 rounded-xl border text-base font-bold tracking-wide transition-all ';
            if (phase === 'revealed') {
              if (i === q.correct)        cls += 'bg-green-500/15 border-green-500/50 text-green-300';
              else if (i === selectedAnswer) cls += 'bg-red-500/15 border-red-500/50 text-red-400 line-through';
              else                        cls += 'bg-slate-800/30 border-slate-700/20 text-slate-600';
            } else {
              cls += 'bg-slate-800/70 border-slate-700/40 text-white hover:bg-sky-500/15 hover:border-sky-500/40 active:scale-[0.97]';
            }
            return (
              <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={phase === 'revealed'}>
                {choice}
                {phase === 'revealed' && i === q.correct && <span className="ml-1.5 text-green-400 text-sm">✓</span>}
              </button>
            );
          })}
        </div>

        {/* Phonetic note — shown after answering */}
        {phase === 'revealed' && q.phonNote && (
          <div className="bg-sky-500/8 border border-sky-500/20 rounded-xl p-3.5 flex gap-2 items-start slide-up">
            <span className="text-sm flex-shrink-0">🔉</span>
            <p className="text-sky-200/80 text-xs leading-relaxed">{q.phonNote}</p>
          </div>
        )}

        {/* Next button */}
        <button
          onClick={handleNext}
          className={`w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-4 rounded-2xl text-base transition-colors ${phase === 'revealed' ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
        >
          {currentIdx < TOTAL_Q - 1 ? 'Next →' : 'See Results →'}
        </button>
      </div>
    );
  }

  // ── PHASE: results ──
  if (phase === 'results' && sessionResult) {
    const { score, correct, weakTags } = sessionResult;
    const uniqueWeak = [...new Set(weakTags)].slice(0, 4);
    return (
      <div className="fade-in space-y-5 py-4">
        <div className="text-center">
          <ScoreRing score={score} size={100} fontSize={18} />
          <h2 className="text-2xl font-bold text-white mt-3">
            {score>=90?'Perfect ear!':score>=75?'Strong recognition':score>=60?'Getting sharper':score>=40?'Keep listening':'Needs more practice'}
          </h2>
          <p className="text-slate-400 text-sm mt-1">{correct}/{TOTAL_Q} correct · {level} · {currentRate.toFixed(2)}×</p>
        </div>

        {uniqueWeak.length > 0 && (
          <div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phonetic areas to work on</p>
            <div className="flex flex-wrap gap-2">
              {uniqueWeak.map(tag => (
                <span key={tag} className="text-xs bg-sky-500/10 text-sky-400 border border-sky-500/20 rounded-lg px-2.5 py-1">{tag}</span>
              ))}
            </div>
          </div>
        )}

        <div className="space-y-2">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Question review</p>
          {bufRef.current.slice(0, TOTAL_Q).map((q, i) => {
            const a = answersRef.current[i];
            if (!q || !a) return null;
            return (
              <div key={i} className={`rounded-xl p-3 border ${a.correct ? 'border-green-500/20 bg-green-500/5' : 'border-red-500/20 bg-red-500/5'}`}>
                <div className="flex items-start justify-between gap-2 mb-1">
                  <span className="text-xs font-mono text-slate-500">{q.category}</span>
                  <span className={`text-xs font-semibold ${a.correct ? 'text-green-400' : 'text-red-400'}`}>
                    {a.correct ? '✓' : `✗ → ${q.targetWord}`}
                  </span>
                </div>
                <p className="text-slate-300 text-xs leading-relaxed italic">"{q.sentence}"</p>
              </div>
            );
          })}
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onBack} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-3 rounded-2xl transition-colors">Home</button>
          <button onClick={generateQuestions} className="flex-1 bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold py-3 rounded-2xl transition-colors">New Session →</button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── SENTENCE TRANSCRIPTION MODULE (Stage 3) ──────────────────────────────────
const DICTADO_SPEEDS = { A1:0.75, A2:0.80, B1:0.88, B2:0.95, C1:1.0 };
const DICTADO_SPECS  = {
  A1: { words:'3–5',   tenses:'present tense ONLY', vocab:'top 300 frequency words only', clauses:'no subordinate clauses', style:'concrete everyday meaning', examples:'"Tengo hambre." "¿Cómo te llamas?" "Ella es muy alta."' },
  A2: { words:'5–8',   tenses:'present or simple preterite only', vocab:'top 600 frequency words only', clauses:'single clause only', style:'everyday situations', examples:'"Fui al mercado ayer." "Me gusta mucho el café."' },
  B1: { words:'8–12',  tenses:'common tenses including imperfect and future', vocab:'everyday vocabulary and common expressions', clauses:'one subordinate clause allowed', style:'natural colloquial', examples:'"No vine porque me sentí muy mal." "¿Me puedes ayudar con esto?"' },
  B2: { words:'12–16', tenses:'any tense including conditional', vocab:'natural speech including common idioms and clitic clusters', clauses:'multiple clauses', style:'fully natural conversational', examples:'"Se me olvidó decirte que mañana no voy a poder ir."' },
  C1: { words:'15–20', tenses:'any including subjunctive and compound tenses', vocab:'idiomatic, regional Latin American expressions, reduced speech', clauses:'complex multi-clause', style:'native speed patterns with contractions and reductions', examples:'"Pa\' qué te digo que no si al final siempre termino haciendo lo que me pides."' },
};
const SPECIAL_CHARS = ['á','é','í','ó','ú','ü','ñ','¿','¡'];
const DICTADO_TOTAL = 5;

// Fuzzy word match: strip accents + punctuation, lowercase compare
function stripAccents(s) {
  return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9\s]/g,'');
}
function tokenizeForMatch(sentence) {
  return sentence.trim().split(/\s+/).map(w => w.replace(/^[¿¡"«]+|[.,;:!?»"]+$/g,''));
}

function alignWords(original, typed) {
  const origTokens  = tokenizeForMatch(original);
  const typedTokens = tokenizeForMatch(typed);
  const m = origTokens.length, n = typedTokens.length;

  // LCS DP table — match by stripped form so accent differences still align
  const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = stripAccents(origTokens[i-1]) === stripAccents(typedTokens[j-1])
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack to get edit operations
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && stripAccents(origTokens[i-1]) === stripAccents(typedTokens[j-1])) {
      ops.unshift({ type: 'match', oi: i-1, ti: j-1 }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.unshift({ type: 'ins', ti: j-1 }); j--;  // extra typed word — ignore for scoring
    } else {
      ops.unshift({ type: 'del', oi: i-1 }); i--;  // original word absent in typed
    }
  }

  // Build result — consecutive del/ins pairs become substitutions
  const result = [];
  let k = 0;
  while (k < ops.length) {
    if (ops[k].type === 'match') {
      const orig = origTokens[ops[k].oi], t = typedTokens[ops[k].ti];
      const hasAccentDiff = orig.normalize('NFD') !== t.normalize('NFD') && orig !== t;
      result.push({ word: orig, typed: t, status: hasAccentDiff ? 'accent' : 'correct' });
      k++;
    } else {
      // Collect a contiguous block of del/ins ops and pair them as substitutions
      const dels = [], ins = [];
      while (k < ops.length && ops[k].type !== 'match') {
        if (ops[k].type === 'del') dels.push(ops[k].oi);
        else ins.push(ops[k].ti);
        k++;
      }
      dels.forEach((oi, p) => {
        const orig = origTokens[oi];
        if (p < ins.length) {
          result.push({ word: orig, typed: typedTokens[ins[p]], status: 'wrong' });
        } else {
          result.push({ word: orig, status: 'missing' });
        }
      });
    }
  }
  return result;
}

function DictadoModule({ level, apiKey, onBack, addSession, onNeedApiKey }) {
  const [phase, setPhase]               = useState('init');
  const [showHowItWorks, setShowHowItWorks] = useState(false);
  const [currentRate, setCurrentRate]   = useState(() => DICTADO_SPEEDS[level] ?? 0.85);
  const rateStepDown = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i > 0) setCurrentRate(SPEED_STEPS[i-1]); };
  const rateStepUp   = () => { const i = SPEED_STEPS.indexOf(currentRate); if (i < SPEED_STEPS.length-1) setCurrentRate(SPEED_STEPS[i+1]); };

  const [currentIdx, setCurrentIdx]     = useState(0);
  const [typedText, setTypedText]       = useState('');
  const [replayCount, setReplayCount]   = useState(0);
  const [isPlaying, setIsPlaying]       = useState(false);
  const [isPaused, setIsPaused]         = useState(false);
  const [sessionResults, setSessionResults] = useState([]);
  const [sessionDone, setSessionDone]   = useState(null);

  const textareaRef = useRef(null);
  const playTimerRef = useRef(null);
  const { speakSequence, cancel, pauseAudio, resumeAudio } = useTTS();
  const { addItems, getRecent }         = useContentHistory();

  // Prefetch buffer
  const bufRef        = useRef([]);
  const genIdxRef     = useRef(0);
  const generatingRef = useRef(false);
  const usedSentences = useRef([]);
  const [bufVersion, setBufVersion]     = useState(0);

  const DICTADO_TOPICS = ['daily routine','food and cooking','travel and transport','family and relationships','work and school','weather and seasons','health and body','emotions and feelings','hobbies and free time','shopping and money','city and neighbourhood','nature and animals'];
